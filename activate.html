<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Activate</title>

  <link rel="preload" as="image" href="logo-family-feud.PNG">
  <link rel="preload" as="image" href="logo.PNG">

  <style>
    :root{
      --gold:#f1d14f;
      --white:#f4f2ea;
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --panel-blue-1:#0f2c88;
      --panel-blue-2:#081d61;
      --soft-blue:rgba(46,81,198,.28);
      --soft-blue-2:rgba(255,255,255,.08);
      --orange-1:#ff922b;
      --orange-2:#ff7b14;
      --dark:#0f0f0f;
      --input-bg:#f3f3f3;
      --input-text:#222;
      --muted:#d7def8;
      --danger:#ffd8d8;
      --success:#d9ffe4;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:150px;
      height:150px;
      object-fit:contain;
      z-index:5;
    }

    .hero-logo-wrap{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:340px;
      min-height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:150px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:52px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .auth-panel{
      position:absolute;
      left:50%;
      top:438px;
      transform:translate(-50%, -50%);
      width:820px;
      min-height:455px;
      border-radius:36px;
      border:10px solid var(--dark);
      background:linear-gradient(180deg, var(--panel-blue-1) 0%, var(--panel-blue-2) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:118px 30px 28px;
      display:flex;
      flex-direction:column;
      z-index:3;
      overflow:hidden;
    }

    .tabs-dock{
      position:absolute;
      top:18px;
      left:28px;
      right:28px;
      height:76px;
      border-radius:26px;
      border:4px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, rgba(17,40,120,.58) 0%, rgba(8,29,97,.30) 100%);
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      z-index:7;
    }

    .tab-btn{
      border:none;
      background:transparent;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      cursor:pointer;
      transition:background .15s ease, color .15s ease, filter .15s ease;
      height:100%;
      width:100%;
    }

    .tab-btn + .tab-btn{
      border-right:3px solid rgba(243,242,234,.65);
    }

    .tab-btn.active{
      background:linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
      color:#fff;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.28);
    }

    .panel-title{
      text-align:center;
      color:var(--white);
      font-size:40px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:10px;
    }

    .panel-subtitle{
      text-align:center;
      color:var(--muted);
      font-size:21px;
      font-weight:700;
      line-height:1.7;
      margin-bottom:14px;
      min-height:64px;
      padding:0 8px;
    }

    .banner{
      min-height:58px;
      border-radius:20px;
      border:3px solid transparent;
      padding:12px 16px;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.7;
      font-size:18px;
      font-weight:800;
      margin-bottom:12px;
    }

    .banner.show{
      display:flex;
    }

    .banner.info{
      background:rgba(217,233,248,.20);
      border-color:rgba(184,206,223,.50);
      color:#e6f0ff;
    }

    .banner.success{
      background:rgba(217,255,228,.18);
      border-color:rgba(143,207,147,.50);
      color:var(--success);
    }

    .banner.error{
      background:rgba(255,216,216,.18);
      border-color:rgba(216,139,122,.50);
      color:var(--danger);
    }

    .form-box{
      display:block;
    }

    .form-box.hidden{
      display:none !important;
    }

    .input{
      width:100%;
      height:72px;
      border-radius:999px;
      border:4px solid #101010;
      background:var(--input-bg);
      color:var(--input-text);
      font-size:24px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 18px;
      box-shadow:inset 0 2px 0 rgba(255,255,255,.75);
      margin-bottom:14px;
    }

    .input::placeholder{
      color:#777;
      font-weight:700;
      font-size:20px;
    }

    .input[readonly]{
      background:#edf1f5;
      color:#444;
    }

    .primary-btn{
      width:220px;
      height:74px;
      margin:8px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      border:5px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
      color:#fff;
      font-size:34px;
      line-height:1;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
      overflow:hidden;
      transition:filter .15s ease, opacity .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }

    .primary-btn:hover:not(:disabled){
      filter:brightness(1.03);
    }

    .primary-btn:active:not(:disabled){
      filter:brightness(1.01);
    }

    .primary-btn.loading{
      font-size:24px;
      letter-spacing:-.2px;
    }

    .primary-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .secondary-row{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .secondary-btn{
      min-width:200px;
      height:62px;
      border-radius:22px;
      border:4px solid rgba(243,242,234,.95);
      background:var(--soft-blue);
      color:var(--white);
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      transition:filter .15s ease, opacity .15s ease;
    }

    .secondary-btn:hover:not(:disabled){
      filter:brightness(1.04);
    }

    .secondary-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      filter:none;
    }

    .activate-note{
      text-align:center;
      color:var(--gold);
      font-size:18px;
      font-weight:800;
      line-height:1.7;
      margin-top:8px;
    }

    .linked-email{
      margin-top:6px;
      margin-bottom:16px;
      text-align:center;
      color:var(--white);
      font-size:20px;
      line-height:1.8;
      word-break:break-word;
    }

    .helper{
      margin-top:16px;
      text-align:center;
      color:var(--muted);
      font-size:18px;
      line-height:1.8;
      font-weight:700;
    }

    .ready-actions{
      display:grid;
      gap:14px;
      margin-top:8px;
    }

    body.portrait .game-shell{
      width:640px;
      height:1280px;
    }

    body.portrait .store-logo{
      top:10px;
      left:2px;
      width:132px;
      height:132px;
    }

    body.portrait .hero-logo-wrap{
      top:95px;
      width:390px;
      min-height:200px;
    }

    body.portrait .hero-logo{
      max-height:200px;
    }

    body.portrait .auth-panel{
      top:760px;
      width:610px;
      min-height:610px;
      padding:112px 24px 28px;
    }

    body.portrait .tabs-dock{
      top:16px;
      left:22px;
      right:22px;
      height:72px;
      border-radius:24px;
    }

    body.portrait .tab-btn{
      font-size:24px;
    }

    body.portrait .panel-title{
      font-size:38px;
    }

    body.portrait .panel-subtitle{
      font-size:20px;
      min-height:72px;
    }

    body.portrait .input{
      height:78px;
      font-size:24px;
    }

    body.portrait .input::placeholder{
      font-size:19px;
    }

    body.portrait .primary-btn{
      width:230px;
      height:80px;
      font-size:38px;
    }

    body.portrait .primary-btn.loading{
      font-size:25px;
    }

    body.portrait .secondary-btn{
      min-width:170px;
      height:64px;
      font-size:22px;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img
          id="storeLogo"
          class="store-logo"
          src="logo.PNG"
          alt="صندوق المسابقات"
          width="150"
          height="150"
          loading="eager"
          decoding="async"
          fetchpriority="low"
        />

        <div class="hero-logo-wrap">
          <img
            id="familyLogo"
            class="hero-logo"
            src="logo-family-feud.PNG"
            alt="فاميلي فيود"
            width="1536"
            height="1024"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
          <div id="familyLogoFallback" class="hero-logo-fallback">فاميلي فيود</div>
        </div>

        <section class="auth-panel">
          <div id="statusBanner" class="banner info"></div>

          <div id="authTabs" class="tabs-dock">
            <button id="loginTabBtn" class="tab-btn active" type="button">تسجيل الدخول</button>
            <button id="registerTabBtn" class="tab-btn" type="button">إنشاء حساب</button>
          </div>

          <div id="panelTitle" class="panel-title">تسجيل الدخول</div>
          <div id="panelSubtitle" class="panel-subtitle">
            سجّل الدخول إلى حسابك، أو أنشئ حسابًا جديدًا إذا لم يكن لديك حساب.
          </div>

          <form id="loginForm" class="form-box">
            <input id="loginEmail" class="input" type="email" inputmode="email" autocomplete="email" placeholder="البريد الإلكتروني" />
            <input id="loginPassword" class="input" type="password" autocomplete="current-password" placeholder="كلمة المرور" />
            <button id="loginBtn" class="primary-btn" type="submit">دخول</button>
          </form>

          <form id="registerForm" class="form-box hidden">
            <input id="registerEmail" class="input" type="email" inputmode="email" autocomplete="email" placeholder="البريد الإلكتروني" />
            <input id="registerPassword" class="input" type="password" autocomplete="new-password" placeholder="كلمة المرور" />
            <input id="registerPassword2" class="input" type="password" autocomplete="new-password" placeholder="تأكيد كلمة المرور" />
            <button id="registerBtn" class="primary-btn" type="submit">إنشاء</button>
          </form>

          <section id="activateStep" class="form-box hidden">
            <input id="linkedEmail" class="input" type="text" readonly />
            <input id="activateCode" class="input" type="text" autocomplete="off" placeholder="اكتب كود التفعيل هنا" />
            <button id="activateBtn" class="primary-btn" type="button">تفعيل</button>

            <div class="secondary-row">
              <button id="logoutBtn1" class="secondary-btn" type="button">تسجيل الخروج</button>
            </div>

            <p id="activateHint" class="activate-note">هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل.</p>
          </section>

          <section id="readyStep" class="form-box hidden">
            <div class="banner success show">تم تفعيل اللعبة بنجاح ✅</div>
            <div id="readyEmail" class="linked-email"></div>

            <div class="ready-actions">
              <button id="enterGameBtn" class="primary-btn" type="button">دخول اللعبة</button>
              <button id="logoutBtn2" class="secondary-btn" type="button">تسجيل الخروج</button>
            </div>
          </section>

          <p id="bottomHint" class="helper">إذا كان لديك حساب سابقًا، سجّل دخولك ثم أكمل التفعيل إذا لزم.</p>
        </section>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 640;
    const PORTRAIT_HEIGHT = 1280;

    const API_BASE = window.location.origin;
    const GAME_ENTRY = "index.html";

    const API = {
      register: `${API_BASE}/api/register`,
      login: `${API_BASE}/api/login`,
      me: `${API_BASE}/api/me`,
      activate: `${API_BASE}/api/activate`
    };

    const TOKEN_KEYS = [
      "familyfeud_token_v1",
      "familyfeud_token",
      "sandooq_token_v1",
      "sandooq_token",
      "token"
    ];

    const EMAIL_KEYS = [
      "familyfeud_email_v1",
      "familyfeud_email",
      "sandooq_email",
      "user_email",
      "email"
    ];

    const DEVICE_KEYS = [
      "familyfeud_device_id_v1",
      "familyfeud_device_id",
      "familyfeud_device_key_v1",
      "familyfeud_device_key",
      "sandooq_device_id_v1",
      "sandooq_device_id",
      "sandooq_device_key_v1",
      "sandooq_device_key",
      "deviceId",
      "device_id",
      "device_key"
    ];

    const root = document.documentElement;

    const loginTabBtn = document.getElementById("loginTabBtn");
    const registerTabBtn = document.getElementById("registerTabBtn");
    const authTabs = document.getElementById("authTabs");

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const activateStep = document.getElementById("activateStep");
    const readyStep = document.getElementById("readyStep");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");

    const registerEmail = document.getElementById("registerEmail");
    const registerPassword = document.getElementById("registerPassword");
    const registerPassword2 = document.getElementById("registerPassword2");

    const linkedEmail = document.getElementById("linkedEmail");
    const activateCode = document.getElementById("activateCode");
    const readyEmail = document.getElementById("readyEmail");
    const activateHint = document.getElementById("activateHint");

    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const activateBtn = document.getElementById("activateBtn");
    const enterGameBtn = document.getElementById("enterGameBtn");
    const logoutBtn1 = document.getElementById("logoutBtn1");
    const logoutBtn2 = document.getElementById("logoutBtn2");

    const statusBanner = document.getElementById("statusBanner");
    const bottomHint = document.getElementById("bottomHint");

    const typingInputs = [
      loginEmail, loginPassword,
      registerEmail, registerPassword, registerPassword2,
      activateCode
    ];

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;
    let layoutFrozenUntil = 0;
    let loadingCount = 0;

    function freezeLayout(ms = 900) {
      layoutFrozenUntil = Math.max(layoutFrozenUntil, Date.now() + ms);
    }

    function isLayoutFrozen() {
      return loadingCount > 0 || Date.now() < layoutFrozenUntil;
    }

    function readCookie(name) {
      try {
        const cookie = document.cookie || "";
        const parts = cookie.split(";");
        for (const part of parts) {
          const [k, ...rest] = part.trim().split("=");
          if (k === name) {
            return decodeURIComponent(rest.join("=") || "");
          }
        }
      } catch (_) {}
      return "";
    }

    function readStoredValue(key) {
      try {
        const value = localStorage.getItem(key);
        if (value && String(value).trim()) return String(value).trim();
      } catch (_) {}

      try {
        const value = sessionStorage.getItem(key);
        if (value && String(value).trim()) return String(value).trim();
      } catch (_) {}

      const cookieValue = readCookie(key);
      if (cookieValue && String(cookieValue).trim()) return String(cookieValue).trim();

      return "";
    }

    function writeStoredValue(key, value) {
      if (!value) return;
      try { localStorage.setItem(key, value); } catch (_) {}
      try { sessionStorage.setItem(key, value); } catch (_) {}
    }

    function deleteStoredValue(key) {
      try { localStorage.removeItem(key); } catch (_) {}
      try { sessionStorage.removeItem(key); } catch (_) {}
    }

    function writeCookie(name, value, maxAgeSeconds = 2592000) {
      try {
        const secure = location.protocol === "https:" ? "; Secure" : "";
        document.cookie =
          `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${maxAgeSeconds}; SameSite=Lax${secure}`;
      } catch (_) {}
    }

    function clearCookie(name) {
      try {
        const secure = location.protocol === "https:" ? "; Secure" : "";
        document.cookie =
          `${name}=; Path=/; Max-Age=0; SameSite=Lax${secure}`;
      } catch (_) {}
    }

    function readAny(keys) {
      for (const key of keys) {
        const value = readStoredValue(key);
        if (value) return value;
      }
      return "";
    }

    function writeMany(keys, value) {
      if (!value) return;
      keys.forEach((key) => {
        writeStoredValue(key, value);
        writeCookie(key, value);
      });
    }

    function clearMany(keys) {
      keys.forEach((key) => {
        deleteStoredValue(key);
        clearCookie(key);
      });
    }

    function normalizeUA(ua) {
      return String(ua || "")
        .replace(/CriOS\/[^\s)]+/gi, "")
        .replace(/FxiOS\/[^\s)]+/gi, "")
        .replace(/EdgiOS\/[^\s)]+/gi, "")
        .replace(/OPiOS\/[^\s)]+/gi, "")
        .replace(/YaBrowser\/[^\s)]+/gi, "")
        .replace(/Chrome\/[^\s)]+/gi, "")
        .replace(/Firefox\/[^\s)]+/gi, "")
        .replace(/Edg\/[^\s)]+/gi, "")
        .replace(/OPR\/[^\s)]+/gi, "")
        .replace(/Version\/[^\s)]+/gi, "")
        .replace(/Safari\/[^\s)]+/gi, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function hashString(str) {
      let h1 = 0xdeadbeef ^ str.length;
      let h2 = 0x41c6ce57 ^ str.length;

      for (let i = 0; i < str.length; i++) {
        const ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }

      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);

      return ((h2 >>> 0).toString(36) + (h1 >>> 0).toString(36));
    }

    function buildStableDeviceId() {
      const sw = Math.min(screen.width || 0, screen.height || 0);
      const sh = Math.max(screen.width || 0, screen.height || 0);

      const fingerprint = [
        "family-feud-v2",
        normalizeUA(navigator.userAgent || ""),
        navigator.platform || "",
        navigator.language || "",
        Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        `${sw}x${sh}`,
        String(screen.colorDepth || ""),
        String(window.devicePixelRatio || ""),
        String(navigator.maxTouchPoints || ""),
        String(navigator.hardwareConcurrency || "")
      ].join("|");

      return "ff_" + hashString(fingerprint);
    }

    function getDeviceId() {
      let deviceId = readAny(DEVICE_KEYS);

      if (!deviceId || /^ff_rand_/i.test(deviceId) || !/^ff_/i.test(deviceId)) {
        deviceId = buildStableDeviceId();
      }

      writeMany(DEVICE_KEYS, deviceId);
      return deviceId;
    }

    function getToken() {
      return readAny(TOKEN_KEYS);
    }

    function setToken(token) {
      if (!token) return;
      writeMany(TOKEN_KEYS, token);
    }

    function clearToken() {
      clearMany(TOKEN_KEYS);
    }

    function getStoredEmail() {
      return readAny(EMAIL_KEYS);
    }

    function setStoredEmail(email) {
      if (!email) return;
      writeMany(EMAIL_KEYS, email);
    }

    function clearStoredEmail() {
      clearMany(EMAIL_KEYS);
    }

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function normalizeCode(value) {
      return String(value || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function showBanner(message, type = "info") {
      statusBanner.textContent = message;
      statusBanner.className = "banner show " + type;
    }

    function hideBanner() {
      statusBanner.className = "banner info";
      statusBanner.textContent = "";
    }

    function redirectToGame() {
      window.location.replace(GAME_ENTRY);
    }

    function setMode(mode) {
      const isLogin = mode === "login";

      loginTabBtn.classList.toggle("active", isLogin);
      registerTabBtn.classList.toggle("active", !isLogin);

      loginForm.classList.toggle("hidden", !isLogin);
      registerForm.classList.toggle("hidden", isLogin);

      activateStep.classList.add("hidden");
      readyStep.classList.add("hidden");
      authTabs.style.display = "grid";
      bottomHint.style.display = "block";
      activateHint.textContent = "هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل.";
      hideBanner();

      if (isLogin) {
        document.getElementById("panelTitle").textContent = "تسجيل الدخول";
        document.getElementById("panelSubtitle").textContent = "سجّل الدخول إلى حسابك، أو أنشئ حسابًا جديدًا إذا لم يكن لديك حساب.";
      } else {
        document.getElementById("panelTitle").textContent = "إنشاء حساب";
        document.getElementById("panelSubtitle").textContent = "أنشئ حسابًا جديدًا للمتابعة إلى خطوة التفعيل.";
      }

      const savedEmail = getStoredEmail();
      if (savedEmail) {
        loginEmail.value = savedEmail;
        registerEmail.value = savedEmail;
      }
    }

    function showActivateStep(email, message = "", options = {}) {
      const {
        bannerType = "info",
        hintText = "هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل."
      } = options;

      authTabs.style.display = "none";
      loginForm.classList.add("hidden");
      registerForm.classList.add("hidden");
      readyStep.classList.add("hidden");
      activateStep.classList.remove("hidden");
      linkedEmail.value = email || getStoredEmail() || "";
      activateHint.textContent = hintText;
      document.getElementById("panelTitle").textContent = "تفعيل اللعبة";
      document.getElementById("panelSubtitle").textContent = "أدخل كود التفعيل لمرة واحدة فقط، وبعد نجاحه تدخل إلى اللعبة مباشرة.";
      bottomHint.style.display = "block";

      if (message) showBanner(message, bannerType);
      else hideBanner();
    }

    function showReadyStep(email, message = "") {
      authTabs.style.display = "none";
      loginForm.classList.add("hidden");
      registerForm.classList.add("hidden");
      activateStep.classList.add("hidden");
      readyStep.classList.remove("hidden");
      document.getElementById("panelTitle").textContent = "اللعبة جاهزة";
      document.getElementById("panelSubtitle").textContent = "تم ربط حسابك بنجاح، ويمكنك الآن الدخول إلى اللعبة.";
      readyEmail.textContent = email ? "الإيميل المرتبط: " + email : "";
      bottomHint.style.display = "none";
      if (message) showBanner(message, "success");
      else hideBanner();
    }

    function setLoading(button, loading, textWhenIdle, loadingText = "جاري التنفيذ…") {
      if (!button) return;

      if (loading) {
        freezeLayout(1400);

        if (button.dataset.loadingActive !== "1") {
          loadingCount += 1;
          button.dataset.loadingActive = "1";
        }

        button.dataset.originalText = button.textContent;
        button.textContent = loadingText;
        button.classList.add("loading");
        button.disabled = true;
      } else {
        if (button.dataset.loadingActive === "1") {
          loadingCount = Math.max(0, loadingCount - 1);
          button.dataset.loadingActive = "0";
        }

        button.textContent = button.dataset.originalText || textWhenIdle;
        button.classList.remove("loading");
        button.disabled = false;

        setTimeout(() => {
          updateLayout(true);
        }, 90);
      }
    }

    function pickToken(data) {
      return data?.token || data?.access_token || data?.jwt || data?.session?.token || "";
    }

    function pickEmail(data) {
      return data?.email || data?.user?.email || getStoredEmail() || "";
    }

    function isActivated(data) {
      return !!(
        data?.activated === true ||
        data?.is_activated === true ||
        data?.isActivated === true ||
        data?.user?.activated === true ||
        data?.user?.is_activated === true ||
        data?.user?.isActivated === true ||
        data?.has_access === true ||
        data?.can_play === true ||
        data?.status === "activated"
      );
    }

    function needsActivation(data) {
      if (isActivated(data)) return false;

      return !!(
        data?.needs_activation === true ||
        data?.user?.activated === false ||
        data?.activated === false
      );
    }

    function isDeviceLocked(data) {
      return !!(
        data?.device_locked === true ||
        data?.deviceLocked === true
      );
    }

    function hasAccountActivation(data) {
      return !!(
        data?.account_has_activation === true ||
        data?.accountHasActivation === true
      );
    }

    function canEnterGame(stateOrData) {
      return !!isActivated(stateOrData);
    }

    function getErrorMessage(data, fallback) {
      return data?.message || data?.error || data?.detail || fallback;
    }

    function getActivationStepConfig(state) {
      const locked = !!state?.deviceLocked;
      const hadActivation = !!state?.accountHasActivation;

      if (locked && hadActivation) {
        return {
          bannerType: "info",
          message: "هذا الإيميل مرتبط بجهاز آخر. لتشغيل اللعبة على هذا الجهاز أدخل نفس كود التفعيل المرتبط بهذا الحساب.",
          hintText: "هذا الحساب لديه تفعيل سابق على جهاز آخر. إذا أردت تشغيل اللعبة هنا فأدخل نفس كود التفعيل المرتبط بهذا الحساب."
        };
      }

      return {
        bannerType: "success",
        message: "تم تسجيل الدخول بنجاح. أكمل التفعيل بإدخال الكود.",
        hintText: "هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل."
      };
    }

    async function apiRequest(url, options = {}) {
      const token = getToken();
      const deviceId = getDeviceId();

      const headers = {
        "Content-Type": "application/json",
        "X-Device-Id": deviceId,
        ...(options.headers || {})
      };

      if (token) {
        headers.Authorization = "Bearer " + token;
      }

      const response = await fetch(url, {
        method: options.method || "POST",
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined,
        cache: "no-store",
        credentials: "include"
      });

      let data = {};
      try {
        data = await response.json();
      } catch (_) {}

      const newToken = pickToken(data);
      const newEmail = normalizeEmail(pickEmail(data) || "");

      if (newToken) setToken(newToken);
      if (newEmail) setStoredEmail(newEmail);

      return { ok: response.ok, status: response.status, data };
    }

    async function resolveSessionState() {
      const result = await apiRequest(API.me, { method: "GET" });

      if (!result.ok) {
        clearToken();
        return {
          ok: false,
          requiresLogin: true,
          email: ""
        };
      }

      const resolvedEmail = normalizeEmail(pickEmail(result.data) || getStoredEmail());
      if (resolvedEmail) setStoredEmail(resolvedEmail);

      return {
        ok: true,
        requiresLogin: false,
        email: resolvedEmail,
        activated: isActivated(result.data),
        needsActivation: needsActivation(result.data),
        deviceLocked: isDeviceLocked(result.data),
        accountHasActivation: hasAccountActivation(result.data),
        data: result.data
      };
    }

    async function hydrateFromSession() {
      const email = getStoredEmail();
      if (email) {
        loginEmail.value = email;
        registerEmail.value = email;
      }

      getDeviceId();

      const token = getToken();
      if (!token) {
        setMode("login");
        return;
      }

      try {
        const state = await resolveSessionState();

        if (!state.ok || state.requiresLogin) {
          setMode("login");
          return;
        }

        if (canEnterGame(state)) {
          redirectToGame();
          return;
        }

        const config = getActivationStepConfig(state);
        showActivateStep(state.email, config.message, {
          bannerType: config.bannerType,
          hintText: config.hintText
        });
      } catch (_) {
        setMode("login");
      }
    }

    loginTabBtn.addEventListener("click", () => {
      freezeLayout(700);
      setMode("login");
    });

    registerTabBtn.addEventListener("click", () => {
      freezeLayout(700);
      setMode("register");
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = normalizeEmail(loginEmail.value);
      const password = String(loginPassword.value || "").trim();

      if (!email || !password) {
        showBanner("أدخل الإيميل وكلمة المرور.", "error");
        return;
      }

      setLoading(loginBtn, true, "دخول", "جاري الدخول…");

      try {
        const result = await apiRequest(API.login, {
          method: "POST",
          body: { email, password }
        });

        if (!result.ok) {
          showBanner(getErrorMessage(result.data, "فشل تسجيل الدخول."), "error");
          return;
        }

        const token = pickToken(result.data);
        const resolvedEmail = normalizeEmail(pickEmail(result.data) || email);

        if (token) setToken(token);
        if (resolvedEmail) setStoredEmail(resolvedEmail);

        const state = await resolveSessionState();

        if (!state.ok || state.requiresLogin) {
          showBanner("فشل التحقق من الجلسة بعد تسجيل الدخول.", "error");
          return;
        }

        if (canEnterGame(state)) {
          redirectToGame();
          return;
        }

        const config = getActivationStepConfig(state);
        showActivateStep(state.email || resolvedEmail, config.message, {
          bannerType: config.bannerType,
          hintText: config.hintText
        });
      } catch (_) {
        showBanner("تعذر الاتصال بالخادم.", "error");
      } finally {
        setLoading(loginBtn, false, "دخول");
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = normalizeEmail(registerEmail.value);
      const password = String(registerPassword.value || "").trim();
      const password2 = String(registerPassword2.value || "").trim();

      if (!email || !password || !password2) {
        showBanner("أكمل جميع الحقول أولًا.", "error");
        return;
      }

      if (password.length < 6) {
        showBanner("كلمة المرور يجب أن تكون 6 أحرف أو أكثر.", "error");
        return;
      }

      if (password !== password2) {
        showBanner("كلمتا المرور غير متطابقتين.", "error");
        return;
      }

      setLoading(registerBtn, true, "إنشاء", "جاري الإنشاء…");

      try {
        const result = await apiRequest(API.register, {
          method: "POST",
          body: { email, password }
        });

        if (!result.ok) {
          showBanner(getErrorMessage(result.data, "فشل إنشاء الحساب."), "error");
          return;
        }

        const token = pickToken(result.data);
        const resolvedEmail = normalizeEmail(pickEmail(result.data) || email);

        if (token) setToken(token);
        if (resolvedEmail) setStoredEmail(resolvedEmail);

        const state = await resolveSessionState();

        if (!state.ok || state.requiresLogin) {
          showBanner("فشل التحقق من الجلسة بعد إنشاء الحساب.", "error");
          return;
        }

        if (canEnterGame(state)) {
          redirectToGame();
          return;
        }

        showActivateStep(state.email || resolvedEmail, "تم إنشاء الحساب بنجاح ✅ الآن أدخل كود اللعبة.", {
          bannerType: "success",
          hintText: "هذا الحساب غير مفعّل بعد. أدخل الكود مرة واحدة فقط لإكمال التفعيل."
        });
      } catch (_) {
        showBanner("تعذر الاتصال بالخادم.", "error");
      } finally {
        setLoading(registerBtn, false, "إنشاء");
      }
    });

    activateBtn.addEventListener("click", async () => {
      const code = normalizeCode(activateCode.value);
      const email = normalizeEmail(linkedEmail.value.trim() || getStoredEmail());

      activateCode.value = code;

      if (!code) {
        showBanner("أدخل كود اللعبة أولًا.", "error");
        return;
      }

      setLoading(activateBtn, true, "تفعيل", "جاري التفعيل…");

      try {
        const result = await apiRequest(API.activate, {
          method: "POST",
          body: { code, email }
        });

        if (!result.ok) {
          showBanner(getErrorMessage(result.data, "فشل تفعيل الكود."), "error");
          return;
        }

        if (email) setStoredEmail(email);

        const state = await resolveSessionState();

        if (state.ok && canEnterGame(state)) {
          redirectToGame();
          return;
        }

        showReadyStep(email, "تم تفعيل اللعبة بنجاح ✅");
      } catch (_) {
        showBanner("تعذر الاتصال بالخادم.", "error");
      } finally {
        setLoading(activateBtn, false, "تفعيل");
      }
    });

    function doLogout() {
      freezeLayout(900);
      clearToken();
      clearStoredEmail();
      activateCode.value = "";
      linkedEmail.value = "";
      readyEmail.textContent = "";
      loginPassword.value = "";
      registerPassword.value = "";
      registerPassword2.value = "";
      setMode("login");
      showBanner("تم تسجيل الخروج.", "success");
    }

    logoutBtn1.addEventListener("click", doLogout);
    logoutBtn2.addEventListener("click", doLogout);

    enterGameBtn.addEventListener("click", () => {
      freezeLayout(900);
      redirectToGame();
    });

    function isTypingNow() {
      return typingInputs.includes(document.activeElement);
    }

    function updateStableViewport() {
      if (isTypingNow() || isLayoutFrozen()) return;
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight(force = false) {
      if ((!isTypingNow() && !isLayoutFrozen()) || (force && !isLayoutFrozen())) {
        updateStableViewport();
      }
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport(force = false) {
      if ((!isTypingNow() && !isLayoutFrozen()) || (force && !isLayoutFrozen())) {
        updateStableViewport();
      }

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;
      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      if (isTypingNow() || isLayoutFrozen()) return;

      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout(force = false) {
      if ((!isTypingNow() && !isLayoutFrozen()) || (force && !isLayoutFrozen())) {
        updateStableViewport();
      }

      applyOrientationClass();
      setAppHeight(force);

      requestAnimationFrame(() => {
        fitGameToViewport(force);
        if (!isTypingNow() && !isLayoutFrozen()) {
          nudgeSafariBar();
        }
      });
    }

    document.addEventListener("touchstart", (event) => {
      const target = event.target;
      if (target && target.closest && target.closest(".primary-btn, .secondary-btn, .tab-btn")) {
        freezeLayout(900);
      }
    }, { passive:true, capture:true });

    document.addEventListener("pointerdown", (event) => {
      const target = event.target;
      if (target && target.closest && target.closest(".primary-btn, .secondary-btn, .tab-btn")) {
        freezeLayout(900);
      }
    }, { passive:true, capture:true });

    typingInputs.forEach(input => {
      input.addEventListener("focus", () => {
        document.body.classList.add("typing");
      });

      input.addEventListener("blur", () => {
        setTimeout(() => {
          document.body.classList.remove("typing");
          updateLayout(true);
        }, 80);
      });
    });

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    hydrateFromSession();
    updateLayout(true);

    window.addEventListener("load", () => {
      setTimeout(() => updateLayout(true), 60);
      setTimeout(() => updateLayout(true), 220);
    }, { passive: true });

    window.addEventListener("resize", () => {
      if (!isTypingNow() && !isLayoutFrozen()) updateLayout();
    }, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => updateLayout(true), 80);
      setTimeout(() => updateLayout(true), 250);
      setTimeout(() => updateLayout(true), 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (!isTypingNow() && !isLayoutFrozen()) updateLayout();
      }, { passive: true });

      window.visualViewport.addEventListener("scroll", () => {
        if (!isTypingNow() && !isLayoutFrozen()) updateLayout();
      }, { passive: true });
    }
  </script>
</body>
