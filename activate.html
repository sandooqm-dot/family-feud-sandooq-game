<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Activate</title>

  <link rel="preload" as="image" href="logo-family-feud.PNG">
  <link rel="preload" as="image" href="logo.PNG">

  <style>
    :root{
      --gold:#f1d14f;
      --white:#f4f2ea;
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --panel-blue-1:#0f2c88;
      --panel-blue-2:#081d61;
      --soft-blue:rgba(46,81,198,.28);
      --soft-blue-2:rgba(255,255,255,.08);
      --orange-1:#ff922b;
      --orange-2:#ff7b14;
      --dark:#0f0f0f;
      --input-bg:#f3f3f3;
      --input-text:#222;
      --muted:#d7def8;
      --danger:#ffd8d8;
      --success:#d9ffe4;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:150px;
      height:150px;
      object-fit:contain;
      z-index:5;
    }

    .hero-logo-wrap{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:340px;
      min-height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:150px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:52px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .auth-panel{
      position:absolute;
      left:50%;
      top:438px;
      transform:translate(-50%, -50%);
      width:820px;
      min-height:455px;
      border-radius:36px;
      border:10px solid var(--dark);
      background:linear-gradient(180deg, var(--panel-blue-1) 0%, var(--panel-blue-2) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:118px 30px 28px;
      display:flex;
      flex-direction:column;
      z-index:3;
      overflow:hidden;
    }

    .tabs-dock{
      position:absolute;
      top:18px;
      left:28px;
      right:28px;
      height:76px;
      border-radius:26px;
      border:4px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, rgba(17,40,120,.58) 0%, rgba(8,29,97,.30) 100%);
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      z-index:7;
    }

    .tab-btn{
      border:none;
      background:transparent;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      cursor:pointer;
      transition:background .15s ease, color .15s ease, filter .15s ease;
      height:100%;
      width:100%;
    }

    .tab-btn + .tab-btn{
      border-right:3px solid rgba(243,242,234,.65);
    }

    .tab-btn.active{
      background:linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
      color:#fff;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.28);
    }

    .panel-title{
      text-align:center;
      color:var(--white);
      font-size:40px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:10px;
    }

    .panel-subtitle{
      text-align:center;
      color:var(--muted);
      font-size:21px;
      font-weight:700;
      line-height:1.7;
      margin-bottom:14px;
      min-height:64px;
      padding:0 8px;
    }

    .status-text{
      min-height:28px;
      text-align:center;
      font-size:18px;
      font-weight:800;
      line-height:1.5;
      margin-bottom:10px;
      color:var(--muted);
    }

    .status-text.error{
      color:var(--danger);
    }

    .status-text.success{
      color:var(--success);
    }

    .status-text.hidden{
      visibility:hidden;
    }

    .form-view{
      display:none;
      flex-direction:column;
      gap:14px;
    }

    .form-view.active{
      display:flex;
    }

    .input{
      width:100%;
      height:72px;
      border-radius:999px;
      border:4px solid #101010;
      background:var(--input-bg);
      color:var(--input-text);
      font-size:24px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 18px;
      box-shadow:inset 0 2px 0 rgba(255,255,255,.75);
    }

    .input::placeholder{
      color:#777;
      font-weight:700;
      font-size:20px;
    }

    .primary-btn{
      width:220px;
      height:74px;
      margin:8px auto 0;
      border-radius:999px;
      border:5px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
      color:#fff;
      font-size:34px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }

    .primary-btn:hover:not(:disabled){
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .primary-btn:active:not(:disabled){
      transform:scale(.985);
    }

    .primary-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .secondary-row{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .secondary-btn{
      min-width:200px;
      height:62px;
      border-radius:22px;
      border:4px solid rgba(243,242,234,.95);
      background:var(--soft-blue);
      color:var(--white);
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    .secondary-btn:hover:not(:disabled){
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .secondary-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      filter:none;
    }

    .activate-note{
      text-align:center;
      color:var(--gold);
      font-size:18px;
      font-weight:800;
      line-height:1.7;
      margin-top:2px;
    }

    body.portrait .game-shell{
      width:640px;
      height:1280px;
    }

    body.portrait .store-logo{
      top:10px;
      left:2px;
      width:132px;
      height:132px;
    }

    body.portrait .hero-logo-wrap{
      top:95px;
      width:390px;
      min-height:200px;
    }

    body.portrait .hero-logo{
      max-height:200px;
    }

    body.portrait .auth-panel{
      top:760px;
      width:610px;
      min-height:610px;
      padding:112px 24px 28px;
    }

    body.portrait .tabs-dock{
      top:16px;
      left:22px;
      right:22px;
      height:72px;
      border-radius:24px;
    }

    body.portrait .tab-btn{
      font-size:24px;
    }

    body.portrait .panel-title{
      font-size:38px;
    }

    body.portrait .panel-subtitle{
      font-size:20px;
      min-height:72px;
    }

    body.portrait .input{
      height:78px;
      font-size:24px;
    }

    body.portrait .input::placeholder{
      font-size:19px;
    }

    body.portrait .primary-btn{
      width:230px;
      height:80px;
      font-size:38px;
    }

    body.portrait .secondary-btn{
      min-width:170px;
      height:64px;
      font-size:22px;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img
          id="storeLogo"
          class="store-logo"
          src="logo.PNG"
          alt="صندوق المسابقات"
          width="150"
          height="150"
          loading="eager"
          decoding="async"
          fetchpriority="low"
        />

        <div class="hero-logo-wrap">
          <img
            id="familyLogo"
            class="hero-logo"
            src="logo-family-feud.PNG"
            alt="فاميلي فيود"
            width="1536"
            height="1024"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
          <div id="familyLogoFallback" class="hero-logo-fallback">فاميلي فيود</div>
        </div>

        <section class="auth-panel">
          <div class="tabs-dock">
            <button id="loginTabBtn" class="tab-btn active" type="button">تسجيل الدخول</button>
            <button id="registerTabBtn" class="tab-btn" type="button">إنشاء حساب</button>
          </div>

          <div id="panelTitle" class="panel-title">تسجيل الدخول</div>
          <div id="panelSubtitle" class="panel-subtitle">
            سجّل الدخول إلى حسابك، أو أنشئ حسابًا جديدًا إذا لم يكن لديك حساب.
          </div>

          <div id="statusText" class="status-text hidden">.</div>

          <div id="loginView" class="form-view active">
            <input id="loginEmail" class="input" type="email" placeholder="البريد الإلكتروني" autocomplete="email">
            <input id="loginPassword" class="input" type="password" placeholder="كلمة المرور" autocomplete="current-password">
            <button id="loginBtn" class="primary-btn" type="button">دخول</button>
          </div>

          <div id="registerView" class="form-view">
            <input id="registerEmail" class="input" type="email" placeholder="البريد الإلكتروني" autocomplete="email">
            <input id="registerPassword" class="input" type="password" placeholder="كلمة المرور" autocomplete="new-password">
            <input id="registerPassword2" class="input" type="password" placeholder="تأكيد كلمة المرور" autocomplete="new-password">
            <button id="registerBtn" class="primary-btn" type="button">إنشاء</button>
          </div>

          <div id="activateView" class="form-view">
            <input id="activateCode" class="input" type="text" placeholder="اكتب كود التفعيل هنا" autocomplete="off">
            <button id="activateBtn" class="primary-btn" type="button">تفعيل</button>

            <div class="secondary-row">
              <button id="backToLoginBtn" class="secondary-btn" type="button">العودة للدخول</button>
            </div>

            <div class="activate-note">بعد نجاح التفعيل يتم إدخالك مباشرة إلى اللعبة.</div>
          </div>
        </section>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 640;
    const PORTRAIT_HEIGHT = 1280;

    const TOKEN_KEY = "familyfeud_token_v1";
    const DEVICE_KEY = "familyfeud_device_id_v1";
    const API_BASE_KEY = "familyfeud_api_base";
    const BUZZ_API_BASE_KEY = "familyfeud_buzz_api_base";

    const ENDPOINTS = {
      me: ["/api2/me", "/api/me"],
      login: ["/api2/login", "/api/login"],
      register: ["/api2/register", "/api/register"],
      activate: ["/api2/activate", "/api/activate"]
    };

    const root = document.documentElement;

    const loginTabBtn = document.getElementById("loginTabBtn");
    const registerTabBtn = document.getElementById("registerTabBtn");

    const panelTitle = document.getElementById("panelTitle");
    const panelSubtitle = document.getElementById("panelSubtitle");
    const statusText = document.getElementById("statusText");

    const loginView = document.getElementById("loginView");
    const registerView = document.getElementById("registerView");
    const activateView = document.getElementById("activateView");

    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");

    const registerEmail = document.getElementById("registerEmail");
    const registerPassword = document.getElementById("registerPassword");
    const registerPassword2 = document.getElementById("registerPassword2");
    const registerBtn = document.getElementById("registerBtn");

    const activateCode = document.getElementById("activateCode");
    const activateBtn = document.getElementById("activateBtn");
    const backToLoginBtn = document.getElementById("backToLoginBtn");

    const typingInputs = [
      loginEmail, loginPassword,
      registerEmail, registerPassword, registerPassword2,
      activateCode
    ];

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;
    let currentView = "login";
    let currentApiBase = "";
    const deviceId = getOrCreateDeviceId();

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function writeStored(key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
      try { sessionStorage.setItem(key, value); } catch (e) {}
    }

    function removeStored(key) {
      try { localStorage.removeItem(key); } catch (e) {}
      try { sessionStorage.removeItem(key); } catch (e) {}
    }

    function normalizeBase(base) {
      return String(base || "").trim().replace(/\/+$/, "");
    }

    function getApiBases() {
      const seen = new Set();
      const result = [];

      const candidates = [
        currentApiBase,
        readStored(API_BASE_KEY),
        readStored(BUZZ_API_BASE_KEY),
        window.location.origin.includes("workers.dev") ? window.location.origin : "",
        "https://family-feud-buzz.sandooq-m.workers.dev",
        "https://z.sandooq-m.workers.dev"
      ];

      candidates.forEach((base) => {
        const normalized = normalizeBase(base);
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        result.push(normalized);
      });

      return result;
    }

    function getOrCreateDeviceId() {
      let id = readStored(DEVICE_KEY);
      if (id) return id;

      if (window.crypto && crypto.randomUUID) {
        id = crypto.randomUUID();
      } else {
        id = "ffdev_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      id = String(id).replace(/[^\w-]/g, "").slice(0, 120);
      writeStored(DEVICE_KEY, id);
      return id;
    }

    function showStatus(text = "", type = "") {
      if (!text) {
        statusText.textContent = ".";
        statusText.className = "status-text hidden";
        return;
      }

      statusText.textContent = text;
      statusText.className = "status-text";
      if (type) statusText.classList.add(type);
    }

    function setView(viewName) {
      currentView = viewName;

      loginView.classList.toggle("active", viewName === "login");
      registerView.classList.toggle("active", viewName === "register");
      activateView.classList.toggle("active", viewName === "activate");

      loginTabBtn.classList.toggle("active", viewName === "login");
      registerTabBtn.classList.toggle("active", viewName === "register");

      if (viewName === "login") {
        panelTitle.textContent = "تسجيل الدخول";
        panelSubtitle.textContent = "إذا كانت هذه أول مرة تدخل اللعبة، اضغط إنشاء حساب أولًا ثم أنشئ حسابك للدخول.";
      } else if (viewName === "register") {
        panelTitle.textContent = "إنشاء حساب";
        panelSubtitle.textContent = "أنشئ حسابًا جديدًا للمتابعة، ثم انتقل إلى خطوة تفعيل اللعبة بالكود.";
      } else {
        panelTitle.textContent = "تفعيل اللعبة";
        panelSubtitle.textContent = "أدخل كود التفعيل لمرة واحدة فقط، وبعد نجاحه تدخل إلى اللعبة مباشرة.";
      }
    }

    function isTypingNow() {
      return typingInputs.includes(document.activeElement);
    }

    function updateStableViewport() {
      if (isTypingNow()) return;
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;
      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      if (isTypingNow()) return;

      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      applyOrientationClass();
      setAppHeight(force);

      requestAnimationFrame(() => {
        fitGameToViewport(force);
        if (!isTypingNow() || force) {
          nudgeSafariBar();
        }
      });
    }

    function buildIndexLink() {
      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/activate\.html?$/i.test(path)) {
        url.pathname = path.replace(/activate\.html?$/i, "index.html");
      } else if (path.endsWith("/")) {
        url.pathname = path + "index.html";
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/index.html");
      }

      url.search = "";
      url.hash = "";
      return url.toString();
    }

    async function fetchJsonResponse(url, options) {
      const response = await fetch(url, options);
      const contentType = String(response.headers.get("content-type") || "").toLowerCase();
      let data = null;

      if (contentType.includes("application/json")) {
        data = await response.json().catch(() => null);
      } else {
        const text = await response.text().catch(() => "");
        data = text ? { raw: text } : null;
      }

      return {
        ok: response.ok,
        status: response.status,
        contentType,
        data
      };
    }

    async function detectApiBase() {
      const bases = getApiBases();
      const authHeaders = getAuthHeaders();
      const probeHeaders = {
        "Accept": "application/json",
        "X-Device-Id": deviceId,
        ...authHeaders
      };

      for (const base of bases) {
        for (const path of ENDPOINTS.me) {
          try {
            const result = await fetchJsonResponse(`${base}${path}`, {
              method: "GET",
              cache: "no-store",
              headers: probeHeaders
            });

            const looksJson = result.contentType.includes("application/json") || typeof result.data === "object";
            const looksValid = looksJson && result.status !== 404;

            if (!looksValid) continue;

            currentApiBase = base;
            writeStored(API_BASE_KEY, base);
            writeStored(BUZZ_API_BASE_KEY, base);
            return true;
          } catch (e) {}
        }
      }

      currentApiBase = "";
      return false;
    }

    async function apiRequest(paths, payload = null, extraHeaders = {}) {
      if (!currentApiBase) {
        const ok = await detectApiBase();
        if (!ok) throw new Error("API_BASE_NOT_FOUND");
      }

      const pathList = Array.isArray(paths) ? paths : [paths];

      for (const path of pathList) {
        try {
          const headers = {
            "Accept": "application/json",
            "X-Device-Id": deviceId,
            ...extraHeaders
          };

          const options = {
            method: payload ? "POST" : "GET",
            cache: "no-store",
            headers
          };

          if (payload) {
            headers["Content-Type"] = "application/json";
            options.body = JSON.stringify(payload);
          }

          const result = await fetchJsonResponse(`${currentApiBase}${path}`, options);
          const isGoodJson = result.contentType.includes("application/json") || typeof result.data === "object";

          if (!isGoodJson) continue;

          if (result.status !== 404) {
            return result;
          }
        } catch (e) {}
      }

      return {
        ok: false,
        status: 0,
        data: { error: "NETWORK_OR_ENDPOINT_ERROR" }
      };
    }

    function getTokenFromResponse(data) {
      return String(
        data?.token ||
        data?.session?.token ||
        data?.data?.token ||
        ""
      ).trim();
    }

    function storeToken(token) {
      if (!token) return;
      writeStored(TOKEN_KEY, token);
    }

    function readToken() {
      return readStored(TOKEN_KEY);
    }

    function getAuthHeaders() {
      const token = readToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    function humanizeError(errorCode, fallbackText) {
      const code = String(errorCode || "").trim().toUpperCase();

      const map = {
        INVALID_CREDENTIALS: "بيانات الدخول غير صحيحة.",
        INVALID_LOGIN: "بيانات الدخول غير صحيحة.",
        USER_NOT_FOUND: "هذا الحساب غير موجود.",
        EMAIL_ALREADY_EXISTS: "هذا البريد مستخدم من قبل.",
        EMAIL_EXISTS: "هذا البريد مستخدم من قبل.",
        PASSWORD_TOO_SHORT: "كلمة المرور قصيرة جدًا.",
        UNAUTHORIZED: "يجب تسجيل الدخول أولًا.",
        TOKEN_REQUIRED: "يجب تسجيل الدخول أولًا.",
        INVALID_TOKEN: "انتهت الجلسة، سجّل الدخول مرة أخرى.",
        CODE_REQUIRED: "أدخل كود التفعيل أولًا.",
        INVALID_CODE: "كود التفعيل غير صحيح.",
        CODE_NOT_FOUND: "كود التفعيل غير موجود.",
        CODE_ALREADY_USED: "هذا الكود مستخدم مسبقًا.",
        ALREADY_ACTIVATED: "تم تفعيل اللعبة مسبقًا على هذا الحساب.",
        ACTIVATION_REQUIRED: "هذا الحساب يحتاج تفعيلًا بالكود.",
        NETWORK_OR_ENDPOINT_ERROR: "تعذر الاتصال بالخادم الآن.",
        API_BASE_NOT_FOUND: "تعذر العثور على رابط الباكند الصحيح."
      };

      return map[code] || fallbackText || "حدث خطأ غير متوقع.";
    }

    async function requestMe() {
      const headers = getAuthHeaders();
      if (!headers.Authorization) {
        return { ok: false, data: {} };
      }

      return await apiRequest(ENDPOINTS.me, null, headers);
    }

    function isActivatedPayload(data) {
      return !!(
        data?.activated === true ||
        data?.is_activated === true ||
        data?.user?.activated === true ||
        data?.user?.is_activated === true ||
        data?.account?.activated === true
      );
    }

    async function tryAutoLogin() {
      const token = readToken();
      if (!token) return;

      const me = await requestMe();
      if (!me.ok) {
        removeStored(TOKEN_KEY);
        return;
      }

      if (isActivatedPayload(me.data)) {
        showStatus("تم التحقق من الجلسة، جارٍ الدخول...", "success");
        setTimeout(() => {
          window.location.href = buildIndexLink();
        }, 450);
        return;
      }

      setView("activate");
      showStatus("الحساب مسجل، بقي إدخال كود التفعيل.", "success");
    }

    async function handleLogin() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showStatus("أدخل البريد الإلكتروني وكلمة المرور.", "error");
        return;
      }

      loginBtn.disabled = true;
      showStatus("جارٍ تسجيل الدخول...");

      try {
        const res = await apiRequest(ENDPOINTS.login, { email, password });

        if (!res.ok) {
          showStatus(humanizeError(res?.data?.error, "تعذر تسجيل الدخول. تأكد من البيانات."), "error");
          return;
        }

        const token = getTokenFromResponse(res.data);
        if (token) storeToken(token);

        const me = await requestMe();

        if (me.ok && isActivatedPayload(me.data)) {
          showStatus("تم تسجيل الدخول بنجاح، جارٍ الدخول...", "success");
          setTimeout(() => {
            window.location.href = buildIndexLink();
          }, 500);
          return;
        }

        setView("activate");
        showStatus("تم تسجيل الدخول. هذا الحساب يحتاج إلى التفعيل بالكود.", "success");
      } catch (error) {
        showStatus(humanizeError(error?.message, "تعذر الاتصال بالخادم الآن."), "error");
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function handleRegister() {
      const email = registerEmail.value.trim();
      const password = registerPassword.value;
      const password2 = registerPassword2.value;

      if (!email || !password || !password2) {
        showStatus("أكمل جميع الحقول المطلوبة.", "error");
        return;
      }

      if (password.length < 6) {
        showStatus("كلمة المرور يجب أن تكون 6 أحرف أو أكثر.", "error");
        return;
      }

      if (password !== password2) {
        showStatus("كلمتا المرور غير متطابقتين.", "error");
        return;
      }

      registerBtn.disabled = true;
      showStatus("جارٍ إنشاء الحساب...");

      try {
        const res = await apiRequest(ENDPOINTS.register, { email, password });

        if (!res.ok) {
          showStatus(humanizeError(res?.data?.error, "تعذر إنشاء الحساب الآن."), "error");
          return;
        }

        let token = getTokenFromResponse(res.data);

        if (!token) {
          const loginRes = await apiRequest(ENDPOINTS.login, { email, password });
          if (loginRes.ok) {
            token = getTokenFromResponse(loginRes.data);
          }
        }

        if (token) storeToken(token);

        setView("activate");
        showStatus("تم إنشاء الحساب بنجاح. الآن أدخل كود التفعيل.", "success");
      } catch (error) {
        showStatus(humanizeError(error?.message, "تعذر الاتصال بالخادم الآن."), "error");
      } finally {
        registerBtn.disabled = false;
      }
    }

    async function handleActivate() {
      const code = activateCode.value.trim();
      const token = readToken();

      if (!code) {
        showStatus("أدخل كود التفعيل أولًا.", "error");
        return;
      }

      if (!token) {
        setView("login");
        showStatus("يجب تسجيل الدخول أولًا قبل التفعيل.", "error");
        return;
      }

      activateBtn.disabled = true;
      showStatus("جارٍ تفعيل اللعبة...");

      try {
        const res = await apiRequest(ENDPOINTS.activate, { code }, getAuthHeaders());

        if (!res.ok) {
          showStatus(humanizeError(res?.data?.error, "تعذر تفعيل الكود الآن."), "error");
          return;
        }

        const tokenFromActivate = getTokenFromResponse(res.data);
        if (tokenFromActivate) storeToken(tokenFromActivate);

        showStatus("تم التفعيل بنجاح، جارٍ الدخول إلى اللعبة...", "success");
        setTimeout(() => {
          window.location.href = buildIndexLink();
        }, 650);
      } catch (error) {
        showStatus(humanizeError(error?.message, "تعذر الاتصال بالخادم الآن."), "error");
      } finally {
        activateBtn.disabled = false;
      }
    }

    loginTabBtn.addEventListener("click", () => {
      setView("login");
      showStatus("");
    });

    registerTabBtn.addEventListener("click", () => {
      setView("register");
      showStatus("");
    });

    backToLoginBtn.addEventListener("click", () => {
      setView("login");
      showStatus("");
    });

    loginBtn.addEventListener("click", handleLogin);
    registerBtn.addEventListener("click", handleRegister);
    activateBtn.addEventListener("click", handleActivate);

    [loginPassword, registerPassword2, activateCode].forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        if (input === loginPassword) handleLogin();
        if (input === registerPassword2) handleRegister();
        if (input === activateCode) handleActivate();
      });
    });

    typingInputs.forEach(input => {
      input.addEventListener("focus", () => {
        document.body.classList.add("typing");
      });

      input.addEventListener("blur", () => {
        setTimeout(() => {
          document.body.classList.remove("typing");
          updateLayout(true);
        }, 80);
      });

      input.addEventListener("input", () => {
        if (!statusText.classList.contains("hidden")) showStatus("");
      });
    });

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    updateLayout(true);
    tryAutoLogin();

    window.addEventListener("load", () => {
      setTimeout(() => updateLayout(true), 60);
      setTimeout(() => updateLayout(true), 220);
    }, { passive: true });

    window.addEventListener("resize", () => {
      if (!isTypingNow()) updateLayout();
    }, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => updateLayout(true), 80);
      setTimeout(() => updateLayout(true), 250);
      setTimeout(() => updateLayout(true), 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });

      window.visualViewport.addEventListener("scroll", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
