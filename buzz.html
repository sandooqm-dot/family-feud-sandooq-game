<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Buzz</title>

  <style>
    :root{
      --gold:#f1d14f;
      --white:#f4f2ea;
      --red-1:#ff5858;
      --red-2:#d91f1f;
      --blue-1:#2b3fc2;
      --blue-2:#06204f;
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(241,209,79,.9) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:150px;
      height:150px;
      object-fit:contain;
      z-index:5;
    }

    .hero-logo-wrap{
      position:absolute;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      width:520px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:220px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:60px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .card{
      position:absolute;
      left:50%;
      top:445px;
      transform:translate(-50%, -50%);
      width:760px;
      min-height:390px;
      border-radius:38px;
      border:10px solid #101010;
      background:linear-gradient(180deg, #103091 0%, #081d61 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:28px 34px 28px;
    }

    .hidden{
      display:none !important;
    }

    .screen{
      width:100%;
      height:100%;
    }

    .screen-title{
      text-align:center;
      color:var(--white);
      font-size:44px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:22px;
    }

    .screen-subtitle{
      text-align:center;
      color:#d9ddf6;
      font-size:22px;
      font-weight:700;
      line-height:1.5;
      margin-bottom:24px;
      min-height:66px;
    }

    .screen-subtitle.error{
      color:#ffd3d3;
    }

    .teams-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:22px;
    }

    .team-choice{
      height:86px;
      border-radius:28px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46,81,198,.24);
      color:var(--white);
      font-size:34px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .team-choice:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .team-choice.selected{
      border-color:var(--gold);
      box-shadow:0 0 0 4px rgba(241,209,79,.16);
      background:rgba(241,209,79,.10);
    }

    .name-input{
      width:100%;
      height:82px;
      border-radius:999px;
      border:4px solid #101010;
      background:#f3f3f3;
      color:#222;
      font-size:28px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 22px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75);
      margin-bottom:24px;
    }

    .name-input::placeholder{
      color:#777;
      font-weight:700;
      font-size:22px;
    }

    .continue-btn{
      width:240px;
      height:88px;
      display:block;
      margin:0 auto;
      border-radius:999px;
      border:5px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #ff922b 0%, #ff7b14 100%);
      color:#ffffff;
      font-size:44px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }

    .continue-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .buzz-top{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-bottom:24px;
    }

    .team-badge{
      min-width:240px;
      min-height:68px;
      padding:14px 24px;
      border-radius:999px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46,81,198,.24);
      color:var(--white);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:34px;
      font-weight:900;
    }

    .player-name{
      color:#d9ddf6;
      font-size:28px;
      font-weight:800;
      text-align:center;
    }

    .buzz-area{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      margin-bottom:18px;
      min-height:280px;
    }

    .buzz-btn{
      width:260px;
      height:260px;
      border-radius:50%;
      border:10px solid rgba(243,242,234,.96);
      background:linear-gradient(180deg, var(--red-1) 0%, var(--red-2) 100%);
      color:#fff;
      font-size:58px;
      font-weight:900;
      cursor:pointer;
      box-shadow:
        inset 0 -16px 0 rgba(0,0,0,.12),
        0 18px 30px rgba(0,0,0,.22);
      transition:transform .12s ease, filter .12s ease, opacity .15s ease;
    }

    .buzz-btn:hover:not(:disabled){
      transform:translateY(-2px);
      filter:brightness(1.03);
    }

    .buzz-btn:active:not(:disabled){
      transform:scale(.97);
    }

    .buzz-btn:disabled{
      opacity:.7;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .buzz-status{
      text-align:center;
      color:#f4f2ea;
      font-size:28px;
      font-weight:800;
      line-height:1.5;
      min-height:48px;
      margin-bottom:18px;
    }

    .secondary-btn{
      display:block;
      min-width:220px;
      height:74px;
      margin:0 auto;
      border-radius:26px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46,81,198,.28);
      color:var(--white);
      font-size:30px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }

    body.portrait .game-shell{
      width:640px;
      height:1280px;
    }

    body.portrait .store-logo{
      top:10px;
      left:2px;
      width:126px;
      height:126px;
    }

    body.portrait .hero-logo-wrap{
      top:128px;
      width:500px;
    }

    body.portrait .hero-logo{
      max-height:280px;
    }

    body.portrait .card{
      top:760px;
      width:610px;
      min-height:560px;
      padding:34px 24px 30px;
    }

    body.portrait .screen-title{
      font-size:42px;
      margin-bottom:18px;
    }

    body.portrait .screen-subtitle{
      font-size:22px;
      margin-bottom:22px;
      min-height:72px;
    }

    body.portrait .teams-grid{
      gap:16px;
      margin-bottom:18px;
    }

    body.portrait .team-choice{
      height:92px;
      font-size:28px;
    }

    body.portrait .name-input{
      height:86px;
      font-size:28px;
      margin-bottom:20px;
    }

    body.portrait .name-input::placeholder{
      font-size:19px;
    }

    body.portrait .continue-btn{
      width:250px;
      height:94px;
      font-size:50px;
    }

    body.portrait .team-badge{
      min-width:260px;
      min-height:72px;
      font-size:32px;
    }

    body.portrait .player-name{
      font-size:30px;
    }

    body.portrait .buzz-btn{
      width:280px;
      height:280px;
      font-size:62px;
    }

    body.portrait .buzz-status{
      font-size:28px;
    }

    body.portrait .secondary-btn{
      min-width:240px;
      height:78px;
      font-size:30px;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img id="storeLogo" class="store-logo" src="logo.PNG" alt="صندوق المسابقات" />

        <div class="hero-logo-wrap">
          <img id="familyLogo" class="hero-logo" src="logo-family-feud.PNG" alt="فاميلي فيود" />
          <div id="familyLogoFallback" class="hero-logo-fallback">فاميلي فيود</div>
        </div>

        <section class="card">
          <div id="joinScreen" class="screen">
            <div class="screen-title">الانضمام إلى الجرس</div>
            <div id="joinSubtitle" class="screen-subtitle">اختر الفريق ثم اكتب اسمك للانتقال إلى شاشة الجرس</div>

            <div class="teams-grid">
              <button id="teamOneBtn" class="team-choice" type="button">الفريق الأول</button>
              <button id="teamTwoBtn" class="team-choice" type="button">الفريق الثاني</button>
            </div>

            <input id="playerNameInput" class="name-input" type="text" placeholder="اكتب اسمك هنا..." />

            <button id="continueBtn" class="continue-btn" type="button" disabled>متابعة</button>
          </div>

          <div id="buzzScreen" class="screen hidden">
            <div class="buzz-top">
              <div id="teamBadge" class="team-badge">الفريق الأول</div>
              <div id="playerNameLabel" class="player-name">اسم اللاعب</div>
            </div>

            <div id="buzzArea" class="buzz-area">
              <button id="buzzBtn" class="buzz-btn" type="button">جرس</button>
            </div>

            <div id="buzzStatus" class="buzz-status">اضغط الجرس عندما تبدأ الجولة</div>

            <button id="backBtn" class="secondary-btn" type="button">تغيير الفريق</button>
          </div>
        </section>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 640;
    const PORTRAIT_HEIGHT = 1280;
    const FALLBACK_POLL_MS = 1200;

    const STORAGE = {
      apiBase: "familyfeud_api_base",
      buzzApiBase: "familyfeud_buzz_api_base",
      room: "familyfeud_room_id",
      buzzRoom: "familyfeud_buzz_room",
      team: "familyfeud_buzz_team",
      name: "familyfeud_buzz_name",
      playerId: "familyfeud_buzz_player_id"
    };

    let API_BASE = "";
    let pusher = null;
    let pusherChannel = null;
    let fallbackPoll = null;
    let currentBuzzState = null;
    let currentGameDisplay = null;
    let joinInFlight = false;
    let pressInFlight = false;
    let syncStarted = false;

    const root = document.documentElement;

    const joinScreen = document.getElementById("joinScreen");
    const buzzScreen = document.getElementById("buzzScreen");

    const teamOneBtn = document.getElementById("teamOneBtn");
    const teamTwoBtn = document.getElementById("teamTwoBtn");
    const playerNameInput = document.getElementById("playerNameInput");
    const continueBtn = document.getElementById("continueBtn");
    const joinSubtitle = document.getElementById("joinSubtitle");

    const teamBadge = document.getElementById("teamBadge");
    const playerNameLabel = document.getElementById("playerNameLabel");
    const buzzBtn = document.getElementById("buzzBtn");
    const buzzStatus = document.getElementById("buzzStatus");
    const backBtn = document.getElementById("backBtn");

    let selectedTeam = readStored(STORAGE.team) || "";
    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;

    const roomId = getRoomId();
    const playerId = getOrCreatePlayerId();

    function writeStored(key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
      try { sessionStorage.setItem(key, value); } catch (e) {}
    }

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function normalizeBase(base) {
      return String(base || "").trim().replace(/\/+$/, "");
    }

    function buildApiCandidates() {
      const params = new URLSearchParams(window.location.search);

      const candidates = [
        readStored(STORAGE.apiBase),
        readStored(STORAGE.buzzApiBase),
        params.get("api"),
        window.location.hostname.endsWith(".workers.dev") ? window.location.origin : "",
        "https://z.sandooq-m.workers.dev",
        "https://family-feud-buzz.sandooq-m.workers.dev"
      ];

      return [...new Set(candidates.map(v => normalizeBase(v)).filter(Boolean))];
    }

    async function detectApiBase() {
      const candidates = buildApiCandidates();

      for (const candidate of candidates) {
        try {
          const response = await fetch(`${candidate}/api/buzz/state?room=${encodeURIComponent(roomId)}`, {
            method: "GET",
            cache: "no-store",
            headers: {
              "Accept": "application/json",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache"
            }
          });

          const data = await response.json().catch(() => null);
          if (!response.ok || !data || !data.state) continue;

          API_BASE = candidate;
          writeStored(STORAGE.apiBase, candidate);
          writeStored(STORAGE.buzzApiBase, candidate);
          return true;
        } catch (error) {}
      }

      API_BASE = "";
      return false;
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function isTypingNow() {
      return document.activeElement === playerNameInput;
    }

    function updateStableViewport() {
      if (isTypingNow()) return;
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      if (isTypingNow()) return;

      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      applyOrientationClass();
      setAppHeight(force);

      requestAnimationFrame(() => {
        fitGameToViewport(force);
        if (!isTypingNow() || force) {
          nudgeSafariBar();
        }
      });
    }

    function normalizeRoom(value) {
      return String(value || "").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "").slice(0, 64);
    }

    function getRoomId() {
      const url = new URL(window.location.href);
      const fromQuery = normalizeRoom(url.searchParams.get("room"));
      const fromStorage = normalizeRoom(readStored(STORAGE.room) || readStored(STORAGE.buzzRoom));
      const room = fromQuery || fromStorage || "family-feud-demo";

      writeStored(STORAGE.room, room);
      writeStored(STORAGE.buzzRoom, room);

      return room;
    }

    function getOrCreatePlayerId() {
      let id = readStored(STORAGE.playerId);
      if (id) return id;

      if (window.crypto && crypto.randomUUID) {
        id = crypto.randomUUID();
      } else {
        id = "p_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      id = id.replace(/[^\w-]/g, "").slice(0, 80);
      writeStored(STORAGE.playerId, id);

      return id;
    }

    function getTeamLabels() {
      const url = new URL(window.location.href);
      const team1FromQuery = (url.searchParams.get("team1") || "").trim();
      const team2FromQuery = (url.searchParams.get("team2") || "").trim();

      const remoteTeam1 = currentGameDisplay?.team1Name || "";
      const remoteTeam2 = currentGameDisplay?.team2Name || "";

      const team1 =
        remoteTeam1 ||
        team1FromQuery ||
        (readStored("familyfeud_team1") || "").trim() ||
        "الفريق الأول";

      const team2 =
        remoteTeam2 ||
        team2FromQuery ||
        (readStored("familyfeud_team2") || "").trim() ||
        "الفريق الثاني";

      return { team1, team2 };
    }

    function currentPlayerName() {
      return playerNameInput.value.trim();
    }

    function setJoinStatus(text, isError = false) {
      joinSubtitle.textContent = text;
      joinSubtitle.classList.toggle("error", !!isError);
    }

    function updateJoinState() {
      const { team1, team2 } = getTeamLabels();

      teamOneBtn.textContent = team1;
      teamTwoBtn.textContent = team2;

      teamOneBtn.classList.toggle("selected", selectedTeam === "team1");
      teamTwoBtn.classList.toggle("selected", selectedTeam === "team2");

      const ready = !!selectedTeam && currentPlayerName().length > 0;
      continueBtn.disabled = !ready;
    }

    function saveLocalData() {
      writeStored(STORAGE.team, selectedTeam);
      writeStored(STORAGE.name, currentPlayerName());
    }

    function getTeamLabel() {
      const labels = getTeamLabels();
      return selectedTeam === "team2" ? labels.team2 : labels.team1;
    }

    function showBuzzScreen() {
      saveLocalData();

      teamBadge.textContent = getTeamLabel();
      playerNameLabel.textContent = currentPlayerName();

      joinScreen.classList.add("hidden");
      buzzScreen.classList.remove("hidden");

      startLiveSync();
      updateLayout(true);
    }

    function showJoinScreen() {
      joinScreen.classList.remove("hidden");
      buzzScreen.classList.add("hidden");

      stopLiveSync();
      updateJoinState();
      updateLayout(true);
    }

    function setBuzzStatus(text) {
      buzzStatus.textContent = text;
    }

    function setBuzzButtonVisible(visible) {
      buzzBtn.classList.toggle("hidden", !visible);
    }

    function applyGameDisplay(display) {
      currentGameDisplay = display || null;
      updateJoinState();

      if (!joinScreen.classList.contains("hidden")) return;

      teamBadge.textContent = getTeamLabel();
    }

    function applyBuzzState(state) {
      currentBuzzState = state || null;

      if (!currentBuzzState) {
        setBuzzButtonVisible(false);
        buzzBtn.disabled = true;
        setBuzzStatus("تعذر قراءة حالة الجرس.");
        return;
      }

      const firstBuzz = currentBuzzState.firstBuzz;
      const enabled = !!currentBuzzState.enabled;
      const mePressedFirst = !!firstBuzz && firstBuzz.playerId === playerId;
      const someoneElsePressed = !!firstBuzz && firstBuzz.playerId !== playerId;

      if (!enabled) {
        setBuzzButtonVisible(false);
        buzzBtn.disabled = true;
        setBuzzStatus("الجرس مخفي الآن.");
        return;
      }

      setBuzzButtonVisible(true);

      if (!firstBuzz) {
        buzzBtn.disabled = false;
        setBuzzStatus("اضغط الجرس عندما تبدأ الجولة");
        return;
      }

      if (mePressedFirst) {
        buzzBtn.disabled = true;
        setBuzzStatus("تم تسجيل ضغطتك أولًا.");
        return;
      }

      if (someoneElsePressed) {
        buzzBtn.disabled = true;
        setBuzzStatus("تم تسجيل ضغطة لاعب آخر.");
        return;
      }

      buzzBtn.disabled = false;
      setBuzzStatus("اضغط الجرس عندما تبدأ الجولة");
    }

    async function apiGet(path) {
      if (!API_BASE) {
        const ok = await detectApiBase();
        if (!ok) throw new Error("API_BASE_NOT_FOUND");
      }

      const response = await fetch(`${API_BASE}${path}`, {
        method: "GET",
        cache: "no-store",
        headers: {
          "Accept": "application/json",
          "Cache-Control": "no-cache",
          "Pragma": "no-cache"
        }
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "GET_REQUEST_FAILED");
      }

      return data;
    }

    async function apiPost(path, payload) {
      if (!API_BASE) {
        const ok = await detectApiBase();
        if (!ok) throw new Error("API_BASE_NOT_FOUND");
      }

      const response = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        cache: "no-store",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json",
          "Cache-Control": "no-cache",
          "Pragma": "no-cache"
        },
        body: JSON.stringify(payload || {})
      });

      const data = await response.json().catch(() => ({}));
      return { ok: response.ok, status: response.status, data };
    }

    async function fetchGameDisplay() {
      try {
        const res = await apiGet(`/api/game/state?room=${encodeURIComponent(roomId)}`);

        if (res?.ok && res?.state?.display) {
          applyGameDisplay(res.state.display);
        }

        if (res?.ok && res?.state?.buzz) {
          applyBuzzState(res.state.buzz);
        }
      } catch (error) {}
    }

    async function fetchBuzzState() {
      try {
        const res = await apiGet(`/api/buzz/state?room=${encodeURIComponent(roomId)}`);
        applyBuzzState(res.state);
      } catch (error) {
        setBuzzButtonVisible(false);
        buzzBtn.disabled = true;
        setBuzzStatus("تعذر الاتصال بالجرس الآن.");
      }
    }

    async function joinRoom() {
      if (joinInFlight) return true;

      joinInFlight = true;
      setJoinStatus("جارٍ الانضمام...", false);

      try {
        const res = await apiPost(`/api/buzz/join?room=${encodeURIComponent(roomId)}`, {
          playerId,
          name: currentPlayerName(),
          team: selectedTeam
        });

        if (!res.ok) {
          setJoinStatus("تعذر الانضمام إلى الغرفة.", true);
          return false;
        }

        applyBuzzState(res.data.state);
        setJoinStatus("تم الانضمام بنجاح.", false);
        return true;
      } catch (error) {
        setJoinStatus("تعذر الاتصال بالباكند.", true);
        return false;
      } finally {
        joinInFlight = false;
      }
    }

    async function sendBuzz() {
      if (pressInFlight) return;

      pressInFlight = true;
      buzzBtn.disabled = true;
      setBuzzStatus("جارٍ إرسال الضغط...");

      try {
        const res = await apiPost(`/api/buzz/press?room=${encodeURIComponent(roomId)}`, {
          playerId,
          name: currentPlayerName(),
          team: selectedTeam
        });

        if (res.ok && res.data && res.data.state) {
          applyBuzzState(res.data.state);
          return;
        }

        if (res.data && res.data.state) {
          applyBuzzState(res.data.state);
        } else {
          await fetchBuzzState();
        }

        if (res.data?.error === "BUZZ_DISABLED") {
          setBuzzButtonVisible(false);
          setBuzzStatus("الجرس مخفي الآن.");
          return;
        }

        if (res.data?.error === "ALREADY_BUZZED") {
          setBuzzStatus("تم تسجيل ضغطة لاعب آخر.");
          return;
        }

        setBuzzStatus("لم يتم قبول الضغط.");
      } catch (error) {
        buzzBtn.disabled = false;
        setBuzzStatus("تعذر إرسال الضغط. حاول مرة أخرى.");
      } finally {
        pressInFlight = false;
      }
    }

    function startFallbackPoll() {
      if (fallbackPoll) clearInterval(fallbackPoll);

      fallbackPoll = setInterval(async () => {
        await fetchBuzzState();
      }, FALLBACK_POLL_MS);
    }

    function startLiveSync() {
      if (syncStarted) return;
      syncStarted = true;

      startFallbackPoll();
      fetchBuzzState();
    }

    function stopLiveSync() {
      syncStarted = false;

      if (fallbackPoll) {
        clearInterval(fallbackPoll);
        fallbackPoll = null;
      }
    }

    async function initPusher() {
      if (pusher || pusherChannel) return;

      try {
        const cfgRes = await apiGet(`/api/buzz/pusher-config?room=${encodeURIComponent(roomId)}`);

        if (!cfgRes.ok || !cfgRes.key || !cfgRes.cluster || !cfgRes.channel || !window.Pusher) {
          return;
        }

        const authEndpoint = String(cfgRes.authEndpoint || "").startsWith("http")
          ? cfgRes.authEndpoint
          : `${API_BASE}${cfgRes.authEndpoint}`;

        window.Pusher.logToConsole = false;

        pusher = new window.Pusher(cfgRes.key, {
          cluster: cfgRes.cluster,
          authEndpoint,
          authTransport: "ajax",
          channelAuthorization: {
            endpoint: authEndpoint,
            transport: "ajax"
          }
        });

        pusherChannel = pusher.subscribe(cfgRes.channel);

        pusherChannel.bind("pusher:subscription_succeeded", async () => {
          await fetchBuzzState();
        });

        pusherChannel.bind("buzz-updated", (payload) => {
          applyBuzzState(payload);
        });
      } catch (error) {}
    }

    function destroyPusher() {
      stopLiveSync();

      if (pusherChannel) {
        try { pusherChannel.unbind_all(); } catch (e) {}
        try { pusher.unsubscribe(pusherChannel.name); } catch (e) {}
        pusherChannel = null;
      }

      if (pusher) {
        try { pusher.disconnect(); } catch (e) {}
        pusher = null;
      }
    }

    teamOneBtn.addEventListener("click", () => {
      selectedTeam = "team1";
      updateJoinState();
    });

    teamTwoBtn.addEventListener("click", () => {
      selectedTeam = "team2";
      updateJoinState();
    });

    playerNameInput.addEventListener("input", () => {
      writeStored(STORAGE.name, playerNameInput.value);
      updateJoinState();
    });

    continueBtn.addEventListener("click", async () => {
      if (continueBtn.disabled) return;

      const ok = await detectApiBase();
      if (!ok) {
        setJoinStatus("تعذر العثور على رابط الباكند الصحيح.", true);
        return;
      }

      await fetchGameDisplay();

      const joined = await joinRoom();
      if (!joined) return;

      showBuzzScreen();
      await fetchBuzzState();
    });

    buzzBtn.addEventListener("click", async () => {
      if (buzzBtn.disabled) return;
      await sendBuzz();
    });

    backBtn.addEventListener("click", () => {
      showJoinScreen();
    });

    playerNameInput.value = readStored(STORAGE.name) || "";

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    playerNameInput.addEventListener("focus", () => {
      document.body.classList.add("typing");
    });

    playerNameInput.addEventListener("blur", () => {
      setTimeout(() => {
        document.body.classList.remove("typing");
        updateLayout(true);
      }, 80);
    });

    window.addEventListener("beforeunload", destroyPusher);

    async function bootstrapBuzz() {
      updateJoinState();
      updateLayout(true);

      const apiReady = await detectApiBase();

      if (!apiReady) {
        setJoinStatus("تعذر الوصول إلى الباكند. تأكد من رابط الـ Worker.", true);
        showJoinScreen();
        return;
      }

      await fetchGameDisplay();
      await initPusher();

      if (selectedTeam && playerNameInput.value.trim()) {
        const joined = await joinRoom();

        if (joined) {
          showBuzzScreen();
          await fetchBuzzState();
        } else {
          showJoinScreen();
        }
      } else {
        showJoinScreen();
      }
    }

    bootstrapBuzz();

    window.addEventListener("pageshow", async () => {
      if (!API_BASE) {
        await detectApiBase();
      }

      await fetchGameDisplay();

      if (!joinScreen.classList.contains("hidden")) return;

      await joinRoom();
      await fetchBuzzState();
    });

    window.addEventListener("focus", async () => {
      if (!API_BASE) {
        await detectApiBase();
      }

      await fetchGameDisplay();

      if (!joinScreen.classList.contains("hidden")) return;

      await joinRoom();
      await fetchBuzzState();
    });

    window.addEventListener("load", () => {
      setTimeout(() => updateLayout(true), 60);
      setTimeout(() => updateLayout(true), 220);
    }, { passive: true });

    window.addEventListener("resize", () => {
      if (!isTypingNow()) updateLayout();
    }, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => updateLayout(true), 80);
      setTimeout(() => updateLayout(true), 250);
      setTimeout(() => updateLayout(true), 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });

      window.visualViewport.addEventListener("scroll", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
