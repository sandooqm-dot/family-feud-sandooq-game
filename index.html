<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>فاملي فيود</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      width:100%;
      height:100%;
      background:#ffffff;
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .start-btn{
      border:none;
      background:#111111;
      color:#ffffff;
      font-size:32px;
      font-weight:700;
      padding:22px 56px;
      border-radius:18px;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
    }

    .start-btn:hover{
      transform:scale(1.03);
    }

    .start-btn:active{
      transform:scale(.98);
    }
  </style>
</head>
<body>

  <button class="start-btn" id="startBtn" type="button">ابدأ</button>

  <script>
    document.getElementById("startBtn").addEventListener("click", () => {
      window.location.href = "game.html";
    });
  </script>
</body>
</html>
