<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>فاملي فيود - game.html</title>

  <style>
    :root{
      --bg-1:#07133b;
      --bg-2:#0d2a73;
      --bg-3:#08112f;

      --panel:#0c1f57;
      --panel-2:#112b77;
      --card:#1539a2;
      --card-2:#1f55d8;

      --gold:#f2c94c;
      --gold-2:#d7a61e;
      --white:#ffffff;
      --soft:#dbe7ff;
      --muted:#96acd8;

      --team1:#1148c7;
      --team2:#6f2dbd;

      --danger:#ff3b30;
      --danger-dark:#b31313;

      --shadow:0 14px 35px rgba(0,0,0,.28);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;

      --bottom-bar-h:96px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family: "Tahoma", "Arial", sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
      color:var(--white);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 70px 70px;
      pointer-events:none;
      opacity:.25;
    }

    .app{
      position:relative;
      width:100%;
      height:100%;
      padding:
        max(16px, env(safe-area-inset-top))
        18px
        calc(var(--bottom-bar-h) + 18px + env(safe-area-inset-bottom))
        18px;
      display:flex;
      align-items:stretch;
      justify-content:center;
      gap:18px;
    }

    .brand-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:78px;
      height:78px;
      object-fit:contain;
      z-index:5;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }

    .side-panel{
      width:18%;
      min-width:150px;
      max-width:260px;
      border-radius:32px;
      padding:18px 14px 16px;
      box-shadow:var(--shadow);
      border:3px solid rgba(255,255,255,.12);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(5px);
    }

    .side-panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.01));
      pointer-events:none;
    }

    .side-panel.team-1{
      background:linear-gradient(180deg, rgba(17,72,199,.28), rgba(9,26,88,.78));
      border-color:rgba(66,133,255,.55);
      box-shadow:0 16px 36px rgba(17,72,199,.22);
    }

    .side-panel.team-2{
      background:linear-gradient(180deg, rgba(111,45,189,.28), rgba(41,12,76,.82));
      border-color:rgba(160,88,255,.55);
      box-shadow:0 16px 36px rgba(111,45,189,.24);
    }

    .team-title{
      font-size:clamp(24px,2vw,44px);
      font-weight:900;
      text-align:center;
      line-height:1.15;
      margin-top:8px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .team-score{
      width:100%;
      min-height:108px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(1,8,34,.96), rgba(6,12,45,.92));
      border:4px solid var(--gold);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(38px,4vw,76px);
      font-weight:900;
      color:#ffcf32;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      position:relative;
      z-index:1;
    }

    .strikes-wrap{
      margin-top:16px;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .strike-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      direction:ltr;
    }

    .strike-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:transparent;
      color:rgba(255,58,58,.28);
      font-size:42px;
      font-weight:900;
      cursor:pointer;
      transition:.18s ease;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .strike-btn:hover{
      transform:scale(1.08);
      color:rgba(255,58,58,.55);
    }

    .strike-btn.active{
      color:#ff4b4b;
      text-shadow:0 0 18px rgba(255,40,40,.45);
    }

    .strikes-label{
      font-size:clamp(16px,1.2vw,24px);
      color:var(--soft);
      opacity:.92;
    }

    .team-ready{
      margin-top:14px;
      border:none;
      padding:12px 20px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:var(--white);
      font-size:clamp(18px,1.2vw,24px);
      font-weight:700;
      border:2px solid rgba(255,255,255,.14);
      position:relative;
      z-index:1;
    }

    .center-stage{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
      position:relative;
    }

    .question-box{
      width:min(760px, 86%);
      min-height:106px;
      border-radius:26px;
      border:4px solid var(--gold);
      background:linear-gradient(180deg, rgba(9,26,92,.94), rgba(7,20,66,.96));
      box-shadow:var(--shadow);
      padding:18px 26px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-align:center;
      position:relative;
      z-index:3;
    }

    .question-label{
      color:#ffe899;
      font-size:clamp(18px,1.2vw,24px);
      font-weight:800;
    }

    .question-text{
      font-size:clamp(26px,2.2vw,44px);
      font-weight:900;
      line-height:1.2;
      color:var(--white);
    }

    .round-box{
      width:min(300px, 42%);
      min-height:124px;
      margin-top:-8px;
      transform:translateY(20px);
      border-radius:28px;
      border:4px solid var(--gold);
      background:linear-gradient(180deg, rgba(7,20,66,.98), rgba(3,10,38,.98));
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:8px;
      z-index:4;
      padding:12px 16px;
    }

    .round-label{
      color:#ffe899;
      font-size:clamp(22px,1.5vw,30px);
      font-weight:900;
    }

    .round-points{
      font-size:clamp(38px,4vw,70px);
      font-weight:900;
      color:#fff5c7;
      line-height:1;
    }

    .board{
      width:100%;
      max-width:980px;
      margin-top:-8px;
      padding:42px 18px 18px;
      border-radius:38px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, rgba(12,29,98,.9), rgba(6,17,63,.96));
      box-shadow:var(--shadow);
      position:relative;
      z-index:1;
    }

    .answers-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .answer-card{
      min-height:126px;
      border:none;
      border-radius:24px;
      cursor:pointer;
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg, var(--card-2), var(--card));
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.12),
        inset 0 -8px 16px rgba(0,0,0,.15),
        0 10px 20px rgba(0,0,0,.18);
      transition:.16s ease;
      color:var(--white);
    }

    .answer-card:hover{
      transform:translateY(-2px);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.15),
        inset 0 -8px 16px rgba(0,0,0,.2),
        0 14px 24px rgba(0,0,0,.24);
    }

    .answer-card.hidden .answer-inner{
      justify-content:center;
    }

    .answer-card.revealed{
      background:linear-gradient(180deg, #1e57e5, #0c2f90);
    }

    .answer-inner{
      width:100%;
      height:100%;
      min-height:126px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .answer-rank{
      width:54px;
      height:54px;
      min-width:54px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      border:3px solid rgba(255,255,255,.35);
      font-size:30px;
      font-weight:900;
      color:#eef3ff;
    }

    .answer-text{
      flex:1;
      font-size:clamp(24px,1.7vw,38px);
      font-weight:900;
      text-align:right;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding-inline:4px;
    }

    .answer-points{
      min-width:74px;
      height:64px;
      border-radius:18px;
      background:rgba(1,8,34,.55);
      border:3px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(28px,1.8vw,42px);
      font-weight:900;
      color:#ffcf32;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .answer-card.hidden .answer-text,
    .answer-card.hidden .answer-points{
      display:none;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      height:calc(var(--bottom-bar-h) + env(safe-area-inset-bottom));
      padding:12px 18px calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(17,48,146,.96), rgba(10,30,98,.98));
      border-top:4px solid rgba(255,255,255,.08);
      box-shadow:0 -12px 28px rgba(0,0,0,.26);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:20;
    }

    .bottom-buttons{
      width:min(1180px, 100%);
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:12px;
    }

    .bar-btn{
      border:none;
      border-radius:18px;
      min-height:58px;
      cursor:pointer;
      font-size:clamp(18px,1.2vw,25px);
      font-weight:900;
      color:var(--white);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:2px solid rgba(255,255,255,.12);
      transition:.16s ease;
    }

    .bar-btn:hover{
      transform:translateY(-2px);
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
    }

    .bar-btn.primary{
      background:linear-gradient(180deg, #f4ce54, #d7a61e);
      color:#0b1d57;
      border-color:rgba(255,255,255,.25);
    }

    .bar-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .big-x-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      transform:scale(.82);
      transition:.16s ease;
      z-index:50;
      background:radial-gradient(circle, rgba(0,0,0,.10), rgba(0,0,0,.42));
    }

    .big-x-overlay.show{
      opacity:1;
      transform:scale(1);
      animation: flashX .7s ease;
    }

    .big-x{
      font-size:min(42vw, 340px);
      font-weight:900;
      color:var(--danger);
      text-shadow:
        0 0 18px rgba(255,0,0,.35),
        0 12px 30px rgba(0,0,0,.36);
      line-height:1;
      transform:rotate(-3deg);
    }

    @keyframes flashX{
      0%{ opacity:0; transform:scale(.55); }
      35%{ opacity:1; transform:scale(1.06); }
      100%{ opacity:1; transform:scale(1); }
    }

    @media (max-width: 1200px){
      .app{
        gap:12px;
        padding-left:12px;
        padding-right:12px;
      }

      .side-panel{
        min-width:128px;
        padding:14px 10px 12px;
      }

      .team-score{
        min-height:92px;
      }

      .answer-card,
      .answer-inner{
        min-height:106px;
      }
    }

    @media (max-width: 900px){
      .side-panel{
        width:20%;
        min-width:110px;
      }

      .strike-btn{
        width:40px;
        height:40px;
        font-size:34px;
      }

      .answer-text{
        white-space:normal;
      }
    }

    @media (max-width: 720px){
      .app{
        gap:8px;
        padding-top:max(10px, env(safe-area-inset-top));
        padding-left:8px;
        padding-right:8px;
      }

      .brand-logo{
        width:56px;
        height:56px;
        top:10px;
        left:10px;
      }

      .side-panel{
        width:22%;
        min-width:88px;
        border-radius:20px;
      }

      .team-score{
        min-height:72px;
        border-radius:18px;
        border-width:3px;
      }

      .question-box{
        width:90%;
        min-height:92px;
        padding:14px 18px;
        border-radius:20px;
        border-width:3px;
      }

      .round-box{
        width:56%;
        min-height:96px;
        border-radius:22px;
        border-width:3px;
      }

      .board{
        padding:34px 10px 10px;
        border-width:4px;
        border-radius:26px;
      }

      .answers-grid{
        gap:10px;
      }

      .answer-card,
      .answer-inner{
        min-height:88px;
        border-radius:16px;
      }

      .answer-rank{
        width:40px;
        height:40px;
        min-width:40px;
        font-size:22px;
        border-width:2px;
      }

      .answer-points{
        min-width:56px;
        height:48px;
        border-radius:12px;
        font-size:24px;
      }

      .bottom-buttons{
        gap:8px;
      }

      .bar-btn{
        min-height:50px;
        border-radius:14px;
      }
    }

    @media (max-width: 560px){
      .question-label{ font-size:14px; }
      .question-text{ font-size:22px; }
      .round-label{ font-size:18px; }
      .round-points{ font-size:34px; }

      .team-title{ font-size:18px; }
      .strikes-label{ font-size:12px; }
      .team-ready{ font-size:13px; padding:10px 12px; }

      .answer-text{ font-size:17px; }
      .answer-points{ font-size:20px; }
      .bar-btn{ font-size:14px; }

      .strike-row{ gap:6px; }
      .strike-btn{
        width:30px;
        height:30px;
        font-size:24px;
      }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="شعار اللعبة" class="brand-logo" onerror="this.style.display='none'">

  <div class="app">

    <!-- الفريق الأول -->
    <aside class="side-panel team-1">
      <div style="width:100%">
        <div class="team-title">الفريق الأول</div>
        <div class="team-score" id="team1Score">0</div>

        <div class="strikes-wrap">
          <div class="strike-row" id="team1Strikes">
            <button class="strike-btn" data-team="0" data-index="0">X</button>
            <button class="strike-btn" data-team="0" data-index="1">X</button>
            <button class="strike-btn" data-team="0" data-index="2">X</button>
          </div>
          <div class="strikes-label">الإنذارات</div>
        </div>
      </div>

      <button class="team-ready" type="button">جاهزون للجولة</button>
    </aside>

    <!-- الوسط -->
    <main class="center-stage">

      <section class="question-box">
        <div class="question-label">سؤال المواجهة</div>
        <div class="question-text" id="questionText">من يعرف الإجابة؟</div>
      </section>

      <section class="round-box">
        <div class="round-label">نقاط الجولة</div>
        <div class="round-points" id="roundPoints">0</div>
      </section>

      <section class="board">
        <div class="answers-grid" id="answersGrid"></div>
      </section>
    </main>

    <!-- الفريق الثاني -->
    <aside class="side-panel team-2">
      <div style="width:100%">
        <div class="team-title">الفريق الثاني</div>
        <div class="team-score" id="team2Score">0</div>

        <div class="strikes-wrap">
          <div class="strike-row" id="team2Strikes">
            <button class="strike-btn" data-team="1" data-index="0">X</button>
            <button class="strike-btn" data-team="1" data-index="1">X</button>
            <button class="strike-btn" data-team="1" data-index="2">X</button>
          </div>
          <div class="strikes-label">الإنذارات</div>
        </div>
      </div>

      <button class="team-ready" type="button">جاهزون للجولة</button>
    </aside>

  </div>

  <!-- علامة X الكبيرة -->
  <div class="big-x-overlay" id="bigXOverlay">
    <div class="big-x">X</div>
  </div>

  <!-- الشريط السفلي -->
  <footer class="bottom-bar">
    <div class="bottom-buttons">
      <button class="bar-btn" id="prevBtn" type="button">السابق</button>
      <button class="bar-btn primary" id="nextBtn" type="button">التالي</button>
      <button class="bar-btn" id="showAllBtn" type="button">إظهار الكل</button>
      <button class="bar-btn" id="undoBtn" type="button">تراجع</button>
      <button class="bar-btn" id="redoBtn" type="button">إعادة</button>
    </div>
  </footer>

  <script>
    const QUESTIONS = [
      {
        question: "اذكر شيئًا يستخدمه الناس كل يوم",
        answers: [
          { text: "الجوال", points: 32 },
          { text: "السيارة", points: 24 },
          { text: "فرشاة الأسنان", points: 17 },
          { text: "المفاتيح", points: 11 },
          { text: "المحفظة", points: 9 },
          { text: "الساعة", points: 7 }
        ]
      },
      {
        question: "اذكر شيئًا تجده في المطبخ",
        answers: [
          { text: "الثلاجة", points: 28 },
          { text: "الفرن", points: 22 },
          { text: "الصحون", points: 18 },
          { text: "الملاعق", points: 13 },
          { text: "القدر", points: 11 },
          { text: "الكاسات", points: 8 }
        ]
      },
      {
        question: "اذكر شيئًا يحمله الطالب معه",
        answers: [
          { text: "الحقيبة", points: 30 },
          { text: "الكتب", points: 24 },
          { text: "القلم", points: 19 },
          { text: "الدفتر", points: 12 },
          { text: "المقلمة", points: 9 },
          { text: "الآيباد", points: 6 }
        ]
      }
    ];

    const state = {
      qIndex: 0,
      revealed: Array(6).fill(false),
      teamScores: [0, 0],
      strikes: [
        [false, false, false],
        [false, false, false]
      ]
    };

    const history = [];
    const future = [];

    const questionText = document.getElementById("questionText");
    const roundPoints = document.getElementById("roundPoints");
    const answersGrid = document.getElementById("answersGrid");
    const team1Score = document.getElementById("team1Score");
    const team2Score = document.getElementById("team2Score");
    const bigXOverlay = document.getElementById("bigXOverlay");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const showAllBtn = document.getElementById("showAllBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");

    function cloneState() {
      return {
        qIndex: state.qIndex,
        revealed: [...state.revealed],
        teamScores: [...state.teamScores],
        strikes: state.strikes.map(arr => [...arr])
      };
    }

    function pushHistory() {
      history.push(cloneState());
      if (history.length > 200) history.shift();
      future.length = 0;
      updateUndoRedo();
    }

    function restoreState(snapshot) {
      state.qIndex = snapshot.qIndex;
      state.revealed = [...snapshot.revealed];
      state.teamScores = [...snapshot.teamScores];
      state.strikes = snapshot.strikes.map(arr => [...arr]);
      renderAll();
    }

    function updateUndoRedo() {
      undoBtn.disabled = history.length === 0;
      redoBtn.disabled = future.length === 0;
      prevBtn.disabled = state.qIndex === 0;
      nextBtn.disabled = state.qIndex === QUESTIONS.length - 1;
    }

    function getCurrentQuestion() {
      return QUESTIONS[state.qIndex];
    }

    function calcRoundPoints() {
      const q = getCurrentQuestion();
      return q.answers.reduce((sum, ans, i) => {
        return sum + (state.revealed[i] ? ans.points : 0);
      }, 0);
    }

    function renderQuestion() {
      questionText.textContent = getCurrentQuestion().question;
      roundPoints.textContent = calcRoundPoints();
    }

    function renderScores() {
      team1Score.textContent = state.teamScores[0];
      team2Score.textContent = state.teamScores[1];
    }

    function renderStrikes() {
      document.querySelectorAll(".strike-btn").forEach(btn => {
        const team = Number(btn.dataset.team);
        const index = Number(btn.dataset.index);
        btn.classList.toggle("active", state.strikes[team][index]);
      });
    }

    function renderAnswers() {
      const q = getCurrentQuestion();

      answersGrid.innerHTML = "";

      q.answers.forEach((answer, idx) => {
        const revealed = state.revealed[idx];

        const button = document.createElement("button");
        button.type = "button";
        button.className = `answer-card ${revealed ? "revealed" : "hidden"}`;
        button.dataset.index = idx;

        button.innerHTML = `
          <div class="answer-inner">
            <div class="answer-rank">${idx + 1}</div>
            <div class="answer-text">${answer.text}</div>
            <div class="answer-points">${answer.points}</div>
          </div>
        `;

        button.addEventListener("click", () => {
          pushHistory();
          state.revealed[idx] = !state.revealed[idx];
          renderQuestion();
          renderAnswers();
        });

        answersGrid.appendChild(button);
      });
    }

    function renderAll() {
      renderQuestion();
      renderScores();
      renderStrikes();
      renderAnswers();
      updateUndoRedo();
    }

    function nextQuestion() {
      if (state.qIndex >= QUESTIONS.length - 1) return;
      pushHistory();
      state.qIndex++;
      state.revealed = Array(6).fill(false);
      state.strikes = [
        [false, false, false],
        [false, false, false]
      ];
      renderAll();
    }

    function prevQuestion() {
      if (state.qIndex <= 0) return;
      pushHistory();
      state.qIndex--;
      state.revealed = Array(6).fill(false);
      state.strikes = [
        [false, false, false],
        [false, false, false]
      ];
      renderAll();
    }

    function showAllAnswers() {
      pushHistory();
      state.revealed = Array(6).fill(true);
      renderAll();
    }

    function undoAction() {
      if (!history.length) return;
      future.push(cloneState());
      const previous = history.pop();
      restoreState(previous);
    }

    function redoAction() {
      if (!future.length) return;
      history.push(cloneState());
      const next = future.pop();
      restoreState(next);
    }

    function triggerBigX() {
      bigXOverlay.classList.remove("show");
      void bigXOverlay.offsetWidth;
      bigXOverlay.classList.add("show");

      clearTimeout(triggerBigX._timer);
      triggerBigX._timer = setTimeout(() => {
        bigXOverlay.classList.remove("show");
      }, 850);
    }

    function toggleStrike(team, index) {
      pushHistory();
      const willActivate = !state.strikes[team][index];
      state.strikes[team][index] = willActivate;
      renderStrikes();
      if (willActivate) triggerBigX();
    }

    document.querySelectorAll(".strike-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const team = Number(btn.dataset.team);
        const index = Number(btn.dataset.index);
        toggleStrike(team, index);
      });
    });

    prevBtn.addEventListener("click", prevQuestion);
    nextBtn.addEventListener("click", nextQuestion);
    showAllBtn.addEventListener("click", showAllAnswers);
    undoBtn.addEventListener("click", undoAction);
    redoBtn.addEventListener("click", redoAction);

    renderAll();
  </script>
</body>
</html>
