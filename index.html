<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Index</title>

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --gold:#f1d14f;
      --blue-1:#2b3fc2;
      --blue-2:#06204f;
      --blue-3:#0b1d4a;
      --red:#ff2a2a;
      --panel-border:#111111;
      --white:#f4f2ea;

      --app-height: 100vh;
      --app-scale: 1;
      --safari-nudge: 34px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      margin:0;
      padding:0;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family: Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .brand-badge{
      position:absolute;
      top:20px;
      left:18px;
      display:flex;
      align-items:center;
      gap:10px;
      z-index:5;
    }

    .brand-badge img{
      width:60px;
      height:60px;
      object-fit:contain;
      flex:0 0 auto;
    }

    .brand-text{
      line-height:1.05;
      font-weight:900;
      font-size:28px;
      color:#ffffff;
    }

    .brand-text .accent{
      color:#f3c23c;
    }

    .hero-logo-wrap{
      position:absolute;
      top:28px;
      left:50%;
      transform:translateX(-50%);
      width:620px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:280px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:64px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .setup-panel{
      position:absolute;
      left:50%;
      top:405px;
      transform:translate(-50%, -50%);
      width:730px;
      height:335px;
      border-radius:34px;
      border:9px solid var(--panel-border);
      background:linear-gradient(180deg, #0f2c88 0%, #081d61 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:34px 36px 26px;
    }

    .teams-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:34px;
      align-items:start;
      margin-top:4px;
    }

    .team-block{
      text-align:center;
    }

    .team-label{
      color:var(--white);
      font-size:34px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:24px;
    }

    .team-input{
      width:100%;
      height:68px;
      border-radius:999px;
      border:4px solid #101010;
      background:#f3f3f3;
      color:#222;
      font-size:24px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 18px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75);
    }

    .team-input::placeholder{
      color:#777;
      font-weight:700;
    }

    .actions-row{
      position:absolute;
      left:36px;
      right:36px;
      bottom:24px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:20px;
    }

    .action-btn{
      height:76px;
      border-radius:28px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .28);
      color:var(--white);
      font-size:34px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    .action-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .action-btn:active{
      transform:scale(.985);
    }

    .action-btn[disabled]{
      cursor:not-allowed;
      opacity:.72;
      transform:none;
      filter:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(2,8,28,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:20;
      padding:20px;
    }

    .overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      width:560px;
      max-width:100%;
      border-radius:30px;
      border:5px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      box-shadow:0 20px 45px rgba(0,0,0,.28);
      color:var(--white);
      padding:24px 22px 22px;
      text-align:center;
    }

    .modal-title{
      font-size:38px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:16px;
      color:var(--gold);
    }

    .modal-text{
      font-size:24px;
      font-weight:700;
      line-height:1.8;
      color:#f4f2ea;
    }

    .close-btn{
      margin-top:20px;
      min-width:180px;
      height:64px;
      border-radius:24px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .30);
      color:var(--white);
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .answers-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }

    .qr-box{
      width:250px;
      height:250px;
      border-radius:24px;
      background:#ffffff;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .qr-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .answers-link{
      width:100%;
      min-height:58px;
      border-radius:18px;
      border:3px solid rgba(243,242,234,.92);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      font-weight:700;
      text-align:center;
      padding:12px 14px;
      direction:ltr;
      outline:none;
    }

    .copy-btn{
      width:220px;
      height:64px;
      border-radius:22px;
      border:4px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #2b3fc2 0%, #0e2f91 100%);
      color:#fff;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .copy-msg{
      min-height:28px;
      font-size:20px;
      font-weight:800;
      color:var(--gold);
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <div class="brand-badge">
          <img id="storeLogo" src="logo.png" alt="صندوق المسابقات" />
          <div class="brand-text">
            <div>صندوق</div>
            <div class="accent">المسابقات</div>
          </div>
        </div>

        <div class="hero-logo-wrap">
          <img id="familyLogo" class="hero-logo" src="logo-family-feud.png" alt="فاميلي فيود" />
          <div id="familyLogoFallback" class="hero-logo-fallback">فاميلي فيود</div>
        </div>

        <section class="setup-panel">
          <div class="teams-row">
            <div class="team-block">
              <div class="team-label">الفريق الأول</div>
              <input id="teamOneInput" class="team-input" type="text" placeholder="اكتب اسم الفريق هنا..." />
            </div>

            <div class="team-block">
              <div class="team-label">الفريق الثاني</div>
              <input id="teamTwoInput" class="team-input" type="text" placeholder="اكتب اسم الفريق هنا..." />
            </div>
          </div>

          <div class="actions-row">
            <button id="guideBtn" class="action-btn" type="button">التعليمات</button>
            <button id="answersBtn" class="action-btn" type="button">الإجابات</button>
            <button class="action-btn" type="button" disabled>الرئيسية</button>
          </div>
        </section>

        <div id="guideOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">التعليمات</div>
            <div class="modal-text">
              اكتب اسم كل فريق في الخانة الخاصة به.<br>
              استخدم زر الإجابات لفتح نافذة الباركود والرابط الخاص بالإجابات.<br>
              زر الرئيسية سنربطه لاحقًا.
            </div>
            <button class="close-btn" type="button" data-close="guideOverlay">إغلاق</button>
          </div>
        </div>

        <div id="answersOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">الإجابات</div>

            <div class="answers-card">
              <div class="qr-box">
                <img id="qrImage" alt="QR Code" />
              </div>

              <input id="answersLinkInput" class="answers-link" type="text" readonly />

              <button id="copyBtn" class="copy-btn" type="button">نسخ الرابط</button>
              <div id="copyMsg" class="copy-msg"></div>
            </div>

            <button class="close-btn" type="button" data-close="answersOverlay">إغلاق</button>
          </div>
        </div>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const DESIGN_WIDTH = 1600;
    const DESIGN_HEIGHT = 768;
    const root = document.documentElement;

    function setAppHeight() {
      const h = window.visualViewport && window.visualViewport.height
        ? window.visualViewport.height
        : window.innerHeight;
      root.style.setProperty("--app-height", h + "px");
    }

    function fitGameToViewport() {
      const vv = window.visualViewport;
      const vw = vv ? vv.width : window.innerWidth;
      const vh = vv ? vv.height : window.innerHeight;

      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = vw - horizontalPadding;
      const usableHeight = vh - verticalPadding;

      const scale = Math.min(
        usableWidth / DESIGN_WIDTH,
        usableHeight / DESIGN_HEIGHT
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      const vv = window.visualViewport;
      const visibleHeight = vv ? vv.height : window.innerHeight;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout() {
      setAppHeight();
      requestAnimationFrame(() => {
        fitGameToViewport();
        nudgeSafariBar();
      });
    }

    const teamOneInput = document.getElementById("teamOneInput");
    const teamTwoInput = document.getElementById("teamTwoInput");
    const guideBtn = document.getElementById("guideBtn");
    const answersBtn = document.getElementById("answersBtn");
    const guideOverlay = document.getElementById("guideOverlay");
    const answersOverlay = document.getElementById("answersOverlay");
    const answersLinkInput = document.getElementById("answersLinkInput");
    const qrImage = document.getElementById("qrImage");
    const copyBtn = document.getElementById("copyBtn");
    const copyMsg = document.getElementById("copyMsg");

    function buildAnswersLink() {
      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/index\.html?$/i.test(path)) {
        url.pathname = path.replace(/index\.html?$/i, "answers.html");
      } else if (path.endsWith("/")) {
        url.pathname = path + "answers.html";
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/answers.html");
      }

      url.search = "";
      url.hash = "";
      return url.toString();
    }

    const ANSWERS_LINK = buildAnswersLink();

    function updateAnswersBox() {
      answersLinkInput.value = ANSWERS_LINK;
      qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(ANSWERS_LINK);
    }

    function openOverlay(el) {
      el.classList.add("show");
    }

    function closeOverlay(el) {
      el.classList.remove("show");
    }

    guideBtn.addEventListener("click", () => openOverlay(guideOverlay));
    answersBtn.addEventListener("click", () => {
      updateAnswersBox();
      openOverlay(answersOverlay);
    });

    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.close);
        if (target) closeOverlay(target);
      });
    });

    [guideOverlay, answersOverlay].forEach(overlay => {
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeOverlay(overlay);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeOverlay(guideOverlay);
        closeOverlay(answersOverlay);
      }
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(answersLinkInput.value);
        copyMsg.textContent = "تم نسخ الرابط";
      } catch (e) {
        answersLinkInput.select();
        document.execCommand("copy");
        copyMsg.textContent = "تم نسخ الرابط";
      }

      setTimeout(() => {
        copyMsg.textContent = "";
      }, 1600);
    });

    teamOneInput.value = sessionStorage.getItem("familyfeud_team1") || "";
    teamTwoInput.value = sessionStorage.getItem("familyfeud_team2") || "";

    teamOneInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team1", teamOneInput.value);
    });

    teamTwoInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team2", teamTwoInput.value);
    });

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    updateLayout();

    window.addEventListener("load", () => {
      setTimeout(updateLayout, 60);
      setTimeout(updateLayout, 220);
    }, { passive: true });

    window.addEventListener("resize", updateLayout, { passive: true });
    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
      setTimeout(updateLayout, 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
