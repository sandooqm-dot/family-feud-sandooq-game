<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تفعيل دخول اللعبة</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --text:#eef2ff; --muted:#a8b0cc; --btn:#2b5bff; --btn2:#1f2a52; --err:#ff5b5b; --ok:#46e67a; }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Tahoma,Arial;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 800px at 70% 10%, #1a2a6a 0%, var(--bg) 55%);}
    .wrap{width:min(520px,92vw);padding:22px;background:rgba(18,26,51,.92);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.45)}
    h1{margin:0 0 8px;color:var(--text);font-size:22px}
    p{margin:0 0 16px;color:var(--muted);line-height:1.6}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input{
      flex:1; min-width:200px;
      padding:14px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
      background:#0e1530;color:var(--text);outline:none;font-size:16px
    }
    input:focus{border-color:rgba(43,91,255,.6)}
    button{
      padding:14px 14px;border:0;border-radius:12px;cursor:pointer;
      background:var(--btn);color:white;font-weight:700;font-size:15px
    }
    button.secondary{background:var(--btn2);font-weight:600}
    button:disabled{opacity:.55;cursor:not-allowed}
    .status{margin-top:14px;font-size:14px}
    .status.ok{color:var(--ok)}
    .status.err{color:var(--err)}
    .tiny{margin-top:14px;color:rgba(168,176,204,.9);font-size:12.5px;line-height:1.6}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>تفعيل دخول اللعبة</h1>
    <p>أدخل كود التفعيل اللي وصلك بعد الشراء. سيتم ربطه بهذا الجهاز.</p>

    <div class="row">
      <input id="code" inputmode="text" autocomplete="one-time-code" placeholder="اكتب كود التفعيل هنا" />
      <button id="btn">تفعيل ودخول</button>
      <button id="open" class="secondary" disabled>فتح اللعبة</button>
    </div>

    <div id="status" class="status"></div>

    <div class="tiny">
      إذا ظهر لك أن رابط التحقق غير مضبوط، هذا طبيعي الآن—بنحط رابط السكربت في الخطوة الجاية.
    </div>
  </div>

<script>
  // ===== إعدادات =====
  const CANVA_URL  = "https://wilayahdmo.my.canva.site/bvxbb43sdf33xh3c";

  // IMPORTANT: بنبدّل هذا الرابط في (كود رقم 2) لما تعطيني رابط Google Apps Script /exec
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE";

  const GAME_ID = "canva_bvxbb43sdf33xh3c";
  const CACHE_HOURS = 12;

  const els = {
    code: document.getElementById("code"),
    btn: document.getElementById("btn"),
    open: document.getElementById("open"),
    status: document.getElementById("status"),
  };

  function setStatus(msg, type="") {
    els.status.textContent = msg || "";
    els.status.className = "status " + (type || "");
  }

  function getDeviceId() {
    const key = "sandooq_device_id";
    let v = localStorage.getItem(key);
    if (v) return v;
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    v = Array.from(bytes).map(b => b.toString(16).padStart(2,"0")).join("");
    localStorage.setItem(key, v);
    return v;
  }

  function cacheKey() { return "gate_ok_" + GAME_ID; }

  function isRecentlyAllowed() {
    const ts = Number(localStorage.getItem(cacheKey()) || "0");
    if (!ts) return false;
    const ms = CACHE_HOURS * 60 * 60 * 1000;
    return (Date.now() - ts) < ms;
  }

  function allowAndEnableOpen() {
    localStorage.setItem(cacheKey(), String(Date.now()));
    els.open.disabled = false;
  }

  function normalize(str) {
    return (str || "").toString().trim();
  }

  function interpretResponse(text) {
    try {
      const j = JSON.parse(text);
      if (j && (j.ok === true || j.success === true || j.valid === true || j.status === "ok")) {
        return { ok:true, msg:j.message || "تم التفعيل بنجاح" };
      }
      return { ok:false, msg:(j && (j.message || j.error)) || "الكود غير صحيح" };
    } catch(_) {}

    const t = (text || "").toLowerCase();
    if (t.includes("invalid") || t.includes("not valid") || t.includes("غير") || t.includes("خطأ") || t.includes("مرفوض")) {
      return { ok:false, msg:"الكود غير صحيح أو مستخدم على جهاز آخر" };
    }
    if (t.includes("ok") || t.includes("success") || t.includes("valid") || t.includes("true")) {
      return { ok:true, msg:"تم التفعيل بنجاح" };
    }
    return { ok:false, msg:"تعذر التحقق. تأكد من رابط السكربت وطريقة الرد." };
  }

  async function verifyCode(code) {
    if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
      throw new Error("رابط التحقق (SCRIPT_URL) غير مضبوط بعد");
    }
    const deviceId = getDeviceId();

    const url = new URL(SCRIPT_URL);
    url.searchParams.set("code", code);
    url.searchParams.set("device", deviceId);
    url.searchParams.set("game", GAME_ID);
    url.searchParams.set("t", Date.now().toString());

    const res = await fetch(url.toString(), { method: "GET", redirect: "follow" });
    const text = await res.text();
    return interpretResponse(text);
  }

  function goToGame() {
    window.location.href = CANVA_URL;
  }

  if (isRecentlyAllowed()) {
    allowAndEnableOpen();
    setStatus("تم التحقق مسبقًا على هذا الجهاز. تقدر تفتح اللعبة.", "ok");
  }

  els.open.addEventListener("click", goToGame);

  els.btn.addEventListener("click", async () => {
    const code = normalize(els.code.value);
    if (!code) { setStatus("اكتب كود التفعيل.", "err"); return; }

    els.btn.disabled = true;
    setStatus("جاري التحقق...", "");

    try {
      const r = await verifyCode(code);
      if (r.ok) {
        allowAndEnableOpen();
        setStatus(r.msg, "ok");
        setTimeout(goToGame, 600);
      } else {
        setStatus(r.msg, "err");
      }
    } catch (e) {
      setStatus("ملاحظة: " + (e?.message || e), "err");
    } finally {
      els.btn.disabled = false;
    }
  });

  els.code.addEventListener("keydown", (e) => {
    if (e.key === "Enter") els.btn.click();
  });
</script>
</body>
</html>
