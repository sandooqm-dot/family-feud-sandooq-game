<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Index</title>

  <style>
    :root{
      --gold:#f1d14f;
      --white:#f4f2ea;
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:150px;
      height:150px;
      object-fit:contain;
      z-index:5;
    }

    .hero-logo-wrap{
      position:absolute;
      top:22px;
      left:50%;
      transform:translateX(-50%);
      width:620px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:245px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:66px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .setup-panel{
      position:absolute;
      left:50%;
      top:485px;
      transform:translate(-50%, -50%);
      width:920px;
      height:500px;
      border-radius:36px;
      border:10px solid #0f0f0f;
      background:linear-gradient(180deg, #0f2c88 0%, #081d61 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:30px 40px 26px;
      display:flex;
      flex-direction:column;
    }

    .teams-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      align-items:start;
    }

    .team-block{
      text-align:center;
    }

    .team-label{
      color:var(--white);
      font-size:42px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:20px;
    }

    .team-input{
      width:100%;
      height:76px;
      border-radius:999px;
      border:4px solid #101010;
      background:#f3f3f3;
      color:#222;
      font-size:26px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 20px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75);
    }

    .team-input::placeholder{
      color:#777;
      font-weight:700;
      font-size:22px;
    }

    .start-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:34px;
      margin-bottom:24px;
    }

    .start-btn{
      min-width:220px;
      height:86px;
      border-radius:999px;
      border:5px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #ff922b 0%, #ff7b14 100%);
      color:#ffffff;
      font-size:48px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }

    .start-btn:hover:not(:disabled){
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .start-btn:active:not(:disabled){
      transform:scale(.985);
    }

    .start-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .actions-grid{
      margin-top:auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 24px;
    }

    .action-btn{
      height:82px;
      border-radius:30px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .28);
      color:var(--white);
      font-size:32px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    .action-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .action-btn:active{
      transform:scale(.985);
    }

    .action-btn[disabled]{
      cursor:not-allowed;
      opacity:.72;
      transform:none;
      filter:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(2,8,28,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:20;
      padding:20px;
    }

    .overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      width:560px;
      max-width:100%;
      border-radius:30px;
      border:5px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      box-shadow:0 20px 45px rgba(0,0,0,.28);
      color:var(--white);
      padding:24px 22px 22px;
      text-align:center;
    }

    .modal-title{
      font-size:38px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:16px;
      color:var(--gold);
    }

    .modal-text{
      font-size:24px;
      font-weight:700;
      line-height:1.8;
      color:#f4f2ea;
    }

    .close-btn{
      margin-top:20px;
      min-width:180px;
      height:64px;
      border-radius:24px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .30);
      color:var(--white);
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .answers-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }

    .qr-box{
      width:250px;
      height:250px;
      border-radius:24px;
      background:#ffffff;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .qr-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .answers-link{
      width:100%;
      min-height:58px;
      border-radius:18px;
      border:3px solid rgba(243,242,234,.92);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      font-weight:700;
      text-align:center;
      padding:12px 14px;
      direction:ltr;
      outline:none;
    }

    .copy-btn{
      width:220px;
      height:64px;
      border-radius:22px;
      border:4px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #2b3fc2 0%, #0e2f91 100%);
      color:#fff;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .copy-msg{
      min-height:28px;
      font-size:20px;
      font-weight:800;
      color:var(--gold);
    }

    body.portrait .game-shell{
      width:640px;
      height:1280px;
    }

    body.portrait .store-logo{
      top:10px;
      left:2px;
      width:132px;
      height:132px;
    }

    body.portrait .hero-logo-wrap{
      top:175px;
      width:560px;
    }

    body.portrait .hero-logo{
      max-height:320px;
    }

    body.portrait .setup-panel{
      top:820px;
      width:620px;
      height:560px;
      padding:34px 28px 28px;
    }

    body.portrait .teams-row{
      gap:20px;
    }

    body.portrait .team-label{
      font-size:40px;
      margin-bottom:18px;
    }

    body.portrait .team-input{
      height:82px;
      font-size:28px;
      padding:0 18px;
    }

    body.portrait .team-input::placeholder{
      font-size:18px;
    }

    body.portrait .start-wrap{
      margin-top:40px;
      margin-bottom:26px;
    }

    body.portrait .start-btn{
      min-width:240px;
      height:96px;
      font-size:54px;
    }

    body.portrait .actions-grid{
      gap:14px;
    }

    body.portrait .action-btn{
      height:86px;
      font-size:28px;
    }

    body.portrait .modal{
      width:620px;
      max-width:96%;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img id="storeLogo" class="store-logo" src="logo.PNG" alt="صندوق المسابقات" />

        <div class="hero-logo-wrap">
          <img id="familyLogo" class="hero-logo" src="logo-family-feud.PNG" alt="فاميلي فيود" />
          <div id="familyLogoFallback" class="hero-logo-fallback">فاميلي فيود</div>
        </div>

        <section class="setup-panel">
          <div class="teams-row">
            <div class="team-block">
              <div class="team-label">الفريق الأول</div>
              <input id="teamOneInput" class="team-input" type="text" placeholder="اكتب اسم الفريق هنا..." />
            </div>

            <div class="team-block">
              <div class="team-label">الفريق الثاني</div>
              <input id="teamTwoInput" class="team-input" type="text" placeholder="اكتب اسم الفريق هنا..." />
            </div>
          </div>

          <div class="start-wrap">
            <button id="startBtn" class="start-btn" type="button" disabled>ابدأ</button>
          </div>

          <div class="actions-grid">
            <button id="answersBtn" class="action-btn" type="button">باركود الإجابات</button>
            <button id="buzzBtn" class="action-btn" type="button">باركود الأجراس</button>
            <button id="guideBtn" class="action-btn" type="button">التعليمات</button>
            <button class="action-btn" type="button" disabled>الرئيسية</button>
          </div>
        </section>

        <div id="guideOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">التعليمات</div>
            <div class="modal-text">
              اكتب اسم كل فريق في الخانة الخاصة به.<br>
              ثم اضغط ابدأ للدخول إلى صفحة اللعب.<br>
              استخدم باركود الإجابات لعرض صفحة الإجابات.<br>
              واستخدم باركود الأجراس لإدخال اللاعبين إلى صفحة الجرس.
            </div>
            <button class="close-btn" type="button" data-close="guideOverlay">إغلاق</button>
          </div>
        </div>

        <div id="answersOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">باركود الإجابات</div>

            <div class="answers-card">
              <div class="qr-box">
                <img id="qrImage" alt="QR Code" />
              </div>

              <input id="answersLinkInput" class="answers-link" type="text" readonly />

              <button id="copyBtn" class="copy-btn" type="button">نسخ الرابط</button>
              <div id="copyMsg" class="copy-msg"></div>
            </div>

            <button class="close-btn" type="button" data-close="answersOverlay">إغلاق</button>
          </div>
        </div>

        <div id="buzzOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">باركود الأجراس</div>

            <div class="answers-card">
              <div class="qr-box">
                <img id="buzzQrImage" alt="QR Code" />
              </div>

              <input id="buzzLinkInput" class="answers-link" type="text" readonly />

              <button id="buzzCopyBtn" class="copy-btn" type="button">نسخ الرابط</button>
              <div id="buzzCopyMsg" class="copy-msg"></div>
            </div>

            <button class="close-btn" type="button" data-close="buzzOverlay">إغلاق</button>
          </div>
        </div>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 640;
    const PORTRAIT_HEIGHT = 1280;

    const root = document.documentElement;

    const teamOneInput = document.getElementById("teamOneInput");
    const teamTwoInput = document.getElementById("teamTwoInput");
    const nameInputs = [teamOneInput, teamTwoInput];

    const guideBtn = document.getElementById("guideBtn");
    const answersBtn = document.getElementById("answersBtn");
    const buzzBtn = document.getElementById("buzzBtn");
    const startBtn = document.getElementById("startBtn");

    const guideOverlay = document.getElementById("guideOverlay");
    const answersOverlay = document.getElementById("answersOverlay");
    const buzzOverlay = document.getElementById("buzzOverlay");

    const answersLinkInput = document.getElementById("answersLinkInput");
    const qrImage = document.getElementById("qrImage");
    const copyBtn = document.getElementById("copyBtn");
    const copyMsg = document.getElementById("copyMsg");

    const buzzLinkInput = document.getElementById("buzzLinkInput");
    const buzzQrImage = document.getElementById("buzzQrImage");
    const buzzCopyBtn = document.getElementById("buzzCopyBtn");
    const buzzCopyMsg = document.getElementById("buzzCopyMsg");

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function isTypingNow() {
      return nameInputs.includes(document.activeElement);
    }

    function updateStableViewport() {
      if (isTypingNow()) return;
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;
      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      if (isTypingNow()) return;

      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      applyOrientationClass();
      setAppHeight(force);

      requestAnimationFrame(() => {
        fitGameToViewport(force);
        if (!isTypingNow() || force) {
          nudgeSafariBar();
        }
      });
    }

    function buildAnswersLink() {
      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/index\.html?$/i.test(path)) {
        url.pathname = path.replace(/index\.html?$/i, "answers.html");
      } else if (path.endsWith("/")) {
        url.pathname = path + "answers.html";
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/answers.html");
      }

      url.search = "";
      url.hash = "";
      return url.toString();
    }

    function buildBuzzLink() {
      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/index\.html?$/i.test(path)) {
        url.pathname = path.replace(/index\.html?$/i, "buzz.html");
      } else if (path.endsWith("/")) {
        url.pathname = path + "buzz.html";
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/buzz.html");
      }

      url.search = "";
      url.hash = "";
      return url.toString();
    }

    const ANSWERS_LINK = buildAnswersLink();
    const BUZZ_LINK = buildBuzzLink();

    function updateAnswersBox() {
      answersLinkInput.value = ANSWERS_LINK;
      qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(ANSWERS_LINK);
    }

    function updateBuzzBox() {
      buzzLinkInput.value = BUZZ_LINK;
      buzzQrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(BUZZ_LINK);
    }

    function openOverlay(el) {
      el.classList.add("show");
    }

    function closeOverlay(el) {
      el.classList.remove("show");
    }

    function updateStartButtonState() {
      const ready =
        teamOneInput.value.trim().length > 0 &&
        teamTwoInput.value.trim().length > 0;

      startBtn.disabled = !ready;
    }

    guideBtn.addEventListener("click", () => openOverlay(guideOverlay));

    answersBtn.addEventListener("click", () => {
      updateAnswersBox();
      openOverlay(answersOverlay);
    });

    buzzBtn.addEventListener("click", () => {
      updateBuzzBox();
      openOverlay(buzzOverlay);
    });

    startBtn.addEventListener("click", () => {
      if (startBtn.disabled) return;

      sessionStorage.setItem("familyfeud_team1", teamOneInput.value.trim());
      sessionStorage.setItem("familyfeud_team2", teamTwoInput.value.trim());
      window.location.href = "game.html";
    });

    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.close);
        if (target) closeOverlay(target);
      });
    });

    [guideOverlay, answersOverlay, buzzOverlay].forEach(overlay => {
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeOverlay(overlay);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeOverlay(guideOverlay);
        closeOverlay(answersOverlay);
        closeOverlay(buzzOverlay);
      }
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(answersLinkInput.value);
        copyMsg.textContent = "تم نسخ الرابط";
      } catch (e) {
        answersLinkInput.select();
        document.execCommand("copy");
        copyMsg.textContent = "تم نسخ الرابط";
      }

      setTimeout(() => {
        copyMsg.textContent = "";
      }, 1600);
    });

    buzzCopyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(buzzLinkInput.value);
        buzzCopyMsg.textContent = "تم نسخ الرابط";
      } catch (e) {
        buzzLinkInput.select();
        document.execCommand("copy");
        buzzCopyMsg.textContent = "تم نسخ الرابط";
      }

      setTimeout(() => {
        buzzCopyMsg.textContent = "";
      }, 1600);
    });

    teamOneInput.value = sessionStorage.getItem("familyfeud_team1") || "";
    teamTwoInput.value = sessionStorage.getItem("familyfeud_team2") || "";

    teamOneInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team1", teamOneInput.value);
      updateStartButtonState();
    });

    teamTwoInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team2", teamTwoInput.value);
      updateStartButtonState();
    });

    nameInputs.forEach(input => {
      input.addEventListener("focus", () => {
        document.body.classList.add("typing");
      });

      input.addEventListener("blur", () => {
        setTimeout(() => {
          document.body.classList.remove("typing");
          updateLayout(true);
        }, 80);
      });
    });

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    updateStartButtonState();
    updateLayout(true);

    window.addEventListener("load", () => {
      setTimeout(() => updateLayout(true), 60);
      setTimeout(() => updateLayout(true), 220);
    }, { passive: true });

    window.addEventListener("resize", () => {
      if (!isTypingNow()) updateLayout();
    }, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => updateLayout(true), 80);
      setTimeout(() => updateLayout(true), 250);
      setTimeout(() => updateLayout(true), 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });

      window.visualViewport.addEventListener("scroll", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
