<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Index</title>

  <link rel="preload" as="image" href="logo-family-feud.PNG">
  <link rel="preload" as="image" href="logo.PNG">

  <script>
    (function () {
      const ACTIVATE_FILE = "activate.html";
      const TOKEN_KEYS = [
        "sandooq_token_v1",
        "familyfeud_token_v1"
      ];
      const ACCESS_KEYS = [
        "familyfeud_access_ok_v1",
        "familyfeud_activation_ok_v1",
        "familyfeud_auth_passed_v1"
      ];

      function hasStoredValue(key) {
        try {
          const localValue = localStorage.getItem(key);
          if (localValue && String(localValue).trim()) return true;
        } catch (e) {}

        try {
          const sessionValue = sessionStorage.getItem(key);
          if (sessionValue && String(sessionValue).trim()) return true;
        } catch (e) {}

        return false;
      }

      const hasToken = TOKEN_KEYS.some(hasStoredValue);
      const hasAccess = ACCESS_KEYS.some(hasStoredValue);

      if (hasToken || hasAccess) return;

      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/index\.html?$/i.test(path)) {
        url.pathname = path.replace(/index\.html?$/i, ACTIVATE_FILE);
      } else if (path.endsWith("/")) {
        url.pathname = path + ACTIVATE_FILE;
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/" + ACTIVATE_FILE);
      }

      url.search = "";
      url.hash = "";
      url.searchParams.set("next", "index.html");

      window.location.replace(url.toString());
    })();
  </script>

  <style>
    :root{
      --gold:#f1d14f;
      --white:#f4f2ea;
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:18px;
      left:18px;
      width:150px;
      height:150px;
      object-fit:contain;
      z-index:5;
    }

    .hero-logo-wrap{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:540px;
      min-height:215px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
    }

    .hero-logo{
      display:block;
      max-width:100%;
      max-height:215px;
      object-fit:contain;
    }

    .hero-logo-fallback{
      display:none;
      width:100%;
      text-align:center;
      font-size:66px;
      font-weight:900;
      color:#ffd34d;
      text-shadow:
        0 3px 0 #9a1c13,
        0 8px 20px rgba(0,0,0,.22);
    }

    .setup-panel{
      position:absolute;
      left:50%;
      top:418px;
      transform:translate(-50%, -50%);
      width:900px;
      height:368px;
      border-radius:36px;
      border:10px solid #0f0f0f;
      background:linear-gradient(180deg, #0f2c88 0%, #081d61 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 18px 40px rgba(0,0,0,.22);
      padding:28px 34px 24px;
      display:flex;
      flex-direction:column;
    }

    .teams-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px;
      align-items:start;
    }

    .team-block{
      text-align:center;
    }

    .team-label{
      color:var(--white);
      font-size:38px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:16px;
    }

    .team-input{
      width:100%;
      height:74px;
      border-radius:999px;
      border:4px solid #101010;
      background:#f3f3f3;
      color:#222;
      font-size:26px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 20px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75);
    }

    .team-input::placeholder{
      color:#777;
      font-weight:700;
      font-size:22px;
    }

    .start-wrap{
      position:absolute;
      left:50%;
      top:646px;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:6;
    }

    .start-btn{
      min-width:220px;
      height:86px;
      border-radius:999px;
      border:5px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #ff922b 0%, #ff7b14 100%);
      color:#ffffff;
      font-size:48px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.12);
    }

    .start-btn:hover:not(:disabled){
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .start-btn:active:not(:disabled){
      transform:scale(.985);
    }

    .start-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    .actions-grid{
      margin-top:auto;
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:16px;
      align-items:end;
    }

    .action-btn{
      height:78px;
      border-radius:28px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .28);
      color:var(--white);
      font-size:26px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
      white-space:nowrap;
    }

    .action-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .action-btn:active{
      transform:scale(.985);
    }

    .action-btn[disabled]{
      cursor:not-allowed;
      opacity:.72;
      transform:none;
      filter:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(2,8,28,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:20;
      padding:20px;
    }

    .overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      width:560px;
      max-width:100%;
      border-radius:30px;
      border:5px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      box-shadow:0 20px 45px rgba(0,0,0,.28);
      color:var(--white);
      padding:24px 22px 22px;
      text-align:center;
    }

    .modal-title{
      font-size:38px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:16px;
      color:var(--gold);
    }

    .modal-text{
      font-size:24px;
      font-weight:700;
      line-height:1.8;
      color:#f4f2ea;
    }

    .close-btn{
      margin-top:20px;
      min-width:180px;
      height:64px;
      border-radius:24px;
      border:4px solid rgba(243,242,234,.95);
      background:rgba(46, 81, 198, .30);
      color:var(--white);
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .answers-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }

    .qr-box{
      width:250px;
      height:250px;
      border-radius:24px;
      background:#ffffff;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .qr-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .answers-link{
      width:100%;
      min-height:58px;
      border-radius:18px;
      border:3px solid rgba(243,242,234,.92);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      font-weight:700;
      text-align:center;
      padding:12px 14px;
      direction:ltr;
      outline:none;
    }

    .copy-btn{
      width:220px;
      height:64px;
      border-radius:22px;
      border:4px solid rgba(243,242,234,.95);
      background:linear-gradient(180deg, #2b3fc2 0%, #0e2f91 100%);
      color:#fff;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }

    .copy-msg{
      min-height:28px;
      font-size:20px;
      font-weight:800;
      color:var(--gold);
    }

    body.portrait .game-shell{
      width:640px;
      height:1280px;
    }

    body.portrait .store-logo{
      top:10px;
      left:2px;
      width:132px;
      height:132px;
    }

    body.portrait .hero-logo-wrap{
      top:155px;
      width:560px;
      min-height:300px;
    }

    body.portrait .hero-logo{
      max-height:300px;
    }

    body.portrait .setup-panel{
      top:760px;
      width:620px;
      height:430px;
      padding:34px 28px 28px;
    }

    body.portrait .teams-row{
      gap:20px;
    }

    body.portrait .team-label{
      font-size:40px;
      margin-bottom:18px;
    }

    body.portrait .team-input{
      height:82px;
      font-size:28px;
      padding:0 18px;
    }

    body.portrait .team-input::placeholder{
      font-size:18px;
    }

    body.portrait .start-wrap{
      top:1058px;
    }

    body.portrait .start-btn{
      min-width:240px;
      height:96px;
      font-size:54px;
    }

    body.portrait .actions-grid{
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    body.portrait .action-btn{
      height:86px;
      font-size:28px;
    }

    body.portrait .modal{
      width:620px;
      max-width:96%;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img
          id="storeLogo"
          class="store-logo"
          src="logo.PNG"

          loading="eager"
          decoding="async"
          fetchpriority="low"
        />

        <div class="hero-logo-wrap">
          <img
            id="familyLogo"
            class="hero-logo"
            src="logo-family-feud.PNG"
            alt="فاميلي فيود"
            width="1536"
            height="1024"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />

        <div class="start-wrap">

              استخدم لوحة المضيف لفتح صفحة التحكم الكاملة.<br>
              واستخدم زر الجرس لإدخال اللاعبين إلى صفحة الجرس.

            <button class="close-btn" type="button" data-close="guideOverlay">إغلاق</button>

        <div id="answersOverlay" class="overlay">
          <div class="modal">

            <div class="answers-card">
              <div class="qr-box">
                <img id="qrImage" alt="QR Code" />
              </div>

              <input id="answersLinkInput" class="answers-link" type="text" readonly />

              <button id="copyBtn" class="copy-btn" type="button">نسخ الرابط</button>

            <button class="close-btn" type="button" data-close="answersOverlay">إغلاق</button>
          </div>

        <div id="buzzOverlay" class="overlay">
          <div class="modal">
            <div class="modal-title">زر الجرس</div>

            <div class="answers-card">
              <div class="qr-box">
                <img id="buzzQrImage" alt="QR Code" />
              </div>

              <input id="buzzLinkInput" class="answers-link" type="text" readonly />

              <button id="buzzCopyBtn" class="copy-btn" type="button">نسخ الرابط</button>
              <div id="buzzCopyMsg" class="copy-msg"></div>
            </div>

            <button class="close-btn" type="button" data-close="buzzOverlay">إغلاق</button>
          </div>
        </div>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 640;
    const PORTRAIT_HEIGHT = 1280;

    const DISPLAY_KEY = "familyfeud_display_state_v1";
    const CONTROL_KEY = "familyfeud_control_state_v1";
    const ROOM_KEY = "familyfeud_room_id";
    const BUZZ_ROOM_KEY = "familyfeud_buzz_room";
    const API_BASE_KEY = "familyfeud_api_base";
    const BUZZ_API_BASE_KEY = "familyfeud_buzz_api_base";

    const root = document.documentElement;

    const teamOneInput = document.getElementById("teamOneInput");
    const teamTwoInput = document.getElementById("teamTwoInput");
    const nameInputs = [teamOneInput, teamTwoInput];

    const guideBtn = document.getElementById("guideBtn");
    const answersBtn = document.getElementById("answersBtn");
    const buzzBtn = document.getElementById("buzzBtn");
    const startBtn = document.getElementById("startBtn");

    const guideOverlay = document.getElementById("guideOverlay");
    const answersOverlay = document.getElementById("answersOverlay");
    const buzzOverlay = document.getElementById("buzzOverlay");

    const answersLinkInput = document.getElementById("answersLinkInput");
    const qrImage = document.getElementById("qrImage");
    const copyBtn = document.getElementById("copyBtn");
    const copyMsg = document.getElementById("copyMsg");

    const buzzLinkInput = document.getElementById("buzzLinkInput");
    const buzzQrImage = document.getElementById("buzzQrImage");
    const buzzCopyBtn = document.getElementById("buzzCopyBtn");
    const buzzCopyMsg = document.getElementById("buzzCopyMsg");

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;
    let currentRoomId = createFreshRoomId();

    persistRoomId(currentRoomId);

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function writeStored(key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
      try { sessionStorage.setItem(key, value); } catch (e) {}
    }

    function normalizeBase(base) {
      return String(base || "").trim().replace(/\/+$/, "");
    }

    function getApiBases() {
      const seen = new Set();
      const result = [];

      const candidates = [
        readStored(API_BASE_KEY),
        readStored(BUZZ_API_BASE_KEY),
        window.location.origin.includes("workers.dev") ? window.location.origin : "",
        "https://family-feud-buzz.sandooq-m.workers.dev",
        "https://z.sandooq-m.workers.dev"
      ];

      candidates.forEach((base) => {
        const normalized = normalizeBase(base);
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        result.push(normalized);
      });

      return result;
    }

    function createFreshRoomId() {
      const randomPart = Math.random().toString(36).slice(2, 8);
      return `family-feud-${randomPart}`;
    }

    function persistRoomId(roomId) {
      writeStored(ROOM_KEY, roomId);
      writeStored(BUZZ_ROOM_KEY, roomId);
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function isTypingNow() {
      return nameInputs.includes(document.activeElement);
    }

    function updateStableViewport() {
      if (isTypingNow()) return;
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;
      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      if (isTypingNow()) return;

      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout(force = false) {
      if (!isTypingNow() || force) {
        updateStableViewport();
      }

      applyOrientationClass();
      setAppHeight(force);

      requestAnimationFrame(() => {
        fitGameToViewport(force);
        if (!isTypingNow() || force) {
          nudgeSafariBar();
        }
      });
    }

    function buildPageLink(fileName) {
      const url = new URL(window.location.href);
      const path = url.pathname;

      if (/index\.html?$/i.test(path)) {
        url.pathname = path.replace(/index\.html?$/i, fileName);
      } else if (path.endsWith("/")) {
        url.pathname = path + fileName;
      } else {
        url.pathname = path.replace(/\/[^/]*$/, "/" + fileName);
      }

      url.search = "";
      url.hash = "";
      url.searchParams.set("room", currentRoomId);
      return url.toString();
    }

    function buildControlLink() {
      return buildPageLink("control.html");
    }

    function buildBuzzLink() {
      return buildPageLink("buzz.html");
    }

    function buildGameLink() {
      return buildPageLink("game.html");
    }

    function updateAnswersBox() {
      const controlLink = buildControlLink();
      answersLinkInput.value = controlLink;
      qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(controlLink);
    }

    function updateBuzzBox() {
      const buzzLink = buildBuzzLink();
      buzzLinkInput.value = buzzLink;
      buzzQrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(buzzLink);
    }

    function openOverlay(el) {
      el.classList.add("show");
    }

    function closeOverlay(el) {
      el.classList.remove("show");
    }

    function updateStartButtonState() {
      const ready =
        teamOneInput.value.trim().length > 0 &&
        teamTwoInput.value.trim().length > 0;

      startBtn.disabled = !ready;
    }

    function initializeLocalGameState(team1, team2) {
      const defaultQuestion = "اذكر شيئًا يستخدمه الناس يوميًا";

      const displayState = {
        showQuestion: false,
        question: defaultQuestion,
        team1Name: team1,
        team2Name: team2,
        team1Score: 0,
        team2Score: 0,
        team1Strikes: 0,
        team2Strikes: 0,
        roundPoints: 0,
        answers: [
          { text: "الجوال", points: 32, revealed: false },
          { text: "المفاتيح", points: 18, revealed: false },
          { text: "الماء", points: 14, revealed: false },
          { text: "السيارة", points: 10, revealed: false },
          { text: "المحفظة", points: 8, revealed: false },
          { text: "النظارة", points: 6, revealed: false }
        ]
      };

      const controlState = {
        currentQuestionIndex: 0,
        stage: "idle",
        currentTurnTeam: "",
        confrontationWinner: "",
        stealingTeam: "",
        firstBuzzName: "",
        firstBuzzTeam: "",
        buzzVisible: true
      };

      writeStored(DISPLAY_KEY, JSON.stringify(displayState));
      writeStored(CONTROL_KEY, JSON.stringify(controlState));
      writeStored("familyfeud_buzz_enabled_presenter", "1");
    }

    async function initializeRemoteGame(room, team1, team2) {
      const bases = getApiBases();

      for (const base of bases) {
        try {
          const response = await fetch(`${base}/api/game/init?room=${encodeURIComponent(room)}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache"
            },
            body: JSON.stringify({
              team1Name: team1,
              team2Name: team2,
              questionIndex: 0
            })
          });

          if (!response.ok) continue;

          const data = await response.json().catch(() => null);
          if (!data || !data.ok) continue;

          writeStored(API_BASE_KEY, base);
          writeStored(BUZZ_API_BASE_KEY, base);
          return true;
        } catch (error) {}
      }

      return false;
    }

    guideBtn.addEventListener("click", () => openOverlay(guideOverlay));

    answersBtn.addEventListener("click", () => {
      updateAnswersBox();
      openOverlay(answersOverlay);
    });

    buzzBtn.addEventListener("click", () => {
      updateBuzzBox();
      openOverlay(buzzOverlay);
    });

    startBtn.addEventListener("click", async () => {
      if (startBtn.disabled) return;

      const team1 = teamOneInput.value.trim();
      const team2 = teamTwoInput.value.trim();

      sessionStorage.setItem("familyfeud_team1", team1);
      sessionStorage.setItem("familyfeud_team2", team2);
      writeStored("familyfeud_team1", team1);
      writeStored("familyfeud_team2", team2);

      startBtn.disabled = true;
      const originalText = startBtn.textContent;
      startBtn.textContent = "جارٍ البدء...";

      const remoteOk = await initializeRemoteGame(currentRoomId, team1, team2);

      if (!remoteOk) {
        startBtn.disabled = false;
        startBtn.textContent = originalText;
        window.alert("تعذر تجهيز الغرفة الآن. تأكد من أن الباكند منشور ثم حاول مرة أخرى.");
        return;
      }

      initializeLocalGameState(team1, team2);
      startBtn.textContent = originalText;
      window.location.href = buildGameLink();
    });

    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.close);
        if (target) closeOverlay(target);
      });
    });

    [guideOverlay, answersOverlay, buzzOverlay].forEach(overlay => {
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeOverlay(overlay);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeOverlay(guideOverlay);
        closeOverlay(answersOverlay);
        closeOverlay(buzzOverlay);
      }
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(answersLinkInput.value);
        copyMsg.textContent = "تم نسخ الرابط";
      } catch (e) {
        answersLinkInput.select();
        document.execCommand("copy");
        copyMsg.textContent = "تم نسخ الرابط";
      }

      setTimeout(() => {
        copyMsg.textContent = "";
      }, 1600);
    });

    buzzCopyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(buzzLinkInput.value);
        buzzCopyMsg.textContent = "تم نسخ الرابط";
      } catch (e) {
        buzzLinkInput.select();
        document.execCommand("copy");
        buzzCopyMsg.textContent = "تم نسخ الرابط";
      }

      setTimeout(() => {
        buzzCopyMsg.textContent = "";
      }, 1600);
    });

    teamOneInput.value = sessionStorage.getItem("familyfeud_team1") || "";
    teamTwoInput.value = sessionStorage.getItem("familyfeud_team2") || "";

    teamOneInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team1", teamOneInput.value);
      writeStored("familyfeud_team1", teamOneInput.value);
      updateStartButtonState();
    });

    teamTwoInput.addEventListener("input", () => {
      sessionStorage.setItem("familyfeud_team2", teamTwoInput.value);
      writeStored("familyfeud_team2", teamTwoInput.value);
      updateStartButtonState();
    });

    nameInputs.forEach(input => {
      input.addEventListener("focus", () => {
        document.body.classList.add("typing");
      });

      input.addEventListener("blur", () => {
        setTimeout(() => {
          document.body.classList.remove("typing");
          updateLayout(true);
        }, 80);
      });
    });

    const familyLogo = document.getElementById("familyLogo");
    const familyLogoFallback = document.getElementById("familyLogoFallback");

    familyLogo.addEventListener("error", () => {
      familyLogo.style.display = "none";
      familyLogoFallback.style.display = "block";
    });

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    updateStartButtonState();
    updateAnswersBox();
    updateBuzzBox();
    updateLayout(true);

    window.addEventListener("load", () => {
      setTimeout(() => updateLayout(true), 60);
      setTimeout(() => updateLayout(true), 220);
    }, { passive: true });

    window.addEventListener("resize", () => {
      if (!isTypingNow()) updateLayout();
    }, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => updateLayout(true), 80);
      setTimeout(() => updateLayout(true), 250);
      setTimeout(() => updateLayout(true), 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });

      window.visualViewport.addEventListener("scroll", () => {
        if (!isTypingNow()) updateLayout();
      }, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
