<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Control</title>

  <style>
    :root{
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --bg:#0b1457;
      --gold:#d3a91f;
      --gold-soft:#f1cb4a;
      --white:#f6f2e8;

      --answer-a:#2633DB;
      --answer-b:#217DFF;

      --panel-dark:#2b2c30;
      --panel-blue:#314fb3;
      --panel-red:#cf0617;

      --button-blue:#314fb3;
      --button-blue-2:#2845a8;
      --button-red:#d10618;
      --button-red-2:#b90514;

      --stroke:#ece8e0;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html{
      min-height:100%;
      background:var(--bg);
    }

    body{
      min-height:100%;
      background:var(--bg);
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
      color:var(--white);
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:var(--bg);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .question-number{
      position:absolute;
      top:26px;
      right:34px;
      width:140px;
      height:60px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      text-align:right;
      color:var(--white);
      font-size:34px;
      font-weight:900;
      line-height:1;
      z-index:5;
      white-space:nowrap;
    }

    .question-box{
      position:absolute;
      top:20px;
      left:78px;
      width:1340px;
      height:86px;
      border-radius:34px;
      border:6px solid var(--gold);
      background:#0e1f6c;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .question-text{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 40px;
      color:var(--white);
      font-size:46px;
      font-weight:900;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .answers-panel{
      position:absolute;
      top:144px;
      left:78px;
      width:854px;
      height:372px;
      border-radius:34px;
      border:7px solid var(--gold-soft);
      background:#132977;
      padding:24px 16px;
    }

    .answers-grid{
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3, 1fr);
      gap:18px 18px;
      direction:ltr;
    }

    .answer-card{
      position:relative;
      border-radius:32px;
      border:4px solid var(--stroke);
      background:linear-gradient(180deg, var(--answer-b) 0%, var(--answer-a) 100%);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 74px 0 72px;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
      box-shadow:0 6px 12px rgba(0,0,0,.12);
    }

    .answer-card:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .answer-card:active{
      transform:scale(.99);
    }

    .answer-card.revealed{
      background:linear-gradient(180deg, #777b86 0%, #4f535d 100%);
      opacity:.68;
      filter:grayscale(.35) brightness(.88);
      box-shadow:
        inset 0 0 0 999px rgba(0,0,0,.10),
        0 0 0 3px rgba(255,255,255,.28),
        0 6px 14px rgba(0,0,0,.15);
    }

    .answer-card.revealed::after{
      content:"مكشوفة";
      position:absolute;
      top:7px;
      right:14px;
      padding:3px 10px 4px;
      border-radius:999px;
      background:rgba(0,0,0,.34);
      color:rgba(255,255,255,.88);
      font-size:13px;
      font-weight:900;
      line-height:1;
      pointer-events:none;
    }

    .answer-card.revealed .answer-label{
      color:rgba(255,255,255,.78);
    }

    .answer-card.revealed .answer-points{
      background:#d8d8d8;
      color:#444;
      border-color:#2d2d2d;
      opacity:.9;
    }

    .answer-card.disabled{
      opacity:.75;
      cursor:default;
      transform:none !important;
      filter:none !important;
    }

    .answer-card.revealed.disabled{
      opacity:.68;
      filter:grayscale(.35) brightness(.88) !important;
    }

    .answer-card:disabled{
      opacity:.75;
      cursor:default;
      transform:none !important;
      filter:none !important;
    }

    .answer-card.revealed:disabled{
      opacity:.68;
      filter:grayscale(.35) brightness(.88) !important;
    }

    .answer-points{
      position:absolute;
      left:18px;
      top:50%;
      transform:translateY(-50%);
      width:52px;
      height:52px;
      border-radius:50%;
      border:4px solid #121212;
      background:#f4c83c;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .answer-label{
      width:100%;
      text-align:center;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      line-height:1.12;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding:2px 8px 0;
    }

    .right-panel{
      position:absolute;
      top:144px;
      right:78px;
      width:500px;
      height:372px;
      border-radius:34px;
      border:7px solid var(--gold-soft);
      background:var(--panel-dark);
      padding:22px 18px 18px;
    }

    .panel-title{
      min-height:54px;
      text-align:center;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      line-height:1.3;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      white-space:normal;
    }

    .panel-actions{
      min-height:166px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .panel-row{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      margin-bottom:16px;
    }

    .panel-row.single-fail{
      justify-content:center;
    }

    .panel-btn{
      min-width:184px;
      height:62px;
      border:none;
      border-radius:26px;
      background:var(--panel-blue);
      color:var(--white);
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      border:2px solid rgba(255,255,255,.82);
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
      padding:0 14px;
      white-space:nowrap;
    }

    .panel-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .panel-btn:active{
      transform:scale(.99);
    }

    .panel-btn.red{
      min-width:190px;
      background:linear-gradient(180deg, var(--button-red) 0%, var(--button-red-2) 100%);
    }

    .panel-btn.fail-only{
      min-width:232px;
      height:70px;
      font-size:24px;
      transform:translateX(10px);
    }

    .panel-btn.fail-only:hover{
      transform:translateX(10px) translateY(-1px);
    }

    .panel-btn.fail-only:active{
      transform:translateX(10px) scale(.99);
    }

    .panel-btn:disabled{
      opacity:.65;
      cursor:default;
      transform:none !important;
      filter:none !important;
    }

    .panel-btn.fail-only:disabled{
      transform:translateX(10px) !important;
    }

    .player-box{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      height:68px;
      border-radius:28px;
      border:4px solid rgba(255,255,255,.92);
      background:linear-gradient(180deg, #223254 0%, #1a2338 100%);
      color:rgba(255,255,255,.86);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      padding:0 18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.06),
        0 8px 16px rgba(0,0,0,.18);
      transition:
        background .16s ease,
        box-shadow .16s ease,
        color .16s ease,
        font-size .16s ease,
        transform .16s ease;
    }

    .player-box.active{
      background:linear-gradient(180deg, #1d55ca 0%, #153c94 100%);
      color:#ffffff;
      font-size:32px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        0 0 0 3px rgba(255,255,255,.10),
        0 10px 22px rgba(0,0,0,.24);
      transform:translateY(-1px);
    }

    .bottom-actions{
      position:absolute;
      left:0;
      right:0;
      bottom:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:42px;
      transform:translateX(-68px);
    }

    .main-btn{
      width:280px;
      height:84px;
      border:none;
      border-radius:32px;
      color:var(--white);
      font-size:26px;
      font-weight:900;
      cursor:pointer;
      border:4px solid rgba(255,255,255,.88);
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .main-btn:active{
      transform:scale(.99);
    }

    .main-btn.blue{
      background:linear-gradient(180deg, var(--button-blue) 0%, var(--button-blue-2) 100%);
    }

    .main-btn.red{
      width:310px;
      background:linear-gradient(180deg, var(--button-red) 0%, var(--button-red-2) 100%);
      font-size:36px;
    }

    .main-btn:disabled{
      opacity:.65;
      cursor:default;
      transform:none !important;
      filter:none !important;
    }

    .question-toggle-btn{
      position:absolute;
      right:80px;
      bottom:72px;
    }

    .home-btn{
      position:absolute;
      left:16px;
      bottom:44px;
      width:64px;
      height:64px;
      border:none;
      border-radius:50%;
      background:#d3a91f;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 14px rgba(0,0,0,.18);
      text-decoration:none;
    }

    .home-btn svg{
      width:38px;
      height:38px;
      display:block;
      fill:#fff;
    }

    .hint-hidden{
      visibility:hidden;
    }
  </style>
</head>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <section class="right-panel">

          <div id="panelActions" class="panel-actions"></div>
          <div id="firstPlayerBox" class="player-box">اسم اللاعب الذي يضغط أولًا</div>
        </section>

        <div class="bottom-actions">
          <button id="bellToggleBtn" class="main-btn blue" type="button">إخفاء الجرس</button>
          <button id="errorBtn" class="main-btn red" type="button">خطأ</button>
          <button id="nextQuestionBtn" class="main-btn blue" type="button">تغيير السؤال</button>
        </div>

        <button id="questionToggleBtn" class="main-btn blue question-toggle-btn" type="button">إظهار السؤال</button>

          </svg>
        </a>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const DESIGN_WIDTH = 1600;

    const DISPLAY_KEY = "familyfeud_display_state_v1";

    const BUZZ_ROOM_KEY = "familyfeud_buzz_room";
    const API_BASE_KEY = "familyfeud_api_base";
    const BUZZ_API_BASE_KEY = "familyfeud_buzz_api_base";
    const DISPLAY_CHANNEL = "familyfeud_display_channel_v1";
    const ROUND_CLOSED_KEY = "familyfeud_round_closed_after_steal_v1";

    const DEFAULT_ROOM = "family-feud-demo";
    const FALLBACK_POLL_MS = 3500;
    const PUSHER_FALLBACK_POLL_MS = 9000;
    const BUZZ_FALLBACK_POLL_MS = 700;
    const BUZZ_PUSHER_FALLBACK_POLL_MS = 1800;
    const MIN_STATE_FETCH_GAP_MS = 700;
    const PUSHER_RECENT_GRACE_MS = 2400;

    const FAST_ACTION_GUARD_MS = 260;
    const NORMAL_ACTION_GUARD_MS = 380;
    const HEAVY_ACTION_GUARD_MS = 650;

    const root = document.documentElement;

    const questionNumberEl = document.getElementById("questionNumber");
    const questionTextEl = document.getElementById("questionText");
    const answersGridEl = document.getElementById("answersGrid");
    const panelTitleEl = document.getElementById("panelTitle");
    const panelActionsEl = document.getElementById("panelActions");
    const firstPlayerBoxEl = document.getElementById("firstPlayerBox");

    const errorBtn = document.getElementById("errorBtn");
    const nextQuestionBtn = document.getElementById("nextQuestionBtn");
    const questionToggleBtn = document.getElementById("questionToggleBtn");

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let roomId = resolveRoomId();
    let displayState = readDisplayState();
    let controlState = readControlState();
    let channel = null;

    let isBusy = false;
    let stealAwardInProgress = false;
    let toggleActionInFlight = false;
    let errorActionInFlight = false;
    let nextQuestionInFlight = false;
    let panelActionInFlight = false;
    let answerActionInFlight = new Set();

    let pusher = null;
    let gameChannel = null;
    let buzzPusher = null;
    let buzzChannel = null;

    let fallbackPoll = null;
    let buzzFallbackPoll = null;
    let currentPollMs = 0;
    let currentBuzzPollMs = 0;

    let usingPusherRealtime = false;
    let usingBuzzPusherRealtime = false;

    let stateFetchInFlight = null;
    let buzzStateFetchInFlight = null;

    let lastRemoteStateAt = 0;
    let lastRemoteBuzzStateAt = 0;

    let syncStarted = false;
    let apiBase = normalizeBase(window.location.origin) || normalizeBase(readStored(API_BASE_KEY) || readStored(BUZZ_API_BASE_KEY));
    let initialAutoShowDone = false;
    let optimisticRevealedIndexes = new Set();
    let roundClosedAfterSteal = readRoundClosedAfterSteal();
    let actionGuardUntil = new Map();
    let lastRenderSignature = "";
    let hasAcceptedInitialRemoteQuestion = false;

    try {
      channel = new BroadcastChannel(DISPLAY_CHANNEL);
    } catch (e) {
      channel = null;
    }

    pinCurrentOriginAsApiBase();
    persistRoomId(roomId);
    ensureInitialState();
    renderAll(true);
    updateLayout();
    startRemoteSync();

    if (channel) {
      channel.onmessage = () => {
        displayState = readDisplayState();
        controlState = readControlState();
        roundClosedAfterSteal = readRoundClosedAfterSteal();
        renderAll();
      };
    }

    window.addEventListener("storage", () => {
      displayState = readDisplayState();
      controlState = readControlState();
      roundClosedAfterSteal = readRoundClosedAfterSteal();
      renderAll();
    });

    window.addEventListener("focus", async () => {
      const gameRecent = Date.now() - lastRemoteStateAt < MIN_STATE_FETCH_GAP_MS;
      const buzzRecent = Date.now() - lastRemoteBuzzStateAt < MIN_STATE_FETCH_GAP_MS;

      if (gameRecent && buzzRecent) {
        renderAll();
        return;
      }

      const tasks = [];
      if (!gameRecent) tasks.push(fetchRemoteGameState({ force: true }));
      if (!buzzRecent) tasks.push(fetchRemoteBuzzState({ force: true }));

      if (tasks.length) {
        await Promise.all(tasks);
      }

      renderAll();
    });

    window.addEventListener("load", () => {
      setTimeout(updateLayout, 60);
      setTimeout(updateLayout, 220);
      renderAll();
    }, { passive: true });

    window.addEventListener("resize", updateLayout, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
      setTimeout(updateLayout, 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
    window.addEventListener("beforeunload", destroyLiveSync);

    bellToggleBtn.addEventListener("click", async () => {
      if (toggleActionInFlight || stealAwardInProgress) return;

      await runGuardedAction("toggle-bell", async () => {
        const previousVisible = !!controlState.buzzVisible;
        const nextVisible = !previousVisible;

        toggleActionInFlight = true;
        controlState.buzzVisible = nextVisible;
        renderAll();

        try {
          const ok = await sendGameAction("set_buzz_visible", {
            visible: nextVisible
          }, { skipBusy: true });

          if (!ok) {
            controlState.buzzVisible = previousVisible;
            renderAll();
            await fetchRemoteGameState({ force: true });
            await fetchRemoteBuzzState({ force: true });
          }
        } finally {
          toggleActionInFlight = false;
          renderAll();
        }
      }, FAST_ACTION_GUARD_MS);
    });

    questionToggleBtn.addEventListener("click", async () => {
      if (toggleActionInFlight || stealAwardInProgress) return;

      await runGuardedAction("toggle-question", async () => {
        const previousVisible = !!displayState.showQuestion;
        const previousQuestion = String(displayState.question || "");
        const previousAnswers = normalizeAnswersForDisplay(displayState.answers);
        const previousQuestionIndex = Number(controlState.currentQuestionIndex || 0);
        const previousTotalQuestions = Number(controlState.totalQuestions || 0);
        const nextVisible = !previousVisible;
        const currentQuestionBundle = getCurrentLocalQuestionBundle();

        toggleActionInFlight = true;

        if (nextVisible && currentQuestionBundle.question) {
          applyLocalQuestionBundle(currentQuestionBundle);
        }

        displayState.showQuestion = nextVisible;
        renderAll();

        try {
          const payload = currentQuestionBundle.question
            ? {
                visible: nextVisible,
                questionIndex: currentQuestionBundle.questionIndex,
                totalQuestions: currentQuestionBundle.totalQuestions,
                question: currentQuestionBundle.question
              }
            : { visible: nextVisible };

          const ok = await sendGameAction("show_question", payload, { skipBusy: true });

          if (!ok) {
            displayState.showQuestion = previousVisible;
            displayState.question = previousQuestion;
            displayState.answers = previousAnswers;
            controlState.currentQuestionIndex = previousQuestionIndex;
            controlState.totalQuestions = previousTotalQuestions;
            renderAll();
            await fetchRemoteGameState({ force: true });
          }
        } finally {
          toggleActionInFlight = false;
          renderAll();
        }
      }, FAST_ACTION_GUARD_MS);
    });

    errorBtn.addEventListener("click", async () => {
      if (!canRegisterError()) return;
      if (errorActionInFlight || stealAwardInProgress) return;

      await runGuardedAction("register-error", async () => {
        errorActionInFlight = true;
        renderAll();

        try {
          await sendGameAction("register_error", {
            team: controlState.currentTurnTeam
          }, { skipBusy: true });
        } finally {
          errorActionInFlight = false;
          renderAll();
        }
      }, NORMAL_ACTION_GUARD_MS);
    });

    nextQuestionBtn.addEventListener("click", async () => {
      if (nextQuestionInFlight || stealAwardInProgress) return;

      await runGuardedAction("next-question", async () => {
        optimisticRevealedIndexes.clear();
        clearRoundClosedAfterSteal();

        const previousShowQuestion = !!displayState.showQuestion;
        const previousBuzzVisible = !!controlState.buzzVisible;
        const localQuestionBundle = getNextLocalQuestionBundle();

        nextQuestionInFlight = true;

        if (localQuestionBundle.question) {
          applyLocalQuestionBundle(localQuestionBundle);
        }

        displayState.showQuestion = false;
        controlState.buzzVisible = true;
        controlState.firstBuzzName = "";
        controlState.firstBuzzTeam = "";
        renderAll();

        try {
          const ok = await sendGameAction("next_question_bundle", localQuestionBundle, { skipBusy: true });

          if (!ok) {
            displayState.showQuestion = previousShowQuestion;
            controlState.buzzVisible = previousBuzzVisible;
            renderAll();
            await fetchRemoteGameState({ force: true });
            await fetchRemoteBuzzState({ force: true });
          }
        } finally {
          nextQuestionInFlight = false;
          renderAll();
        }
      }, HEAVY_ACTION_GUARD_MS);
    });

    function pinCurrentOriginAsApiBase() {
      const preferred = normalizeBase(window.location.origin);
      if (!preferred) return;
      apiBase = preferred;
      writeStored(API_BASE_KEY, preferred);
      writeStored(BUZZ_API_BASE_KEY, preferred);
    }

    function resolveRoomId() {
      const url = new URL(window.location.href);
      const fromUrl = normalizeRoom(url.searchParams.get("room"));
      const fromStorage = normalizeRoom(readStored(ROOM_KEY) || readStored(BUZZ_ROOM_KEY));
      return fromUrl || fromStorage || DEFAULT_ROOM;
    }

    function persistRoomId(nextRoom) {
      writeStored(ROOM_KEY, nextRoom);
      writeStored(BUZZ_ROOM_KEY, nextRoom);
    }

    function normalizeAnswerForDisplay(answer) {
      return {
        text: String(answer?.text || "").trim(),
        points: Number(answer?.points || 0),
        revealed: !!answer?.revealed
      };
    }

    function normalizeAnswersForDisplay(answers) {
      const list = Array.isArray(answers)
        ? answers.slice(0, 6).map(normalizeAnswerForDisplay)
        : [];

      while (list.length > 0) {
        const last = list[list.length - 1];
        const isEmptyTail =
          !String(last.text || "").trim() &&
          Number(last.points || 0) === 0 &&
          last.revealed !== true;

        if (!isEmptyTail) break;
        list.pop();
      }

      return list;
    }

    function getControlQuestionBank() {
      const raw =
        window.FAMILY_FEUD_QUESTIONS ||
        window.familyFeudQuestions ||
        window.FAMILY_FEUD_BANK ||
        window.familyFeudBank ||
        [];

      if (!Array.isArray(raw)) return [];

      return raw
        .map(normalizeControlQuestion)
        .filter((item) => item && item.question && item.answers.length > 0);
    }

    function normalizeControlQuestion(item) {
      if (!item || typeof item !== "object") return null;

      const question = String(item.question || "").trim();

      const answers = Array.isArray(item.answers)
        ? item.answers
            .slice(0, 6)
            .map((answer) => ({
              text: String(answer?.text || "").trim(),
              points: Math.max(0, Number(answer?.points || 0))
            }))
            .filter((answer) => answer.text && answer.points > 0)
        : [];

      if (!question || !answers.length) return null;

      return {
        question,
        answers
      };
    }

    function cloneQuestionForApi(question) {
      return {
        question: String(question.question || "").trim(),
        answers: Array.isArray(question.answers)
          ? question.answers.slice(0, 6).map((answer) => ({
              text: String(answer.text || "").trim(),
              points: Math.max(0, Number(answer.points || 0))
            }))
          : []
      };
    }

    function getBankQuestionByIndex(index) {
      const bank = getControlQuestionBank();

      if (!bank.length) {
        return null;
      }

      const safeIndex = Number.isFinite(Number(index)) ? Math.floor(Number(index)) : 0;
      const normalizedIndex = ((safeIndex % bank.length) + bank.length) % bank.length;
      return bank[normalizedIndex] || bank[0] || null;
    }

    function mergeDisplayStateWithBankQuestion(state, questionIndex) {
      if (!state) {
        return state;
      }

      const bank = getControlQuestionBank();
      if (!bank.length) {
        return state;
      }

      const remoteQuestion = String(state.question || "").trim();
      const bankQuestion = bank.find((item) => item.question === remoteQuestion) || getBankQuestionByIndex(questionIndex);

      if (!bankQuestion) {
        return state;
      }

      const remoteAnswers = normalizeAnswersForDisplay(state.answers);

      return {
        ...state,
        question: String(bankQuestion.question || "").trim(),
        answers: bankQuestion.answers.slice(0, 6).map((answer, index) => ({
          text: String(answer.text || "").trim(),
          points: Math.max(0, Number(answer.points || 0)),
          revealed: !!remoteAnswers[index]?.revealed
        }))
      };
    }

    function applyLocalQuestionBundle(bundle) {
      if (!bundle || !bundle.question) return;

      displayState.question = String(bundle.question.question || "").trim();
      displayState.answers = Array.isArray(bundle.question.answers)
        ? bundle.question.answers.slice(0, 6).map((answer) => ({
            text: String(answer.text || "").trim(),
            points: Math.max(0, Number(answer.points || 0)),
            revealed: false
          }))
        : [];

      controlState.currentQuestionIndex = Number(bundle.questionIndex || 0);
      controlState.totalQuestions = Number(bundle.totalQuestions || 0);
      saveDisplayState();
      saveControlState();
    }

    function getCurrentLocalQuestionBundle() {
      const bank = getControlQuestionBank();

      if (!bank.length) {
        return {};
      }

      const currentQuestion = String(displayState?.question || "").trim();
      let currentIndex = Number(controlState.currentQuestionIndex || 0);

      if (currentQuestion) {
        const foundIndex = bank.findIndex((item) => item.question === currentQuestion);
        if (foundIndex >= 0) {
          currentIndex = foundIndex;
        }
      }

      const safeCurrent = Number.isFinite(currentIndex) ? Math.floor(currentIndex) : 0;
      const normalizedIndex = ((safeCurrent % bank.length) + bank.length) % bank.length;
      const question = cloneQuestionForApi(bank[normalizedIndex]);

      return {
        questionIndex: normalizedIndex,
        totalQuestions: bank.length,
        question
      };
    }

    function getNextLocalQuestionBundle() {
      const bank = getControlQuestionBank();

      if (!bank.length) {
        return {};
      }

      const currentIndex = Number(controlState.currentQuestionIndex || 0);
      const safeCurrent = Number.isFinite(currentIndex) ? Math.floor(currentIndex) : 0;
      const nextIndex = ((safeCurrent + 1) % bank.length + bank.length) % bank.length;
      const question = cloneQuestionForApi(bank[nextIndex]);

      return {
        questionIndex: nextIndex,
        totalQuestions: bank.length,
        question
      };
    }

    async function ensureRoomUsesLocalQuestionBank() {
      const bank = getControlQuestionBank();
      if (!bank.length) return;

      const currentQuestion = String(displayState?.question || "").trim();
      const currentAnswers = Array.isArray(displayState?.answers) ? displayState.answers : [];
      const existsInBank = bank.some((item) => item.question === currentQuestion);
      const looksEmpty = !currentQuestion || !currentAnswers.length;

      if (existsInBank && !looksEmpty) {
        return;
      }

      const firstQuestion = cloneQuestionForApi(bank[0]);

      await sendGameAction("init", {
        team1Name: String(displayState?.team1Name || readStored("familyfeud_team1") || "الفريق الأول").trim(),
        team2Name: String(displayState?.team2Name || readStored("familyfeud_team2") || "الفريق الثاني").trim(),
        questionIndex: 0,
        totalQuestions: bank.length,
        question: firstQuestion
      }, { skipBusy: true });
    }

    function getApiBases() {
      const seen = new Set();
      const bases = [];

      const rawBases = [
        window.location.origin,
        apiBase,
        readStored(API_BASE_KEY),
        readStored(BUZZ_API_BASE_KEY),
        window.location.origin.includes("workers.dev") ? window.location.origin : "",
        "https://family-feud-buzz.sandooq-m.workers.dev",
        "https://z.sandooq-m.workers.dev"
      ];

      rawBases.forEach((base) => {
        const normalized = normalizeBase(base);
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        bases.push(normalized);
      });

      return bases;
    }

    async function detectApiBase() {
      const bases = getApiBases();

      for (const base of bases) {
        try {
          const res = await fetch(`${base}/api/game/state?room=${encodeURIComponent(roomId)}`, {
            method: "GET",
            cache: "no-store",
            headers: {
              "Cache-Control": "no-cache",
              "Pragma": "no-cache"
            }
          });

          const data = await res.json().catch(() => null);
          if (!res.ok || !data || !data.ok || !data.state) continue;

          apiBase = base;
          writeStored(API_BASE_KEY, base);
          writeStored(BUZZ_API_BASE_KEY, base);
          return true;
        } catch (error) {}
      }

      return false;
    }

    async function startRemoteSync() {
      if (syncStarted) return;
      syncStarted = true;

      const ok = await detectApiBase();

      if (ok) {
        await fetchRemoteGameState({ force: true });
        await ensureRoomUsesLocalQuestionBank();
        await fetchRemoteGameState({ force: true });
        await fetchRemoteBuzzState({ force: true });
        await maybeInitialAutoShowQuestion();
        await initPusher();
        await initBuzzPusher();
      }

      startFallbackPoll();
      startBuzzFallbackPoll();
    }

    function startFallbackPoll(intervalMs = usingPusherRealtime ? PUSHER_FALLBACK_POLL_MS : FALLBACK_POLL_MS) {
      if (fallbackPoll && currentPollMs === intervalMs) return;

      if (fallbackPoll) {
        clearInterval(fallbackPoll);
        fallbackPoll = null;
      }

      currentPollMs = intervalMs;

      fallbackPoll = setInterval(() => {
        maybePollRemoteGameState();
      }, intervalMs);
    }

    function startBuzzFallbackPoll(intervalMs = usingBuzzPusherRealtime ? BUZZ_PUSHER_FALLBACK_POLL_MS : BUZZ_FALLBACK_POLL_MS) {
      if (buzzFallbackPoll && currentBuzzPollMs === intervalMs) return;

      if (buzzFallbackPoll) {
        clearInterval(buzzFallbackPoll);
        buzzFallbackPoll = null;
      }

      currentBuzzPollMs = intervalMs;

      buzzFallbackPoll = setInterval(() => {
        maybePollRemoteBuzzState();
      }, intervalMs);
    }

    function maybePollRemoteGameState() {
      if (stateFetchInFlight) return;

      const now = Date.now();

      if (usingPusherRealtime && now - lastRemoteStateAt < PUSHER_RECENT_GRACE_MS) {
        return;
      }

      fetchRemoteGameState();
    }

    function maybePollRemoteBuzzState() {
      if (buzzStateFetchInFlight) return;

      const now = Date.now();

      if (usingBuzzPusherRealtime && now - lastRemoteBuzzStateAt < PUSHER_RECENT_GRACE_MS) {
        return;
      }

      fetchRemoteBuzzState();
    }

    function destroyLiveSync() {
      if (fallbackPoll) {
        clearInterval(fallbackPoll);
        fallbackPoll = null;
      }

      if (buzzFallbackPoll) {
        clearInterval(buzzFallbackPoll);
        buzzFallbackPoll = null;
      }

      if (gameChannel && pusher) {
        try { gameChannel.unbind_all(); } catch (e) {}
        try { pusher.unsubscribe(gameChannel.name); } catch (e) {}
      }

      if (buzzChannel && buzzPusher) {
        try { buzzChannel.unbind_all(); } catch (e) {}
        try { buzzPusher.unsubscribe(buzzChannel.name); } catch (e) {}
      }

      gameChannel = null;
      buzzChannel = null;

      if (pusher) {
        try { pusher.disconnect(); } catch (e) {}
      }

      if (buzzPusher) {
        try { buzzPusher.disconnect(); } catch (e) {}
      }

      pusher = null;
      buzzPusher = null;

      syncStarted = false;
      usingPusherRealtime = false;
      usingBuzzPusherRealtime = false;
      currentPollMs = 0;
      currentBuzzPollMs = 0;
      stateFetchInFlight = null;
      buzzStateFetchInFlight = null;
    }

    async function initPusher() {
      if (!window.Pusher) return;
      if (!apiBase) return;
      if (pusher || gameChannel) return;

      try {
        const res = await fetch(`${apiBase}/api/game/pusher-config?room=${encodeURIComponent(roomId)}`, {
          method: "GET",
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache",
            "Pragma": "no-cache"
          }
        });

        const data = await res.json().catch(() => null);
        if (!res.ok || !data || !data.ok || !data.key || !data.cluster || !data.channel) return;

        const authEndpoint = String(data.authEndpoint || "").startsWith("http")
          ? data.authEndpoint
          : `${apiBase}${data.authEndpoint}`;

        window.Pusher.logToConsole = false;

        pusher = new window.Pusher(data.key, {
          cluster: data.cluster,
          channelAuthorization: {
            endpoint: authEndpoint,
            transport: "ajax"
          }
        });

        if (pusher.connection) {
          pusher.connection.bind("state_change", (states) => {
            const currentState = String(states?.current || "");

            if (currentState === "connected") {
              usingPusherRealtime = true;
              startFallbackPoll(PUSHER_FALLBACK_POLL_MS);
              return;
            }

            if (currentState === "disconnected" || currentState === "unavailable" || currentState === "failed") {
              usingPusherRealtime = false;
              startFallbackPoll(FALLBACK_POLL_MS);
            }
          });
        }

        gameChannel = pusher.subscribe(data.channel);

        gameChannel.bind("pusher:subscription_succeeded", async () => {
          usingPusherRealtime = true;
          startFallbackPoll(PUSHER_FALLBACK_POLL_MS);
          await fetchRemoteGameState({ force: true });
        });

        gameChannel.bind("game-updated", (payload) => {
          applyRemoteGameState(payload);
          renderAll();
        });
      } catch (error) {}
    }

    async function initBuzzPusher() {
      if (!window.Pusher) return;
      if (!apiBase) return;
      if (buzzPusher || buzzChannel) return;

      try {
        const res = await fetch(`${apiBase}/api/buzz/pusher-config?room=${encodeURIComponent(roomId)}`, {
          method: "GET",
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache",
            "Pragma": "no-cache"
          }
        });

        const data = await res.json().catch(() => null);
        if (!res.ok || !data || !data.ok || !data.key || !data.cluster || !data.channel) return;

        const authEndpoint = String(data.authEndpoint || "").startsWith("http")
          ? data.authEndpoint
          : `${apiBase}${data.authEndpoint}`;

        window.Pusher.logToConsole = false;

        buzzPusher = new window.Pusher(data.key, {
          cluster: data.cluster,
          channelAuthorization: {
            endpoint: authEndpoint,
            transport: "ajax"
          }
        });

        if (buzzPusher.connection) {
          buzzPusher.connection.bind("state_change", (states) => {
            const currentState = String(states?.current || "");

            if (currentState === "connected") {
              usingBuzzPusherRealtime = true;
              startBuzzFallbackPoll(BUZZ_PUSHER_FALLBACK_POLL_MS);
              return;
            }

            if (currentState === "disconnected" || currentState === "unavailable" || currentState === "failed") {
              usingBuzzPusherRealtime = false;
              startBuzzFallbackPoll(BUZZ_FALLBACK_POLL_MS);
            }
          });
        }

        buzzChannel = buzzPusher.subscribe(data.channel);

        buzzChannel.bind("pusher:subscription_succeeded", async () => {
          usingBuzzPusherRealtime = true;
          startBuzzFallbackPoll(BUZZ_PUSHER_FALLBACK_POLL_MS);
          await fetchRemoteBuzzState({ force: true });
        });

        buzzChannel.bind("buzz-updated", (payload) => {
          applyRemoteBuzzState(payload);
          renderAll();
        });
      } catch (error) {}
    }

    async function maybeInitialAutoShowQuestion() {
      if (initialAutoShowDone) return;
      initialAutoShowDone = true;
    }

    async function fetchRemoteGameState(options = {}) {
      const force = options.force === true;
      const now = Date.now();

      if (!force) {
        if (stateFetchInFlight) return stateFetchInFlight;
        if (now - lastRemoteStateAt < MIN_STATE_FETCH_GAP_MS) return true;
      }

      stateFetchInFlight = (async () => {
        const bases = getApiBases();

        for (const base of bases) {
          try {
            const res = await fetch(`${base}/api/game/state?room=${encodeURIComponent(roomId)}`, {
              method: "GET",
              cache: "no-store",
              headers: {
                "Cache-Control": "no-cache",
                "Pragma": "no-cache"
              }
            });

            if (!res.ok) continue;

            const data = await res.json().catch(() => null);
            if (!data || !data.ok || !data.state) continue;

            apiBase = base;
            writeStored(API_BASE_KEY, base);
            writeStored(BUZZ_API_BASE_KEY, base);

            applyRemoteGameState(data.state);
            renderAll();
            return true;
          } catch (error) {}
        }

        return false;
      })();

      try {
        return await stateFetchInFlight;
      } finally {
        stateFetchInFlight = null;
      }
    }

    async function fetchRemoteBuzzState(options = {}) {
      const force = options.force === true;
      const now = Date.now();

      if (!force) {
        if (buzzStateFetchInFlight) return buzzStateFetchInFlight;
        if (now - lastRemoteBuzzStateAt < MIN_STATE_FETCH_GAP_MS) return true;
      }

      buzzStateFetchInFlight = (async () => {
        const bases = getApiBases();

        for (const base of bases) {
          try {
            const res = await fetch(`${base}/api/buzz/state?room=${encodeURIComponent(roomId)}`, {
              method: "GET",
              cache: "no-store",
              headers: {
                "Cache-Control": "no-cache",
                "Pragma": "no-cache"
              }
            });

            if (!res.ok) continue;

            const data = await res.json().catch(() => null);
            if (!data || !data.ok || !data.state) continue;

            apiBase = base;
            writeStored(API_BASE_KEY, base);
            writeStored(BUZZ_API_BASE_KEY, base);

            applyRemoteBuzzState(data.state);
            renderAll();
            return true;
          } catch (error) {}
        }

        return false;
      })();

      try {
        return await buzzStateFetchInFlight;
      } finally {
        buzzStateFetchInFlight = null;
      }
    }

    async function sendGameAction(action, extra = {}, options = {}) {
      const bases = getApiBases();
      const skipBusy = options.skipBusy === true;

      if (!skipBusy) {
        isBusy = true;
        renderAll();
      }

      try {
        for (const base of bases) {
          try {
            const res = await fetch(`${base}/api/game/action?room=${encodeURIComponent(roomId)}`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Cache-Control": "no-cache",
                "Pragma": "no-cache"
              },
              body: JSON.stringify({
                action,
                ...extra
              })
            });

            if (!res.ok) continue;

            const data = await res.json().catch(() => null);
            if (!data || !data.ok || !data.state) continue;

            apiBase = base;
            writeStored(API_BASE_KEY, base);
            writeStored(BUZZ_API_BASE_KEY, base);

            applyRemoteGameState(data.state);
            renderAll();
            return true;
          } catch (error) {}
        }

        return false;
      } finally {
        if (!skipBusy) {
          isBusy = false;
          renderAll();
        }
      }
    }

    function isActionGuarded(key) {
      return Date.now() < (actionGuardUntil.get(key) || 0);
    }

    function armActionGuard(key, durationMs) {
      actionGuardUntil.set(key, Date.now() + durationMs);
    }

    async function runGuardedAction(key, task, durationMs) {
      if (isActionGuarded(key)) return false;
      armActionGuard(key, durationMs);
      return await task();
    }

    function applyRemoteBuzzState(remoteBuzzState) {
      if (!remoteBuzzState) return;

      lastRemoteBuzzStateAt = Date.now();

      const nextName = String(remoteBuzzState.firstBuzz?.name || "");
      const nextTeam = String(remoteBuzzState.firstBuzz?.team || "");
      const nextVisible = typeof remoteBuzzState.enabled === "boolean"
        ? !!remoteBuzzState.enabled
        : !!controlState.buzzVisible;

      const changed =
        controlState.firstBuzzName !== nextName ||
        controlState.firstBuzzTeam !== nextTeam ||
        controlState.buzzVisible !== nextVisible;

      controlState.firstBuzzName = nextName;
      controlState.firstBuzzTeam = nextTeam;
      controlState.buzzVisible = nextVisible;

      if (changed) {
        saveControlState();
      }
    }

    function applyRemoteGameState(remoteState) {
      if (!remoteState) return;

      lastRemoteStateAt = Date.now();

      const previousQuestion = displayState ? String(displayState.question || "") : "";
      const previousQuestionIndex = controlState ? Number(controlState.currentQuestionIndex || 0) : 0;
      const previousAnswers = normalizeAnswersForDisplay(displayState?.answers);

      const display = remoteState.display || {};
      const control = remoteState.control || {};
      const buzz = remoteState.buzz || {};

      displayState = {
        showQuestion: !!display.showQuestion,
        question: String(display.question || ""),
        team1Name: String(display.team1Name || readStored("familyfeud_team1") || "الفريق الأول"),
        team2Name: String(display.team2Name || readStored("familyfeud_team2") || "الفريق الثاني"),
        team1Score: Number(display.team1Score || 0),
        team2Score: Number(display.team2Score || 0),
        team1Strikes: Number(display.team1Strikes || 0),
        team2Strikes: Number(display.team2Strikes || 0),
        roundPoints: Number(display.roundPoints || 0),
        answers: normalizeAnswersForDisplay(display.answers)
      };

      controlState = {
        currentQuestionIndex: Number(control.currentQuestionIndex || 0),
        totalQuestions: Number(control.totalQuestions || 0),
        stage: String(control.phase || "idle"),
        currentTurnTeam: String(control.currentTurnTeam || ""),
        confrontationWinner: String(control.confrontationWinner || ""),
        stealingTeam: String(control.stealingTeam || ""),
        firstBuzzName: String(buzz.firstBuzz?.name || ""),
        firstBuzzTeam: String(buzz.firstBuzz?.team || ""),
        buzzVisible: !!buzz.enabled
      };

      const shouldKeepCurrentQuestion =
        hasAcceptedInitialRemoteQuestion &&
        !nextQuestionInFlight &&
        !!previousQuestion &&
        controlState.currentQuestionIndex !== previousQuestionIndex &&
        (controlState.stage === "steal_result" || controlState.stage === "steal_pick");

      if (shouldKeepCurrentQuestion) {
        displayState = {
          ...displayState,
          question: previousQuestion,
          answers: previousAnswers.map((answer) => ({
            text: String(answer.text || "").trim(),
            points: Math.max(0, Number(answer.points || 0)),
            revealed: !!answer.revealed
          }))
        };
        controlState.currentQuestionIndex = previousQuestionIndex;
      } else {
        displayState = mergeDisplayStateWithBankQuestion(displayState, controlState.currentQuestionIndex);
      }

      hasAcceptedInitialRemoteQuestion = true;

      const questionChanged =
        previousQuestion !== displayState.question ||
        previousQuestionIndex !== controlState.currentQuestionIndex;

      if (questionChanged) {
        clearRoundClosedAfterSteal();
      } else {
        refreshRoundClosedAfterSteal();

        if (isRoundClosedAfterSteal()) {
          displayState.roundPoints = 0;
        }
      }

      cleanupOptimisticReveals(questionChanged);

      saveDisplayState();
      saveControlState();
    }

    function cleanupOptimisticReveals(questionChanged) {
      if (questionChanged) {
        optimisticRevealedIndexes.clear();
        answerActionInFlight.clear();
        return;
      }

      const answers = Array.isArray(displayState.answers) ? displayState.answers : [];

      Array.from(optimisticRevealedIndexes).forEach((index) => {
        if (!answers[index] || answers[index].revealed) {
          optimisticRevealedIndexes.delete(index);
        }
      });

      Array.from(answerActionInFlight).forEach((index) => {
        if (!answers[index] || answers[index].revealed) {
          answerActionInFlight.delete(index);
        }
      });
    }

    function ensureInitialState() {
      if (!displayState || !Array.isArray(displayState.answers)) {
        const currentBundle = getCurrentLocalQuestionBundle();

        displayState = {
          showQuestion: false,
          question: currentBundle.question ? String(currentBundle.question.question || "") : "",
          team1Name: readStored("familyfeud_team1") || "الفريق الأول",
          team2Name: readStored("familyfeud_team2") || "الفريق الثاني",
          team1Score: 0,
          team2Score: 0,
          team1Strikes: 0,
          team2Strikes: 0,
          roundPoints: 0,
          answers: currentBundle.question
            ? normalizeAnswersForDisplay(currentBundle.question.answers)
            : []
        };

        if (currentBundle.question) {
          controlState = controlState || getDefaultControlState();
          controlState.currentQuestionIndex = currentBundle.questionIndex;
          controlState.totalQuestions = currentBundle.totalQuestions;
        }

        saveDisplayState();
      } else {
        displayState.answers = normalizeAnswersForDisplay(displayState.answers);
        saveDisplayState();
      }

      if (!controlState) {
        controlState = getDefaultControlState();
        saveControlState();
      }
    }

    function getDefaultControlState() {
      return {
        currentQuestionIndex: 0,
        totalQuestions: getControlQuestionBank().length || 0,
        stage: "idle",
        currentTurnTeam: "",
        confrontationWinner: "",
        stealingTeam: "",
        firstBuzzName: "",
        firstBuzzTeam: "",
        buzzVisible: true
      };
    }

    function getRoundSignature() {
      const question = displayState ? String(displayState.question || "") : "";
      const index = controlState ? Number(controlState.currentQuestionIndex || 0) : 0;
      return `${roomId}::${index}::${question}`;
    }

    function readRoundClosedAfterSteal() {
      const parsed = safeParse(readStored(ROUND_CLOSED_KEY));
      if (!parsed || parsed.closed !== true) return false;
      return parsed.signature === getRoundSignature();
    }

    function markRoundClosedAfterSteal() {
      roundClosedAfterSteal = true;
      displayState.roundPoints = 0;
      saveDisplayState();

      writeStored(ROUND_CLOSED_KEY, {
        closed: true,
        signature: getRoundSignature()
      });
    }

    function clearRoundClosedAfterSteal() {
      roundClosedAfterSteal = false;
      try { localStorage.removeItem(ROUND_CLOSED_KEY); } catch (e) {}
      try { sessionStorage.removeItem(ROUND_CLOSED_KEY); } catch (e) {}

      if (channel) {
        try { channel.postMessage({ key: ROUND_CLOSED_KEY }); } catch (e) {}
      }
    }

    function refreshRoundClosedAfterSteal() {
      roundClosedAfterSteal = readRoundClosedAfterSteal();
    }

    function isRoundClosedAfterSteal() {
      return roundClosedAfterSteal === true && readRoundClosedAfterSteal() === true;
    }

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function writeStored(key, value) {
      const stringValue = typeof value === "string" ? value : JSON.stringify(value);

      let changed = false;

      try {
        if (localStorage.getItem(key) !== stringValue) {
          localStorage.setItem(key, stringValue);
          changed = true;
        }
      } catch (e) {}

      try {
        if (sessionStorage.getItem(key) !== stringValue) {
          sessionStorage.setItem(key, stringValue);
          changed = true;
        }
      } catch (e) {}

      if (changed && channel) {
        try { channel.postMessage({ key }); } catch (e) {}
      }
    }

    function safeParse(value) {
      try {
        return JSON.parse(value);
      } catch (e) {
        return null;
      }
    }

    function normalizeBase(base) {
      return String(base || "").trim().replace(/\/+$/, "");
    }

    function normalizeRoom(value) {
      const v = String(value || "").trim().toLowerCase();
      if (!v) return "";
      return v.replace(/[^a-z0-9_-]/g, "").slice(0, 64);
    }

    function readDisplayState() {
      const raw = readStored(DISPLAY_KEY);
      const parsed = safeParse(raw);

      if (!parsed) return null;

      if (Array.isArray(parsed.answers)) {
        parsed.answers = normalizeAnswersForDisplay(parsed.answers);
      }

      return parsed;
    }

    function readControlState() {
      const raw = readStored(CONTROL_KEY);
      const parsed = safeParse(raw);
      return parsed || getDefaultControlState();
    }

    function saveDisplayState() {
      displayState.roundPoints = Number(displayState.roundPoints || 0);
      displayState.answers = normalizeAnswersForDisplay(displayState.answers);
      writeStored(DISPLAY_KEY, displayState);
    }

    function saveControlState() {
      writeStored(CONTROL_KEY, controlState);
    }

    function calculateRoundPoints() {
      if (isRoundClosedAfterSteal()) return 0;

      return (displayState.answers || []).reduce((sum, answer) => {
        return sum + (answer.revealed ? Number(answer.points || 0) : 0);
      }, 0);
    }

    function getTeamName(team) {
      if (team === "team1") return displayState.team1Name || "الفريق الأول";
      if (team === "team2") return displayState.team2Name || "الفريق الثاني";
      return "";
    }

    function getOtherTeam(team) {
      return team === "team1" ? "team2" : "team1";
    }

    function isStealStage() {
      return controlState.stage === "steal_result" || controlState.stage === "steal_pick";
    }

    function canRegisterError() {
      if (isRoundClosedAfterSteal()) return false;
      if (!controlState.currentTurnTeam) return false;
      if (controlState.stage === "steal_result") return false;
      if (controlState.stage === "steal_pick") return false;
      return true;
    }

    function getFirstBuzzLabel() {
      if (!controlState.firstBuzzName) {
        return "اسم اللاعب الذي يضغط أولًا";
      }

      const teamName = getTeamName(controlState.firstBuzzTeam);
      if (teamName) {
        return `${controlState.firstBuzzName} - ${teamName}`;
      }

      return controlState.firstBuzzName;
    }

    function renderAll(force = false) {
      const signature = JSON.stringify({
        displayState,
        controlState,
        roundClosedAfterSteal,
        isBusy,
        stealAwardInProgress,
        toggleActionInFlight,
        errorActionInFlight,
        nextQuestionInFlight,
        panelActionInFlight,
        answerActionInFlight: Array.from(answerActionInFlight),
        optimisticRevealedIndexes: Array.from(optimisticRevealedIndexes)
      });

      if (!force && signature === lastRenderSignature) return;
      lastRenderSignature = signature;

      const questionNumber = Number(controlState.currentQuestionIndex || 0) + 1;
      questionNumberEl.textContent = `سؤال ${questionNumber}`;

      questionTextEl.textContent = displayState.question || "نص السؤال";
      firstPlayerBoxEl.textContent = getFirstBuzzLabel();
      firstPlayerBoxEl.classList.toggle("active", !!controlState.firstBuzzName);

      bellToggleBtn.textContent = controlState.buzzVisible ? "إخفاء الجرس" : "إظهار الجرس";
      questionToggleBtn.textContent = displayState.showQuestion ? "إخفاء السؤال" : "إظهار السؤال";

      bellToggleBtn.disabled = toggleActionInFlight || stealAwardInProgress;
      questionToggleBtn.disabled = toggleActionInFlight || stealAwardInProgress;
      errorBtn.disabled = errorActionInFlight || stealAwardInProgress || !canRegisterError();
      nextQuestionBtn.disabled = nextQuestionInFlight || stealAwardInProgress;

      renderAnswers();
      renderPanel();
    }

    function renderAnswers() {
      const positions = [
        { row: 1, col: 2 },
        { row: 1, col: 1 },
        { row: 2, col: 2 },
        { row: 2, col: 1 },
        { row: 3, col: 2 },
        { row: 3, col: 1 }
      ];

      answersGridEl.innerHTML = "";

      const answers = normalizeAnswersForDisplay(displayState.answers);

      answers.forEach((answer, index) => {
        const position = positions[index];
        if (!position) return;

        const card = document.createElement("button");
        const isBlockedRevealedAnswer = isStealStage() && !isRoundClosedAfterSteal() && !!answer.revealed;
        const isVisuallyRevealed = !!answer.revealed || optimisticRevealedIndexes.has(index);

        const shouldDisable =
          stealAwardInProgress ||
          isBlockedRevealedAnswer ||
          answerActionInFlight.has(index);

        card.type = "button";
        card.className = "answer-card" + (isVisuallyRevealed ? " revealed" : "");
        if (shouldDisable) card.classList.add("disabled");
        card.disabled = shouldDisable;

        card.style.gridRow = position.row;
        card.style.gridColumn = position.col;

        card.innerHTML = `
          <div class="answer-points">${answer.points}</div>
          <div class="answer-label">${answer.text}</div>
        `;

        card.addEventListener("click", async () => {
          await handleAnswerClick(index);
        });

        answersGridEl.appendChild(card);
      });
    }

    function renderPanel() {
      panelActionsEl.innerHTML = "";

      if (isRoundClosedAfterSteal()) {
        panelTitleEl.textContent = ".";
        panelTitleEl.classList.add("hint-hidden");
        return;
      }

      if (controlState.stage === "idle" || controlState.stage === "main") {
        panelTitleEl.textContent = ".";
        panelTitleEl.classList.add("hint-hidden");
        return;
      }

      panelTitleEl.classList.remove("hint-hidden");

      if (controlState.stage === "duel_select") {
        panelTitleEl.textContent = "مين جاوب؟";

        const row = buildRow([
          buildBlueButton(getTeamName("team1"), async () => {
            await sendGameAction("set_duel_winner", { team: "team1" }, { skipBusy: true });
          }),
          buildBlueButton(getTeamName("team2"), async () => {
            await sendGameAction("set_duel_winner", { team: "team2" }, { skipBusy: true });
          })
        ]);

        const cancelRow = buildRow([
          buildRedButton("إلغاء", async () => {
            await cancelDuelAndOpenBuzzAgain();
          })
        ]);

        panelActionsEl.appendChild(row);
        panelActionsEl.appendChild(cancelRow);
        return;
      }

      if (controlState.stage === "play_or_pass") {
        const winnerName = getTeamName(controlState.confrontationWinner);
        panelTitleEl.textContent = `الفريق ${winnerName} فاز بالسؤال ماذا تريد؟`;

        const row = buildRow([
          buildBlueButton("نلعب", async () => {
            await choosePlayOrPass("play");
          }),
          buildBlueButton("نمرر للفريق الآخر", async () => {
            await choosePlayOrPass("pass");
          })
        ]);

        const cancelRow = buildRow([
          buildRedButton("إلغاء", async () => {
            await sendGameAction("cancel_context", {}, { skipBusy: true });
          })
        ]);

        panelActionsEl.appendChild(row);
        panelActionsEl.appendChild(cancelRow);
        return;
      }

      if (isStealStage()) {
        panelTitleEl.textContent = "اضغط على الجواب لمنح الفريق الاخر النقاط";

        const failRow = buildRow([
          buildFailStealButton()
        ]);
        failRow.classList.add("single-fail");

        panelActionsEl.appendChild(failRow);
        return;
      }

      panelTitleEl.textContent = ".";
      panelTitleEl.classList.add("hint-hidden");
    }

    function buildRow(buttons) {
      const row = document.createElement("div");
      row.className = "panel-row";
      buttons.forEach(btn => row.appendChild(btn));
      return row;
    }

    function buildBlueButton(text, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "panel-btn";
      btn.textContent = text;
      btn.disabled = panelActionInFlight || stealAwardInProgress;

      btn.addEventListener("click", async () => {
        if (panelActionInFlight || stealAwardInProgress) return;

        panelActionInFlight = true;
        renderAll();

        try {
          await runGuardedAction(`panel-blue-${text}`, onClick, NORMAL_ACTION_GUARD_MS);
        } finally {
          panelActionInFlight = false;
          renderAll();
        }
      });

      return btn;
    }

    function buildRedButton(text, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "panel-btn red";
      btn.textContent = text;
      btn.disabled = panelActionInFlight || stealAwardInProgress;

      btn.addEventListener("click", async () => {
        if (panelActionInFlight || stealAwardInProgress) return;

        panelActionInFlight = true;
        renderAll();

        try {
          await runGuardedAction(`panel-red-${text}`, onClick, NORMAL_ACTION_GUARD_MS);
        } finally {
          panelActionInFlight = false;
          renderAll();
        }
      });

      return btn;
    }

    function buildFailStealButton() {
      const btn = buildRedButton("فشلت السرقة", async () => {
        await handleFailStealClick();
      });
      btn.classList.add("fail-only");
      return btn;
    }

    async function handleFailStealClick() {
      if (stealAwardInProgress) return;

      stealAwardInProgress = true;
      renderAll();

      try {
        const ok = await sendGameAction("steal_result", { result: "fail" }, { skipBusy: true });

        if (ok) {
          markRoundClosedAfterSteal();
        }
      } finally {
        stealAwardInProgress = false;
        renderAll();
      }
    }

    async function handleAnswerClick(index) {
      if (stealAwardInProgress) return;

      const answer = Array.isArray(displayState.answers)
        ? displayState.answers[index]
        : null;

      if (!answer) return;

      const teamBeforeReveal = String(controlState.currentTurnTeam || "");

      const guardKey = isStealStage() ? `steal-answer-${index}` : `answer-${index}`;
      if (isActionGuarded(guardKey)) return;
      armActionGuard(guardKey, isStealStage() ? NORMAL_ACTION_GUARD_MS : FAST_ACTION_GUARD_MS);

      if (isRoundClosedAfterSteal()) {
        if (answer.revealed) return;
        if (answerActionInFlight.has(index)) return;

        optimisticRevealedIndexes.add(index);
        answerActionInFlight.add(index);
        renderAll();

        try {
          const ok = await sendGameAction("reveal_answer", { answerIndex: index }, { skipBusy: true });

          if (!ok) {
            optimisticRevealedIndexes.delete(index);
            renderAll();
          }
        } finally {
          answerActionInFlight.delete(index);
          renderAll();
        }

        return;
      }

      if (isStealStage()) {
        if (answer.revealed) return;

        optimisticRevealedIndexes.add(index);
        stealAwardInProgress = true;
        renderAll();

        try {
          let awarded = false;

          if (controlState.stage === "steal_result") {
            awarded = await sendGameAction("award_steal", { answerIndex: index }, { skipBusy: true });

            if (!awarded) {
              const movedToPick = await sendGameAction("steal_result", { result: "success" }, { skipBusy: true });
              if (!movedToPick) {
                optimisticRevealedIndexes.delete(index);
                renderAll();
                return;
              }

              awarded = await sendGameAction("award_steal", { answerIndex: index }, { skipBusy: true });
            }
          } else {
            awarded = await sendGameAction("award_steal", { answerIndex: index }, { skipBusy: true });
          }

          if (awarded) {
            markRoundClosedAfterSteal();
          } else {
            optimisticRevealedIndexes.delete(index);
            renderAll();
          }
        } finally {
          stealAwardInProgress = false;
          renderAll();
        }

        return;
      }

      if (answerActionInFlight.has(index)) return;

      optimisticRevealedIndexes.add(index);
      answerActionInFlight.add(index);
      renderAll();

      try {
        const ok = await sendGameAction("reveal_answer", { answerIndex: index }, { skipBusy: true });

        if (ok) {
          await maybeAwardCompletedRound(teamBeforeReveal);
        } else {
          optimisticRevealedIndexes.delete(index);
          renderAll();
        }
      } finally {
        answerActionInFlight.delete(index);
        renderAll();
      }
    }

    function areAllRoundAnswersRevealed() {
      const answers = normalizeAnswersForDisplay(displayState.answers);
      if (!answers.length) return false;
      return answers.every((answer) => !!answer.revealed);
    }

    function getTeamStrikeCount(team) {
      if (team === "team1") return Number(displayState.team1Strikes || 0);
      if (team === "team2") return Number(displayState.team2Strikes || 0);
      return 0;
    }

    function shouldAwardCompletedRound(team) {
      if (!team) return false;
      if (isRoundClosedAfterSteal()) return false;
      if (isStealStage()) return false;
      if (controlState.stage !== "main") return false;
      if (controlState.currentTurnTeam !== team) return false;
      if (getTeamStrikeCount(team) >= 3) return false;
      if (!areAllRoundAnswersRevealed()) return false;
      return true;
    }

    async function maybeAwardCompletedRound(team) {
      if (!shouldAwardCompletedRound(team)) return false;

      const ok = await sendGameAction("award_round", { team }, { skipBusy: true });

      if (ok) {
        renderAll();
      }

      return ok;
    }

    async function choosePlayOrPass(decision) {
      const previousVisible = !!controlState.buzzVisible;

      controlState.buzzVisible = false;
      renderAll();

      const ok = await sendGameAction("choose_play_or_pass_bundle", { decision }, { skipBusy: true });

      if (!ok) {
        controlState.buzzVisible = previousVisible;
        renderAll();
        await fetchRemoteGameState({ force: true });
        await fetchRemoteBuzzState({ force: true });
      }
    }

    async function cancelDuelAndOpenBuzzAgain() {
      const previousVisible = !!controlState.buzzVisible;

      controlState.buzzVisible = true;
      controlState.firstBuzzName = "";
      controlState.firstBuzzTeam = "";
      renderAll();

      const ok = await sendGameAction("cancel_duel_open_buzz", {}, { skipBusy: true });

      if (!ok) {
        controlState.buzzVisible = previousVisible;
        renderAll();
        await fetchRemoteGameState({ force: true });
        await fetchRemoteBuzzState({ force: true });
      }
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function setAppHeight() {
      stableViewport = getCurrentViewport();
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport() {
      stableViewport = getCurrentViewport();

      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / DESIGN_WIDTH,
        usableHeight / DESIGN_HEIGHT
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout() {
      setAppHeight();

      requestAnimationFrame(() => {
        fitGameToViewport();
        nudgeSafariBar();
      });
    }
  </script>
</body>
</html>
