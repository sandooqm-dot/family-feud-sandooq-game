<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Control</title>

  <style>
    :root{
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --bg:#0b1457;
      --gold:#d3a91f;
      --gold-soft:#f1cb4a;
      --white:#f6f2e8;

      --answer-a:#2633DB;
      --answer-b:#217DFF;

      --panel-dark:#2b2c30;
      --panel-blue:#314fb3;
      --panel-red:#cf0617;

      --button-blue:#314fb3;
      --button-blue-2:#2845a8;
      --button-red:#d10618;
      --button-red-2:#b90514;

      --stroke:#ece8e0;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html{
      min-height:100%;
      background:var(--bg);
    }

    body{
      min-height:100%;
      background:var(--bg);
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
      color:var(--white);
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:var(--bg);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .question-number{
      position:absolute;
      top:18px;
      right:36px;
      color:var(--white);
      font-size:44px;
      font-weight:900;
      line-height:1;
      z-index:5;
      white-space:nowrap;
    }

    .question-box{
      position:absolute;
      top:20px;
      left:78px;
      width:1340px;
      height:86px;
      border-radius:34px;
      border:6px solid var(--gold);
      background:#0e1f6c;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .question-text{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 40px;
      color:var(--white);
      font-size:46px;
      font-weight:900;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .answers-panel{
      position:absolute;
      top:144px;
      left:78px;
      width:854px;
      height:372px;
      border-radius:34px;
      border:7px solid var(--gold-soft);
      background:#132977;
      padding:24px 16px;
    }

    .answers-grid{
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3, 1fr);
      gap:18px 18px;
      direction:ltr;
    }

    .answer-card{
      position:relative;
      border-radius:32px;
      border:4px solid var(--stroke);
      background:linear-gradient(180deg, var(--answer-b) 0%, var(--answer-a) 100%);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 74px 0 72px;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
      box-shadow:0 6px 12px rgba(0,0,0,.12);
    }

    .answer-card:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .answer-card:active{
      transform:scale(.99);
    }

    .answer-card.revealed{
      box-shadow:
        0 0 0 3px rgba(241,203,74,.45),
        0 6px 14px rgba(0,0,0,.15);
    }

    .answer-points{
      position:absolute;
      left:18px;
      top:50%;
      transform:translateY(-50%);
      width:52px;
      height:52px;
      border-radius:50%;
      border:4px solid #121212;
      background:#f4c83c;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .answer-label{
      width:100%;
      text-align:center;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      line-height:1.12;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding:2px 8px 0;
    }

    .right-panel{
      position:absolute;
      top:144px;
      right:78px;
      width:500px;
      height:372px;
      border-radius:34px;
      border:7px solid var(--gold-soft);
      background:var(--panel-dark);
      padding:22px 18px 18px;
    }

    .panel-title{
      min-height:54px;
      text-align:center;
      color:var(--white);
      font-size:28px;
      font-weight:900;
      line-height:1.3;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      white-space:normal;
    }

    .panel-actions{
      min-height:166px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .panel-row{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      margin-bottom:16px;
    }

    .panel-btn{
      min-width:184px;
      height:62px;
      border:none;
      border-radius:26px;
      background:var(--panel-blue);
      color:var(--white);
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      border:2px solid rgba(255,255,255,.82);
      transition:transform .12s ease, filter .12s ease;
      padding:0 14px;
      white-space:nowrap;
    }

    .panel-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .panel-btn:active{
      transform:scale(.99);
    }

    .panel-btn.red{
      min-width:190px;
      background:linear-gradient(180deg, var(--button-red) 0%, var(--button-red-2) 100%);
    }

    .player-box{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      height:68px;
      border-radius:28px;
      border:4px solid rgba(255,255,255,.92);
      background:transparent;
      color:var(--white);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:24px;
      font-weight:900;
      line-height:1.2;
      padding:0 18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .bottom-actions{
      position:absolute;
      left:0;
      right:0;
      bottom:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:42px;
    }

    .main-btn{
      width:280px;
      height:84px;
      border:none;
      border-radius:32px;
      color:var(--white);
      font-size:26px;
      font-weight:900;
      cursor:pointer;
      border:4px solid rgba(255,255,255,.88);
      transition:transform .12s ease, filter .12s ease;
    }

    .main-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .main-btn:active{
      transform:scale(.99);
    }

    .main-btn.blue{
      background:linear-gradient(180deg, var(--button-blue) 0%, var(--button-blue-2) 100%);
    }

    .main-btn.red{
      background:linear-gradient(180deg, var(--button-red) 0%, var(--button-red-2) 100%);
      font-size:34px;
    }

    .home-btn{
      position:absolute;
      left:16px;
      bottom:44px;
      width:64px;
      height:64px;
      border:none;
      border-radius:50%;
      background:#d3a91f;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 14px rgba(0,0,0,.18);
      text-decoration:none;
    }

    .home-btn svg{
      width:38px;
      height:38px;
      display:block;
      fill:#fff;
    }

    .hint-hidden{
      visibility:hidden;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <div id="questionNumber" class="question-number">سؤال 1</div>

        <div class="question-box">
          <div id="questionText" class="question-text">نص السؤال</div>
        </div>

        <section class="answers-panel">
          <div id="answersGrid" class="answers-grid"></div>
        </section>

        <section class="right-panel">
          <div id="panelTitle" class="panel-title hint-hidden">.</div>

          <div id="panelActions" class="panel-actions"></div>

          <div id="firstPlayerBox" class="player-box">اسم اللاعب الذي يضغط أولًا</div>
        </section>

        <div class="bottom-actions">
          <button id="bellToggleBtn" class="main-btn blue" type="button">إخفاء الجرس</button>
          <button id="errorBtn" class="main-btn red" type="button">خطأ</button>
          <button id="nextQuestionBtn" class="main-btn blue" type="button">تغيير السؤال</button>
        </div>

        <a class="home-btn" href="index.html" aria-label="الصفحة الرئيسية">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.2 2.5 11.1l1.3 1.6L5 11.8V20h5.7v-5.1h2.6V20H19v-8.2l1.2.9 1.3-1.6L12 3.2z"/>
          </svg>
        </a>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const DESIGN_WIDTH = 1600;
    const DESIGN_HEIGHT = 768;

    const DISPLAY_KEY = "familyfeud_display_state_v1";
    const CONTROL_KEY = "familyfeud_control_state_v1";
    const DISPLAY_CHANNEL = "familyfeud_display_channel_v1";

    const DEFAULT_ROOM = "family-feud-demo";
    const POSSIBLE_API_BASES = [
      readStored("familyfeud_buzz_api_base"),
      "https://family-feud-buzz.sandooq-m.workers.dev",
      "https://z.sandooq-m.workers.dev"
    ].filter(Boolean);

    const QUESTIONS = [
      {
        question: "اذكر شيئًا يستخدمه الناس يوميًا",
        answers: [
          { text: "الجوال", points: 32 },
          { text: "المفاتيح", points: 18 },
          { text: "الماء", points: 14 },
          { text: "السيارة", points: 10 },
          { text: "المحفظة", points: 8 },
          { text: "النظارة", points: 6 }
        ]
      },
      {
        question: "اذكر شيئًا تجده في شنطة أي امرأة؟",
        answers: [
          { text: "روج / مكياج", points: 40 },
          { text: "عطر", points: 25 },
          { text: "محفظة فلوس", points: 15 },
          { text: "مناديل", points: 10 },
          { text: "مفاتيح", points: 10 },
          { text: "جوال", points: 8 }
        ]
      },
      {
        question: "اذكر شيئًا يوجد في المطبخ",
        answers: [
          { text: "الثلاجة", points: 28 },
          { text: "الفرن", points: 20 },
          { text: "الصحون", points: 16 },
          { text: "الملاعق", points: 12 },
          { text: "الكاسات", points: 9 },
          { text: "القدر", points: 7 }
        ]
      },
      {
        question: "اذكر شيئًا يحمله الطالب معه",
        answers: [
          { text: "الحقيبة", points: 30 },
          { text: "القلم", points: 18 },
          { text: "الدفتر", points: 16 },
          { text: "الكتب", points: 14 },
          { text: "المقلمة", points: 8 },
          { text: "الآيباد", points: 6 }
        ]
      },
      {
        question: "اذكر شيئًا يستخدم في السفر",
        answers: [
          { text: "جواز السفر", points: 34 },
          { text: "الشنطة", points: 22 },
          { text: "التذكرة", points: 16 },
          { text: "الملابس", points: 12 },
          { text: "الفلوس", points: 9 },
          { text: "الجوال", points: 7 }
        ]
      }
    ];

    const root = document.documentElement;

    const questionNumberEl = document.getElementById("questionNumber");
    const questionTextEl = document.getElementById("questionText");
    const answersGridEl = document.getElementById("answersGrid");
    const panelTitleEl = document.getElementById("panelTitle");
    const panelActionsEl = document.getElementById("panelActions");
    const firstPlayerBoxEl = document.getElementById("firstPlayerBox");
    const bellToggleBtn = document.getElementById("bellToggleBtn");
    const errorBtn = document.getElementById("errorBtn");
    const nextQuestionBtn = document.getElementById("nextQuestionBtn");

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let displayState = readDisplayState();
    let controlState = readControlState();
    let channel = null;

    try {
      channel = new BroadcastChannel(DISPLAY_CHANNEL);
    } catch (e) {
      channel = null;
    }

    ensureInitialState();
    renderAll();
    updateLayout();
    startBuzzPolling();

    if (channel) {
      channel.onmessage = () => {
        displayState = readDisplayState();
        controlState = readControlState();
        renderAll();
      };
    }

    window.addEventListener("storage", () => {
      displayState = readDisplayState();
      controlState = readControlState();
      renderAll();
    });

    window.addEventListener("focus", () => {
      displayState = readDisplayState();
      controlState = readControlState();
      renderAll();
    });

    window.addEventListener("load", () => {
      setTimeout(updateLayout, 60);
      setTimeout(updateLayout, 220);
      renderAll();
    }, { passive: true });

    window.addEventListener("resize", updateLayout, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
      setTimeout(updateLayout, 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });

    bellToggleBtn.addEventListener("click", async () => {
      const nextVisible = !controlState.buzzVisible;
      controlState.buzzVisible = nextVisible;
      if (!nextVisible) {
        controlState.firstBuzzName = "";
        controlState.firstBuzzTeam = "";
      }
      saveControlState();
      renderAll();
      await setRemoteBuzzEnabled(nextVisible);
      await refreshBuzzState();
    });

    errorBtn.addEventListener("click", async () => {
      if (!controlState.currentTurnTeam) return;

      if (controlState.currentTurnTeam === "team1") {
        displayState.team1Strikes = Math.min(3, Number(displayState.team1Strikes || 0) + 1);
        if (displayState.team1Strikes >= 3) {
          controlState.stealingTeam = "team2";
          controlState.stage = "steal_result";
          controlState.buzzVisible = false;
          saveControlState();
          saveDisplayState();
          renderAll();
          await setRemoteBuzzEnabled(false);
          return;
        }
      } else {
        displayState.team2Strikes = Math.min(3, Number(displayState.team2Strikes || 0) + 1);
        if (displayState.team2Strikes >= 3) {
          controlState.stealingTeam = "team1";
          controlState.stage = "steal_result";
          controlState.buzzVisible = false;
          saveControlState();
          saveDisplayState();
          renderAll();
          await setRemoteBuzzEnabled(false);
          return;
        }
      }

      saveDisplayState();
      renderAll();
    });

    nextQuestionBtn.addEventListener("click", async () => {
      controlState.currentQuestionIndex = (controlState.currentQuestionIndex + 1) % QUESTIONS.length;
      controlState.stage = "idle";
      controlState.currentTurnTeam = "";
      controlState.confrontationWinner = "";
      controlState.stealingTeam = "";
      controlState.firstBuzzName = "";
      controlState.firstBuzzTeam = "";
      controlState.buzzVisible = true;

      const team1Name = displayState.team1Name || readStored("familyfeud_team1") || "الفريق الأول";
      const team2Name = displayState.team2Name || readStored("familyfeud_team2") || "الفريق الثاني";
      const team1Score = Number(displayState.team1Score || 0);
      const team2Score = Number(displayState.team2Score || 0);

      const q = QUESTIONS[controlState.currentQuestionIndex];

      displayState = {
        showQuestion: true,
        question: q.question,
        team1Name,
        team2Name,
        team1Score,
        team2Score,
        team1Strikes: 0,
        team2Strikes: 0,
        roundPoints: 0,
        answers: q.answers.map(a => ({
          text: a.text,
          points: a.points,
          revealed: false
        }))
      };

      saveControlState();
      saveDisplayState();
      renderAll();
      await setRemoteBuzzEnabled(true);
      await refreshBuzzState();
    });

    function ensureInitialState() {
      const q = QUESTIONS[controlState.currentQuestionIndex] || QUESTIONS[0];

      if (!displayState || !Array.isArray(displayState.answers) || displayState.answers.length !== 6) {
        displayState = {
          showQuestion: true,
          question: q.question,
          team1Name: readStored("familyfeud_team1") || "الفريق الأول",
          team2Name: readStored("familyfeud_team2") || "الفريق الثاني",
          team1Score: 0,
          team2Score: 0,
          team1Strikes: 0,
          team2Strikes: 0,
          roundPoints: 0,
          answers: q.answers.map(a => ({
            text: a.text,
            points: a.points,
            revealed: false
          }))
        };
        saveDisplayState();
      }

      if (!controlState) {
        controlState = getDefaultControlState();
        saveControlState();
      }
    }

    function getDefaultControlState() {
      return {
        currentQuestionIndex: 0,
        stage: "idle",
        currentTurnTeam: "",
        confrontationWinner: "",
        stealingTeam: "",
        firstBuzzName: "",
        firstBuzzTeam: "",
        buzzVisible: true
      };
    }

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function writeStored(key, value) {
      const stringValue = typeof value === "string" ? value : JSON.stringify(value);
      try { localStorage.setItem(key, stringValue); } catch (e) {}
      try { sessionStorage.setItem(key, stringValue); } catch (e) {}
      if (channel) {
        try { channel.postMessage({ key }); } catch (e) {}
      }
    }

    function safeParse(value) {
      try {
        return JSON.parse(value);
      } catch (e) {
        return null;
      }
    }

    function readDisplayState() {
      const raw = readStored(DISPLAY_KEY);
      const parsed = safeParse(raw);
      return parsed || null;
    }

    function readControlState() {
      const raw = readStored(CONTROL_KEY);
      const parsed = safeParse(raw);
      return parsed || getDefaultControlState();
    }

    function saveDisplayState() {
      displayState.roundPoints = calculateRoundPoints();
      writeStored(DISPLAY_KEY, displayState);
    }

    function saveControlState() {
      writeStored(CONTROL_KEY, controlState);
    }

    function calculateRoundPoints() {
      return (displayState.answers || []).reduce((sum, answer) => {
        return sum + (answer.revealed ? Number(answer.points || 0) : 0);
      }, 0);
    }

    function getOtherTeam(team) {
      return team === "team1" ? "team2" : "team1";
    }

    function getTeamName(team) {
      if (team === "team1") return displayState.team1Name || "الفريق الأول";
      if (team === "team2") return displayState.team2Name || "الفريق الثاني";
      return "";
    }

    function renderAll() {
      questionNumberEl.textContent = `سؤال ${controlState.currentQuestionIndex + 1}`;
      questionTextEl.textContent = displayState.question || "نص السؤال";
      firstPlayerBoxEl.textContent = controlState.firstBuzzName || "اسم اللاعب الذي يضغط أولًا";
      bellToggleBtn.textContent = controlState.buzzVisible ? "إخفاء الجرس" : "إظهار الجرس";
      renderAnswers();
      renderPanel();
    }

    function renderAnswers() {
      const positions = [
        { row: 1, col: 2 }, // 1 يمين
        { row: 1, col: 1 }, // 2 يسار
        { row: 2, col: 2 }, // 3 يمين
        { row: 2, col: 1 }, // 4 يسار
        { row: 3, col: 2 }, // 5 يمين
        { row: 3, col: 1 }  // 6 يسار
      ];

      answersGridEl.innerHTML = "";

      (displayState.answers || []).forEach((answer, index) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "answer-card" + (answer.revealed ? " revealed" : "");
        card.style.gridRow = positions[index].row;
        card.style.gridColumn = positions[index].col;

        card.innerHTML = `
          <div class="answer-points">${answer.points}</div>
          <div class="answer-label">${answer.text}</div>
        `;

        card.addEventListener("click", () => {
          handleAnswerClick(index);
        });

        answersGridEl.appendChild(card);
      });
    }

    function renderPanel() {
      panelActionsEl.innerHTML = "";

      if (controlState.stage === "idle" || controlState.stage === "main") {
        panelTitleEl.textContent = ".";
        panelTitleEl.classList.add("hint-hidden");
        return;
      }

      panelTitleEl.classList.remove("hint-hidden");

      if (controlState.stage === "duel_select") {
        panelTitleEl.textContent = "مين جاوب ...؟";

        const row = buildRow([
          buildBlueButton(getTeamName("team1"), () => {
            controlState.confrontationWinner = "team1";
            controlState.stage = "play_or_pass";
            saveControlState();
            renderAll();
          }),
          buildBlueButton(getTeamName("team2"), () => {
            controlState.confrontationWinner = "team2";
            controlState.stage = "play_or_pass";
            saveControlState();
            renderAll();
          })
        ]);

        const cancelRow = buildRow([
          buildRedButton("إلغاء", () => {
            controlState.stage = "idle";
            saveControlState();
            renderAll();
          })
        ]);

        panelActionsEl.appendChild(row);
        panelActionsEl.appendChild(cancelRow);
        return;
      }

      if (controlState.stage === "play_or_pass") {
        const winnerName = getTeamName(controlState.confrontationWinner);
        const otherName = getTeamName(getOtherTeam(controlState.confrontationWinner));

        panelTitleEl.textContent = `الفريق ${winnerName} فاز بالسؤال ماذا تريد ؟`;

        const row = buildRow([
          buildBlueButton("نلعب", () => {
            controlState.currentTurnTeam = controlState.confrontationWinner;
            controlState.stage = "main";
            saveControlState();
            renderAll();
          }),
          buildBlueButton(`نمرر لـ${otherName}`, () => {
            controlState.currentTurnTeam = getOtherTeam(controlState.confrontationWinner);
            controlState.stage = "main";
            saveControlState();
            renderAll();
          })
        ]);

        const cancelRow = buildRow([
          buildRedButton("إلغاء", () => {
            controlState.stage = "duel_select";
            saveControlState();
            renderAll();
          })
        ]);

        panelActionsEl.appendChild(row);
        panelActionsEl.appendChild(cancelRow);
        return;
      }

      if (controlState.stage === "steal_result") {
        panelTitleEl.textContent = "ماذا حصل لسرقة السؤال ؟";

        const row = buildRow([
          buildBlueButton("تمت السرقة", () => {
            controlState.stage = "steal_pick";
            saveControlState();
            renderAll();
          }),
          buildBlueButton("فشلت السرقة", () => {
            if (controlState.currentTurnTeam) {
              awardRoundToTeam(controlState.currentTurnTeam);
            }
          })
        ]);

        panelActionsEl.appendChild(row);
        return;
      }

      if (controlState.stage === "steal_pick") {
        panelTitleEl.textContent = "اضغط على الجواب الذي تم سرقته لمنح النقاط";
        return;
      }

      panelTitleEl.textContent = ".";
      panelTitleEl.classList.add("hint-hidden");
    }

    function buildRow(buttons) {
      const row = document.createElement("div");
      row.className = "panel-row";
      buttons.forEach(btn => row.appendChild(btn));
      return row;
    }

    function buildBlueButton(text, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "panel-btn";
      btn.textContent = text;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function buildRedButton(text, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "panel-btn red";
      btn.textContent = text;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function handleAnswerClick(index) {
      const answer = displayState.answers[index];
      if (!answer) return;

      if (controlState.stage === "steal_pick") {
        if (!answer.revealed) {
          answer.revealed = true;
        }
        saveDisplayState();
        awardRoundToTeam(controlState.stealingTeam);
        return;
      }

      if (!answer.revealed) {
        answer.revealed = true;
        saveDisplayState();
      } else {
        saveDisplayState();
      }

      if (!controlState.currentTurnTeam && controlState.stage === "idle" && controlState.firstBuzzTeam) {
        if (index === 0) {
          controlState.confrontationWinner = controlState.firstBuzzTeam;
          controlState.stage = "play_or_pass";
        } else {
          controlState.stage = "duel_select";
        }
        saveControlState();
        renderAll();
        return;
      }

      if (controlState.currentTurnTeam && displayState.answers.every(a => a.revealed)) {
        awardRoundToTeam(controlState.currentTurnTeam);
        return;
      }

      renderAll();
    }

    function awardRoundToTeam(team) {
      const points = calculateRoundPoints();

      if (team === "team1") {
        displayState.team1Score = Number(displayState.team1Score || 0) + points;
      } else if (team === "team2") {
        displayState.team2Score = Number(displayState.team2Score || 0) + points;
      }

      displayState.team1Strikes = 0;
      displayState.team2Strikes = 0;
      saveDisplayState();

      controlState.stage = "idle";
      controlState.currentTurnTeam = "";
      controlState.confrontationWinner = "";
      controlState.stealingTeam = "";
      controlState.firstBuzzName = "";
      controlState.firstBuzzTeam = "";
      saveControlState();

      renderAll();
    }

    async function startBuzzPolling() {
      await refreshBuzzState();
      setInterval(refreshBuzzState, 700);
    }

    async function refreshBuzzState() {
      const room = readStored("familyfeud_buzz_room") || DEFAULT_ROOM;

      for (const base of POSSIBLE_API_BASES) {
        try {
          const res = await fetch(`${base}/api/buzz/state?room=${encodeURIComponent(room)}`, {
            method: "GET",
            cache: "no-store"
          });

          if (!res.ok) continue;
          const data = await res.json();

          if (!data?.ok || !data?.state) continue;

          controlState.buzzVisible = !!data.state.enabled;
          controlState.firstBuzzName = data.state.firstBuzz?.name || "";
          controlState.firstBuzzTeam = data.state.firstBuzz?.team || "";

          saveControlState();
          renderAll();

          writeStored("familyfeud_buzz_api_base", base);
          return;
        } catch (e) {}
      }
    }

    async function setRemoteBuzzEnabled(enabled) {
      const room = readStored("familyfeud_buzz_room") || DEFAULT_ROOM;

      for (const base of POSSIBLE_API_BASES) {
        try {
          const res = await fetch(`${base}/api/buzz/toggle?room=${encodeURIComponent(room)}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ enabled })
          });

          if (!res.ok) continue;
          writeStored("familyfeud_buzz_api_base", base);
          return true;
        } catch (e) {}
      }

      return false;
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function setAppHeight() {
      stableViewport = getCurrentViewport();
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport() {
      stableViewport = getCurrentViewport();

      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / DESIGN_WIDTH,
        usableHeight / DESIGN_HEIGHT
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout() {
      setAppHeight();

      requestAnimationFrame(() => {
        fitGameToViewport();
        nudgeSafariBar();
      });
    }
  </script>
</body>
</html>
