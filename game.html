<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Game Display</title>

  <style>
    :root{
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --bg-1:#2347a5;
      --bg-2:#2d43a2;
      --dot:#96aae7;

      --gold:#f1d14f;
      --board-gold:#e5c13f;
      --panel-border:#111111;
      --white:#f6f2e8;
      --dark:#07173e;
      --score-black:#000000;

      --answer-a:#2633DB;
      --answer-b:#217DFF;

      --strike-off:#8d8d8d;
      --strike-on:#ff2c3f;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html{
      min-height:100%;
      background:var(--bg-2);
    }

    body{
      min-height:100%;
      background:var(--bg-2);
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(150,170,231,.95) 0 4px, transparent 4.6px) 0 0 / 48px 48px,
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:14px;
      left:18px;
      width:132px;
      height:88px;
      object-fit:contain;
      z-index:5;
    }

    .game-logo{
      position:absolute;
      top:10px;
      right:18px;
      width:142px;
      height:84px;
      object-fit:contain;
      z-index:5;
    }

    .question-box{
      position:absolute;
      top:38px;
      left:50%;
      transform:translateX(-50%);
      width:840px;
      height:150px;
      border-radius:34px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 10px 20px rgba(0,0,0,.08);
      overflow:hidden;
    }

    .question-text{
      width:100%;
      height:100%;
      padding:8px 34px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--white);
      font-size:64px;
      line-height:1.18;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .round-box{
      position:absolute;
      top:204px;
      left:50%;
      transform:translateX(-50%);
      width:244px;
      height:108px;
      border-radius:30px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:4;
      box-shadow:0 8px 16px rgba(0,0,0,.08);
    }

    .round-label{
      color:var(--white);
      font-size:22px;
      line-height:1.15;
      font-weight:900;
      margin-bottom:6px;
    }

    .round-score{
      color:var(--gold);
      font-size:58px;
      line-height:1;
      font-weight:900;
    }

    .board{
      position:absolute;
      top:292px;
      left:50%;
      transform:translateX(-50%);
      width:888px;
      height:364px;
      border-radius:36px;
      border:7px solid var(--board-gold);
      background:#2b47ad;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .answers-grid{
      position:absolute;
      inset:26px 24px 26px 24px;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3, 1fr);
      gap:16px 24px;
      direction:ltr;
    }

    .answer-slot{
      position:relative;
      width:100%;
      height:100%;
      border-radius:32px;
      border:4px solid rgba(246,242,232,.96);
      background:linear-gradient(180deg, var(--answer-b) 0%, var(--answer-a) 100%);
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .answer-slot.hidden-state{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .answer-slot.revealed{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 82px 0 80px;
    }

    .rank-circle{
      width:60px;
      height:60px;
      border-radius:50%;
      border:4px solid #d9d9d9;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--white);
      font-size:30px;
      font-weight:900;
      background:rgba(7,23,62,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      line-height:1;
    }

    .answer-points{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      width:58px;
      height:58px;
      border-radius:50%;
      border:4px solid #171717;
      background:var(--gold);
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      line-height:1;
    }

    .answer-label{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--white);
      font-size:38px;
      line-height:1.18;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding:6px 10px 0;
    }

    .team-panel{
      position:absolute;
      top:130px;
      width:252px;
      height:492px;
      border-radius:36px;
      border:8px solid var(--panel-border);
      background:linear-gradient(180deg, #0b2270 0%, #091f64 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 10px 22px rgba(0,0,0,.10);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .team-panel.left{
      left:26px;
    }

    .team-panel.right{
      right:26px;
    }

    .team-name{
      margin-top:40px;
      width:100%;
      min-height:66px;
      padding:6px 18px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--white);
      font-size:52px;
      line-height:1.18;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .team-score-box{
      margin-top:34px;
      width:184px;
      height:112px;
      border-radius:32px;
      border:5px solid var(--gold);
      background:var(--score-black);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .team-score{
      color:var(--gold);
      font-size:86px;
      line-height:1;
      font-weight:900;
      transform:translateY(-2px);
    }

    .strikes-label{
      margin-top:54px;
      color:var(--white);
      font-size:22px;
      line-height:1.18;
      font-weight:900;
      opacity:.95;
    }

    .strikes-row{
      margin-top:20px;
      display:flex;
      gap:16px;
      align-items:center;
      justify-content:center;
      direction:ltr;
    }

    .strike{
      font-size:84px;
      line-height:1;
      font-weight:900;
      color:var(--strike-off);
      transform:scale(.95);
      text-shadow:0 2px 0 rgba(0,0,0,.10);
    }

    .strike.active{
      color:var(--strike-on);
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img id="storeLogo" class="store-logo" src="logo.PNG" alt="صندوق المسابقات">
        <img id="gameLogo" class="game-logo" src="logo-family-feud.PNG" alt="فاميلي فيود">

        <div class="question-box">
          <div id="questionText" class="question-text"></div>
        </div>

        <div class="round-box">
          <div class="round-label">نقاط الجولة</div>
          <div id="roundScore" class="round-score">0</div>
        </div>

        <aside class="team-panel left">
          <div id="teamTwoName" class="team-name">الأقوياء</div>

          <div class="team-score-box">
            <div id="teamTwoScore" class="team-score">0</div>
          </div>

          <div class="strikes-label">الأخطاء</div>

          <div id="teamTwoStrikes" class="strikes-row">
            <div class="strike">X</div>
            <div class="strike">X</div>
            <div class="strike">X</div>
          </div>
        </aside>

        <div class="board">
          <div id="answersGrid" class="answers-grid"></div>
        </div>

        <aside class="team-panel right">
          <div id="teamOneName" class="team-name">الأبطال</div>

          <div class="team-score-box">
            <div id="teamOneScore" class="team-score">0</div>
          </div>

          <div class="strikes-label">الأخطاء</div>

          <div id="teamOneStrikes" class="strikes-row">
            <div class="strike">X</div>
            <div class="strike">X</div>
            <div class="strike">X</div>
          </div>
        </aside>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const DESIGN_WIDTH = 1600;
    const DESIGN_HEIGHT = 768;
    const STORAGE_KEY = "familyfeud_display_state_v1";

    const root = document.documentElement;

    const teamOneNameEl = document.getElementById("teamOneName");
    const teamTwoNameEl = document.getElementById("teamTwoName");
    const teamOneScoreEl = document.getElementById("teamOneScore");
    const teamTwoScoreEl = document.getElementById("teamTwoScore");
    const roundScoreEl = document.getElementById("roundScore");
    const questionTextEl = document.getElementById("questionText");
    const answersGrid = document.getElementById("answersGrid");

    const strikeRows = {
      team1: document.querySelectorAll("#teamOneStrikes .strike"),
      team2: document.querySelectorAll("#teamTwoStrikes .strike")
    };

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let lastStateSignature = "";

    function readStored(key) {
      try {
        const localValue = localStorage.getItem(key);
        if (localValue) return localValue;
      } catch (e) {}

      try {
        const sessionValue = sessionStorage.getItem(key);
        if (sessionValue) return sessionValue;
      } catch (e) {}

      return "";
    }

    function safeParse(json) {
      try {
        return JSON.parse(json);
      } catch (e) {
        return null;
      }
    }

    function getDefaultState() {
      return {
        showQuestion: false,
        question: "اذكر شيئًا يستخدمه الناس يوميًا",
        team1Name: readStored("familyfeud_team1") || "الأبطال",
        team2Name: readStored("familyfeud_team2") || "الأقوياء",
        team1Score: 0,
        team2Score: 0,
        team1Strikes: 0,
        team2Strikes: 0,
        roundPoints: null,
        answers: [
          { text: "الجوال", points: 32, revealed: false },
          { text: "المفاتيح", points: 18, revealed: false },
          { text: "الماء", points: 14, revealed: false },
          { text: "السيارة", points: 10, revealed: false },
          { text: "المحفظة", points: 8, revealed: false },
          { text: "النظارة", points: 6, revealed: false }
        ]
      };
    }

    function normalizeNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizeStrikeCount(value) {
      return Math.max(0, Math.min(3, normalizeNumber(value, 0)));
    }

    function normalizeAnswer(answer) {
      return {
        text: String(answer?.text || "").trim(),
        points: Math.max(0, normalizeNumber(answer?.points, 0)),
        revealed: !!answer?.revealed
      };
    }

    function normalizeState(raw) {
      const defaults = getDefaultState();
      const answers = Array.isArray(raw?.answers) ? raw.answers : defaults.answers;

      const normalizedAnswers = [];
      for (let i = 0; i < 6; i++) {
        normalizedAnswers.push(normalizeAnswer(answers[i] || defaults.answers[i]));
      }

      return {
        showQuestion: typeof raw?.showQuestion === "boolean" ? raw.showQuestion : defaults.showQuestion,
        question: String(raw?.question || defaults.question).trim() || defaults.question,
        team1Name: String(raw?.team1Name || defaults.team1Name).trim() || defaults.team1Name,
        team2Name: String(raw?.team2Name || defaults.team2Name).trim() || defaults.team2Name,
        team1Score: Math.max(0, normalizeNumber(raw?.team1Score, defaults.team1Score)),
        team2Score: Math.max(0, normalizeNumber(raw?.team2Score, defaults.team2Score)),
        team1Strikes: normalizeStrikeCount(raw?.team1Strikes),
        team2Strikes: normalizeStrikeCount(raw?.team2Strikes),
        roundPoints: raw?.roundPoints === null || raw?.roundPoints === undefined
          ? null
          : Math.max(0, normalizeNumber(raw.roundPoints, 0)),
        answers: normalizedAnswers
      };
    }

    function readDisplayState() {
      const raw = readStored(STORAGE_KEY);
      if (!raw) return normalizeState(getDefaultState());

      const parsed = safeParse(raw);
      if (!parsed) return normalizeState(getDefaultState());

      return normalizeState(parsed);
    }

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function setAppHeight() {
      stableViewport = getCurrentViewport();
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport() {
      stableViewport = getCurrentViewport();

      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / DESIGN_WIDTH,
        usableHeight / DESIGN_HEIGHT
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout() {
      setAppHeight();

      requestAnimationFrame(() => {
        fitGameToViewport();
        nudgeSafariBar();
      });
    }

    function applyStrikeRow(elements, activeCount) {
      elements.forEach((el, index) => {
        el.classList.toggle("active", index < activeCount);
      });
    }

    function calculateRoundPoints(state) {
      if (state.roundPoints !== null) return state.roundPoints;

      return state.answers.reduce((sum, answer) => {
        return answer.revealed ? sum + answer.points : sum;
      }, 0);
    }

    function renderAnswers(state) {
      const positions = [
        { row: 1, col: 2 }, // 1 يمين
        { row: 1, col: 1 }, // 2 يسار
        { row: 2, col: 2 }, // 3 يمين
        { row: 2, col: 1 }, // 4 يسار
        { row: 3, col: 2 }, // 5 يمين
        { row: 3, col: 1 }  // 6 يسار
      ];

      answersGrid.innerHTML = "";

      state.answers.forEach((answer, index) => {
        const slot = document.createElement("div");
        const revealed = !!answer.revealed;

        slot.className = "answer-slot " + (revealed ? "revealed" : "hidden-state");
        slot.style.gridRow = positions[index].row;
        slot.style.gridColumn = positions[index].col;

        if (revealed) {
          slot.innerHTML = `
            <div class="answer-points">${answer.points}</div>
            <div class="answer-label">${answer.text || ""}</div>
          `;
        } else {
          slot.innerHTML = `<div class="rank-circle">${index + 1}</div>`;
        }

        answersGrid.appendChild(slot);
      });
    }

    function renderDisplay() {
      const state = readDisplayState();
      const signature = JSON.stringify(state);

      if (signature === lastStateSignature) return;
      lastStateSignature = signature;

      teamOneNameEl.textContent = state.team1Name;
      teamTwoNameEl.textContent = state.team2Name;

      teamOneScoreEl.textContent = state.team1Score;
      teamTwoScoreEl.textContent = state.team2Score;

      questionTextEl.textContent = state.showQuestion ? state.question : "";
      roundScoreEl.textContent = calculateRoundPoints(state);

      applyStrikeRow(strikeRows.team1, state.team1Strikes);
      applyStrikeRow(strikeRows.team2, state.team2Strikes);

      renderAnswers(state);
    }

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    const gameLogo = document.getElementById("gameLogo");
    gameLogo.addEventListener("error", () => {
      gameLogo.style.display = "none";
    });

    renderDisplay();
    updateLayout();

    setInterval(renderDisplay, 300);

    window.addEventListener("storage", renderDisplay);

    window.addEventListener("pageshow", () => {
      renderDisplay();
      updateLayout();
    });

    window.addEventListener("focus", renderDisplay);

    window.addEventListener("load", () => {
      renderDisplay();
      setTimeout(updateLayout, 60);
      setTimeout(updateLayout, 220);
    }, { passive: true });

    window.addEventListener("resize", updateLayout, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
      setTimeout(updateLayout, 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
