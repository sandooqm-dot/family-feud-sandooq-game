<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Game Display</title>

  <style>
    :root{
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --bg-1:#2347a5;
      --bg-2:#2d43a2;
      --dot:#96aae7;

      --gold:#f1d14f;
      --panel-border:#111111;
      --white:#f6f2e8;
      --dark:#07173e;
      --score-black:#000000;

      --answer-a:#2633DB;
      --answer-b:#217DFF;

      --strike-off:#8d8d8d;
      --strike-on:#ff2c3f;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html{
      min-height:100%;
      background:var(--bg-2);
    }

    body{
      min-height:100%;
      background:var(--bg-2);
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(150,170,231,.95) 0 4px, transparent 4.6px) 0 0 / 48px 48px,
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .fit-root{
      position:relative;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
    }

    .page-spacer{
      height:var(--safari-nudge);
      pointer-events:none;
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1600px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    .store-logo{
      position:absolute;
      top:10px;
      left:16px;
      width:138px;
      height:94px;
      object-fit:contain;
      z-index:5;
    }

    .game-logo{
      position:absolute;
      top:8px;
      right:14px;
      width:146px;
      height:86px;
      object-fit:contain;
      z-index:5;
    }

    .question-box{
      position:absolute;
      top:34px;
      left:50%;
      transform:translateX(-50%);
      width:840px;
      height:184px;
      border-radius:34px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 10px 20px rgba(0,0,0,.08);
    }

    .question-text{
      width:100%;
      padding:0 36px;
      text-align:center;
      color:var(--white);
      font-size:72px;
      line-height:1.1;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .round-box{
      position:absolute;
      top:224px;
      left:50%;
      transform:translateX(-50%);
      width:292px;
      height:118px;
      border-radius:32px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:4;
      box-shadow:0 8px 16px rgba(0,0,0,.08);
    }

    .round-label{
      color:var(--white);
      font-size:26px;
      line-height:1;
      font-weight:900;
      margin-bottom:8px;
    }

    .round-score{
      color:var(--gold);
      font-size:66px;
      line-height:1;
      font-weight:900;
    }

    .board{
      position:absolute;
      top:282px;
      left:50%;
      transform:translateX(-50%);
      width:900px;
      height:390px;
      border-radius:38px;
      border:7px solid var(--gold);
      background:#2b47ad;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .answers-grid{
      position:absolute;
      inset:28px 22px 28px 22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3, 1fr);
      gap:18px 26px;
    }

    .answer-slot{
      position:relative;
      width:100%;
      height:100%;
      border-radius:34px;
      border:4px solid rgba(246,242,232,.96);
      background:linear-gradient(180deg, var(--answer-b) 0%, var(--answer-a) 100%);
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .answer-slot.hidden-state{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .answer-slot.revealed{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 86px 0 84px;
    }

    .rank-circle{
      width:64px;
      height:64px;
      border-radius:50%;
      border:4px solid #d9d9d9;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--white);
      font-size:31px;
      font-weight:900;
      background:rgba(7,23,62,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .answer-points{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      width:60px;
      height:60px;
      border-radius:50%;
      border:4px solid #171717;
      background:var(--gold);
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:29px;
      font-weight:900;
      line-height:1;
    }

    .answer-label{
      width:100%;
      text-align:center;
      color:var(--white);
      font-size:40px;
      line-height:1;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding:0 10px;
    }

    .team-panel{
      position:absolute;
      top:132px;
      width:310px;
      height:492px;
      border-radius:38px;
      border:8px solid var(--panel-border);
      background:linear-gradient(180deg, #0b2270 0%, #091f64 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 10px 22px rgba(0,0,0,.10);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .team-panel.left{
      left:26px;
    }

    .team-panel.right{
      right:26px;
    }

    .team-name{
      margin-top:36px;
      width:100%;
      padding:0 18px;
      text-align:center;
      color:var(--white);
      font-size:58px;
      line-height:1.05;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .team-score-box{
      margin-top:34px;
      width:212px;
      height:118px;
      border-radius:34px;
      border:5px solid var(--gold);
      background:var(--score-black);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .team-score{
      color:var(--gold);
      font-size:92px;
      line-height:1;
      font-weight:900;
      transform:translateY(-2px);
    }

    .strikes-label{
      margin-top:56px;
      color:var(--white);
      font-size:22px;
      line-height:1;
      font-weight:900;
      opacity:.95;
    }

    .strikes-row{
      margin-top:20px;
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:center;
      direction:ltr;
    }

    .strike{
      font-size:88px;
      line-height:1;
      font-weight:900;
      color:var(--strike-off);
      transform:scale(.95);
      text-shadow:0 2px 0 rgba(0,0,0,.10);
    }

    .strike.active{
      color:var(--strike-on);
    }

    body.portrait .game-shell{
      width:768px;
      height:1366px;
    }

    body.portrait .store-logo{
      top:12px;
      left:14px;
      width:120px;
      height:86px;
    }

    body.portrait .game-logo{
      top:10px;
      right:14px;
      width:132px;
      height:80px;
    }

    body.portrait .question-box{
      top:108px;
      width:700px;
      height:170px;
    }

    body.portrait .question-text{
      font-size:56px;
    }

    body.portrait .round-box{
      top:274px;
      width:248px;
      height:106px;
    }

    body.portrait .round-label{
      font-size:22px;
    }

    body.portrait .round-score{
      font-size:58px;
    }

    body.portrait .board{
      top:342px;
      width:700px;
      height:418px;
    }

    body.portrait .answers-grid{
      inset:24px 18px 24px 18px;
      gap:16px 20px;
    }

    body.portrait .answer-slot{
      border-radius:28px;
    }

    body.portrait .answer-slot.revealed{
      padding:0 74px 0 72px;
    }

    body.portrait .rank-circle{
      width:56px;
      height:56px;
      font-size:28px;
    }

    body.portrait .answer-points{
      width:54px;
      height:54px;
      font-size:25px;
      left:12px;
    }

    body.portrait .answer-label{
      font-size:34px;
    }

    body.portrait .team-panel{
      top:150px;
      width:206px;
      height:454px;
      border-radius:32px;
    }

    body.portrait .team-panel.left{
      left:14px;
    }

    body.portrait .team-panel.right{
      right:14px;
    }

    body.portrait .team-name{
      margin-top:28px;
      font-size:42px;
    }

    body.portrait .team-score-box{
      margin-top:28px;
      width:160px;
      height:98px;
      border-radius:28px;
    }

    body.portrait .team-score{
      font-size:74px;
    }

    body.portrait .strikes-label{
      margin-top:46px;
      font-size:18px;
    }

    body.portrait .strikes-row{
      gap:12px;
      margin-top:18px;
    }

    body.portrait .strike{
      font-size:70px;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img id="storeLogo" class="store-logo" src="logo.PNG" alt="صندوق المسابقات">
        <img id="gameLogo" class="game-logo" src="logo-family-feud.PNG" alt="فاميلي فيود">

        <div class="question-box">
          <div id="questionText" class="question-text">نص السؤال</div>
        </div>

        <div class="round-box">
          <div class="round-label">نقاط الجولة</div>
          <div id="roundScore" class="round-score">10</div>
        </div>

        <aside class="team-panel left">
          <div id="teamTwoName" class="team-name">الأقوياء</div>

          <div class="team-score-box">
            <div id="teamTwoScore" class="team-score">0</div>
          </div>

          <div class="strikes-label">الأخطاء</div>

          <div id="teamTwoStrikes" class="strikes-row">
            <div class="strike active">X</div>
            <div class="strike">X</div>
            <div class="strike">X</div>
          </div>
        </aside>

        <div class="board">
          <div id="answersGrid" class="answers-grid"></div>
        </div>

        <aside class="team-panel right">
          <div id="teamOneName" class="team-name">الأبطال</div>

          <div class="team-score-box">
            <div id="teamOneScore" class="team-score">0</div>
          </div>

          <div class="strikes-label">الأخطاء</div>

          <div id="teamOneStrikes" class="strikes-row">
            <div class="strike active">X</div>
            <div class="strike active">X</div>
            <div class="strike active">X</div>
          </div>
        </aside>

      </div>
    </div>

    <div class="page-spacer" aria-hidden="true"></div>
  </main>

  <script>
    const LANDSCAPE_WIDTH = 1600;
    const LANDSCAPE_HEIGHT = 768;
    const PORTRAIT_WIDTH = 768;
    const PORTRAIT_HEIGHT = 1366;

    const root = document.documentElement;

    const teamOneNameEl = document.getElementById("teamOneName");
    const teamTwoNameEl = document.getElementById("teamTwoName");
    const teamOneScoreEl = document.getElementById("teamOneScore");
    const teamTwoScoreEl = document.getElementById("teamTwoScore");
    const roundScoreEl = document.getElementById("roundScore");
    const questionTextEl = document.getElementById("questionText");
    const answersGrid = document.getElementById("answersGrid");

    const strikeRows = {
      team1: document.querySelectorAll("#teamOneStrikes .strike"),
      team2: document.querySelectorAll("#teamTwoStrikes .strike")
    };

    const QUESTIONS = [
      {
        question: "نص السؤال",
        answers: [
          { text: "الإجابة الأولى", points: 28 },
          { text: "الإجابة الثانية", points: 20 },
          { text: "الإجابة الثالثة", points: 16 },
          { text: "السيارة", points: 10 },
          { text: "الإجابة الخامسة", points: 8 },
          { text: "الإجابة السادسة", points: 6 }
        ]
      }
    ];

    const displayState = {
      currentQuestionIndex: 0,
      team1Name: sessionStorage.getItem("familyfeud_team1") || "الأبطال",
      team2Name: sessionStorage.getItem("familyfeud_team2") || "الأقوياء",
      team1Score: 0,
      team2Score: 0,
      team1Strikes: 3,
      team2Strikes: 1,
      revealedAnswers: [false, false, false, true, false, false]
    };

    let stableViewport = { width: window.innerWidth, height: window.innerHeight };
    let stableOrientationPortrait = window.innerHeight > window.innerWidth;

    function getCurrentViewport() {
      const vv = window.visualViewport;
      return {
        width: vv ? vv.width : window.innerWidth,
        height: vv ? vv.height : window.innerHeight
      };
    }

    function updateStableViewport() {
      const vp = getCurrentViewport();
      stableViewport = { width: vp.width, height: vp.height };
      stableOrientationPortrait = vp.height > vp.width;
    }

    function applyOrientationClass() {
      document.body.classList.toggle("portrait", stableOrientationPortrait);
    }

    function getDesignSize() {
      if (document.body.classList.contains("portrait")) {
        return { width: PORTRAIT_WIDTH, height: PORTRAIT_HEIGHT };
      }
      return { width: LANDSCAPE_WIDTH, height: LANDSCAPE_HEIGHT };
    }

    function setAppHeight() {
      updateStableViewport();
      root.style.setProperty("--app-height", stableViewport.height + "px");
    }

    function fitGameToViewport() {
      updateStableViewport();

      const { width, height } = getDesignSize();
      const horizontalPadding = 8;
      const verticalPadding = 8;

      const usableWidth = stableViewport.width - horizontalPadding;
      const usableHeight = stableViewport.height - verticalPadding;

      const scale = Math.min(
        usableWidth / width,
        usableHeight / height
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function nudgeSafariBar() {
      const visibleHeight = stableViewport.height;
      const fullHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );

      if (fullHeight <= visibleHeight + 8) return;

      window.scrollTo(0, 1);
      setTimeout(() => window.scrollTo(0, 1), 120);
      setTimeout(() => window.scrollTo(0, 1), 280);
    }

    function updateLayout() {
      applyOrientationClass();
      setAppHeight();

      requestAnimationFrame(() => {
        fitGameToViewport();
        nudgeSafariBar();
      });
    }

    function getCurrentQuestion() {
      return QUESTIONS[displayState.currentQuestionIndex] || QUESTIONS[0];
    }

    function getRoundPoints() {
      const question = getCurrentQuestion();
      return question.answers.reduce((sum, answer, index) => {
        return displayState.revealedAnswers[index] ? sum + answer.points : sum;
      }, 0);
    }

    function applyStrikeRow(elements, activeCount) {
      elements.forEach((el, index) => {
        el.classList.toggle("active", index < activeCount);
      });
    }

    function renderAnswers() {
      const question = getCurrentQuestion();
      const positions = [
        { row: 1, col: 2 },
        { row: 1, col: 1 },
        { row: 2, col: 2 },
        { row: 2, col: 1 },
        { row: 3, col: 2 },
        { row: 3, col: 1 }
      ];

      answersGrid.innerHTML = "";

      question.answers.forEach((answer, index) => {
        const slot = document.createElement("div");
        const revealed = !!displayState.revealedAnswers[index];

        slot.className = "answer-slot " + (revealed ? "revealed" : "hidden-state");
        slot.style.gridRow = positions[index].row;
        slot.style.gridColumn = positions[index].col;

        if (revealed) {
          slot.innerHTML = `
            <div class="answer-points">${answer.points}</div>
            <div class="answer-label">${answer.text}</div>
          `;
        } else {
          slot.innerHTML = `<div class="rank-circle">${index + 1}</div>`;
        }

        answersGrid.appendChild(slot);
      });
    }

    function renderDisplay() {
      const question = getCurrentQuestion();

      teamOneNameEl.textContent = displayState.team1Name || "الأبطال";
      teamTwoNameEl.textContent = displayState.team2Name || "الأقوياء";

      teamOneScoreEl.textContent = displayState.team1Score;
      teamTwoScoreEl.textContent = displayState.team2Score;

      questionTextEl.textContent = question.question;
      roundScoreEl.textContent = getRoundPoints();

      applyStrikeRow(strikeRows.team1, displayState.team1Strikes);
      applyStrikeRow(strikeRows.team2, displayState.team2Strikes);

      renderAnswers();
    }

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => {
      storeLogo.style.display = "none";
    });

    const gameLogo = document.getElementById("gameLogo");
    gameLogo.addEventListener("error", () => {
      gameLogo.style.display = "none";
    });

    renderDisplay();
    updateLayout();

    window.addEventListener("load", () => {
      setTimeout(updateLayout, 60);
      setTimeout(updateLayout, 220);
    }, { passive: true });

    window.addEventListener("resize", updateLayout, { passive: true });

    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
      setTimeout(updateLayout, 500);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });
    document.addEventListener("touchend", nudgeSafariBar, { passive: true });
  </script>
</body>
</html>
