<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Game</title>

  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --bg:#334cad;
      --dot:#b08a4f;
      --gold:#f1d14f;
      --navy:#09193f;
      --navy-2:#061534;
      --blue-1:#2b3fc2;
      --blue-2:#06204f;
      --white:#f4f2ea;
      --black:#111111;
      --gray-x:#6a6a6a;
      --red:#ff2a2a;
      --panel-border:#1d1d1d;
      --board-inner:#d9ddef;

      --app-height: 100vh;
      --stage-ratio: 1.7786458333;
      --app-scale: 1;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      margin:0;
      padding:0;
    }

    html{
      min-height:100%;
      background:#2f47aa;
    }

    body{
      min-height:100%;
      background:#2f47aa;
      font-family: Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
      overflow-y:auto;
    }

    .page{
      width:100%;
      min-height:calc(var(--app-height) + 26px);
      padding:
        calc(var(--safe-top) + 6px)
        max(4px, var(--safe-right))
        calc(var(--safe-bottom) + 14px)
        max(4px, var(--safe-left));
      display:flex;
      align-items:center;
      justify-content:center;
      background:#2f47aa;
    }

    .safe-stage{
      position:relative;
      width:min(
        calc(100vw - var(--safe-left) - var(--safe-right) - 8px),
        calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 22px) * var(--stage-ratio))
      );
      aspect-ratio: var(--stage-ratio);
      max-width:1800px;
      margin:0 auto;
      flex-shrink:0;
    }

    .fit-root{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle, rgba(176,138,79,.95) 0 4px, transparent 4.5px) 0 0 / 48px 48px,
        linear-gradient(180deg, #3a53b6 0%, #2e47a8 100%);
    }

    .game-shell{
      position:absolute;
      left:50%;
      top:50%;
      width:1366px;
      height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale));
      transform-origin:center center;
      overflow:hidden;
      direction:rtl;
    }

    /* ===== اللوحتان الجانبيتان ===== */
    .team-panel{
      position:absolute;
      top:58px;
      width:260px;
      height:388px;
      border-radius:36px;
      border:9px solid var(--panel-border);
      background:linear-gradient(90deg, #2c43c4 0%, #071939 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.05),
        0 10px 25px rgba(0,0,0,.15);
      display:flex;
      flex-direction:column;
      align-items:center;
      cursor:pointer;
    }

    .team-panel.right{
      right:24px;
    }

    .team-panel.left{
      left:24px;
    }

    .team-title{
      margin-top:22px;
      font-size:34px;
      font-weight:900;
      line-height:1.15;
      text-align:center;
      letter-spacing:.2px;
      color:#f5f2e7;
      white-space:nowrap;
    }

    .team-score-box{
      margin-top:18px;
      width:190px;
      height:110px;
      border-radius:32px;
      border:5px solid var(--gold);
      background:#000000;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .team-score{
      font-size:82px;
      line-height:1;
      font-weight:900;
      color:var(--gold);
      transform:translateY(-2px);
    }

    .team-strikes{
      margin-top:34px;
      display:flex;
      gap:16px;
      align-items:center;
      justify-content:center;
      direction:ltr;
    }

    .strike{
      font-size:82px;
      line-height:1;
      font-weight:900;
      color:var(--gray-x);
      opacity:.9;
      transform:scale(.92);
      transition:transform .18s ease, color .18s ease, opacity .18s ease;
      text-shadow:0 2px 0 rgba(0,0,0,.12);
    }

    .strike.active{
      color:var(--red);
      opacity:1;
      transform:scale(1);
      text-shadow:0 0 14px rgba(255,0,0,.18);
    }

    /* ===== المنطقة الوسطى ===== */
    .question-box{
      position:absolute;
      top:44px;
      left:50%;
      transform:translateX(-50%);
      width:715px;
      height:146px;
      border-radius:34px;
      border:5px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .question-text{
      font-size:46px;
      font-weight:900;
      text-align:center;
      line-height:1.15;
      color:#f4f2e8;
      padding:0 28px;
    }

    .round-box{
      position:absolute;
      top:182px;
      left:50%;
      transform:translateX(-50%);
      width:242px;
      height:118px;
      border-radius:34px;
      border:5px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:5;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    .round-label{
      font-size:22px;
      font-weight:900;
      line-height:1;
      color:var(--gold);
      margin-bottom:8px;
    }

    .round-score{
      font-size:58px;
      line-height:1;
      font-weight:900;
      color:#f6f2e8;
      transform:translateY(-2px);
    }

    .board{
      position:absolute;
      top:255px;
      left:50%;
      transform:translateX(-50%);
      width:724px;
      height:367px;
      border-radius:36px;
      border:6px solid var(--gold);
      background:linear-gradient(180deg, #3f56b6 0%, #3247af 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
      padding:28px 18px 18px;
    }

    .board-inner{
      position:absolute;
      inset:28px 18px 18px 18px;
      border-radius:30px;
      border:3px solid rgba(219,224,243,.72);
      pointer-events:none;
      opacity:.85;
    }

    .answers-grid{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px 24px;
      height:100%;
    }

    .answer-slot{
      border:none;
      background:none;
      padding:0;
      margin:0;
      cursor:pointer;
      perspective:1200px;
      min-height:92px;
    }

    .answer-flip{
      position:relative;
      width:100%;
      height:100%;
      min-height:92px;
      transform-style:preserve-3d;
      transition:transform .6s cubic-bezier(.22,1,.36,1);
    }

    .answer-slot.revealed .answer-flip{
      transform:rotateX(180deg);
    }

    .answer-face{
      position:absolute;
      inset:0;
      border-radius:32px;
      border:4px solid rgba(243,242,234,.96);
      background:linear-gradient(90deg, var(--blue-1) 0%, var(--blue-2) 100%);
      backface-visibility:hidden;
      overflow:hidden;
    }

    .answer-back{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .answer-front{
      transform:rotateX(180deg);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:0 70px 0 70px;
    }

    .rank-circle{
      width:56px;
      height:56px;
      border-radius:50%;
      border:4px solid rgba(243,242,234,.96);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#f5f2e8;
      font-size:28px;
      font-weight:900;
      background:rgba(22,40,105,.18);
    }

    .answer-points{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      width:52px;
      height:52px;
      border-radius:50%;
      background:var(--gold);
      color:#000;
      border:4px solid #171717;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:900;
      line-height:1;
      box-shadow:0 4px 10px rgba(0,0,0,.16);
    }

    .answer-label{
      width:100%;
      text-align:center;
      font-size:32px;
      line-height:1;
      font-weight:900;
      color:#f5f2e8;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      padding:0 8px;
    }

    /* ===== الأزرار السفلية ===== */
    .nav-btn{
      position:absolute;
      bottom:12px;
      width:196px;
      height:96px;
      border-radius:34px;
      border:5px solid rgba(243,242,234,.96);
      background:transparent;
      color:#f5f2e8;
      font-size:40px;
      font-weight:900;
      line-height:1;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
    }

    .nav-btn:hover{
      transform:translateY(-1px);
    }

    .nav-btn:disabled{
      opacity:.55;
      cursor:default;
      transform:none;
    }

    .nav-btn.prev{
      left:14px;
    }

    .nav-btn.next{
      right:14px;
    }

    /* ===== طبقة الخطأ ===== */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      z-index:999;
    }

    .overlay.show{
      opacity:1;
    }

    .overlay-x{
      font-size:340px;
      font-weight:900;
      line-height:1;
      color:var(--red);
      text-shadow:
        0 0 18px rgba(255,0,0,.22),
        0 8px 18px rgba(0,0,0,.20);
      transform:scale(.18);
      opacity:0;
    }

    .overlay.show .overlay-x{
      animation: popX .42s cubic-bezier(.22,1.2,.36,1) forwards;
    }

    @keyframes popX{
      0%{
        transform:scale(.18);
        opacity:0;
      }
      65%{
        transform:scale(1.08);
        opacity:1;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    .transfer-box{
      margin-top:10px;
      min-width:320px;
      max-width:80vw;
      min-height:72px;
      padding:16px 26px;
      border-radius:26px;
      border:4px solid var(--gold);
      background:linear-gradient(180deg, #0b1d4a 0%, #08173c 100%);
      color:#f5f2e8;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      opacity:0;
      transform:translateY(-10px) scale(.9);
    }

    .overlay.transfer .transfer-box{
      animation: showTransfer .22s ease .12s forwards;
    }

    @keyframes showTransfer{
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    @media (max-width: 900px) {
      .page{
        min-height:calc(var(--app-height) + 22px);
        padding:
          calc(var(--safe-top) + 5px)
          max(3px, var(--safe-right))
          calc(var(--safe-bottom) + 12px)
          max(3px, var(--safe-left));
      }

      .safe-stage{
        width:min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 6px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 18px) * var(--stage-ratio))
        );
      }
    }

    @media (max-width: 600px) {
      .page{
        min-height:calc(var(--app-height) + 18px);
        padding:
          calc(var(--safe-top) + 3px)
          max(2px, var(--safe-right))
          calc(var(--safe-bottom) + 10px)
          max(2px, var(--safe-left));
      }

      .safe-stage{
        width:min(
          calc(100vw - var(--safe-left) - var(--safe-right) - 4px),
          calc((var(--app-height) - var(--safe-top) - var(--safe-bottom) - 14px) * var(--stage-ratio))
        );
      }
    }
  </style>
</head>
<body>

  <main class="page">
    <section class="safe-stage" id="safeStage">
      <div class="fit-root">
        <div class="game-shell" id="gameShell">

          <aside class="team-panel left" id="teamTwoPanel" data-team="1">
            <div class="team-title">اسم الفريق</div>
            <div class="team-score-box">
              <div class="team-score">0</div>
            </div>
            <div class="team-strikes" id="teamTwoStrikes">
              <div class="strike">X</div>
              <div class="strike">X</div>
              <div class="strike">X</div>
            </div>
          </aside>

          <div class="question-box">
            <div class="question-text" id="questionText">اذكر شيئًا يستخدمه الناس يوميًا</div>
          </div>

          <div class="round-box">
            <div class="round-label">نقاط الجولة</div>
            <div class="round-score" id="roundScore">0</div>
          </div>

          <div class="board">
            <div class="board-inner"></div>

            <div class="answers-grid" id="answersGrid">
              <!-- answers -->
            </div>
          </div>

          <aside class="team-panel right" id="teamOnePanel" data-team="0">
            <div class="team-title">اسم الفريق</div>
            <div class="team-score-box">
              <div class="team-score">0</div>
            </div>
            <div class="team-strikes" id="teamOneStrikes">
              <div class="strike">X</div>
              <div class="strike">X</div>
              <div class="strike">X</div>
            </div>
          </aside>

          <button class="nav-btn prev" id="prevBtn" type="button">السابق</button>
          <button class="nav-btn next" id="nextBtn" type="button">التالي</button>

          <div class="overlay" id="strikeOverlay">
            <div class="overlay-x">X</div>
            <div class="transfer-box">السؤال ينتقل للفريق الاخر</div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <script>
    const DESIGN_WIDTH = 1366;
    const DESIGN_HEIGHT = 768;
    const root = document.documentElement;
    const safeStage = document.getElementById("safeStage");

    function setAppHeight() {
      const h = window.visualViewport && window.visualViewport.height
        ? window.visualViewport.height
        : window.innerHeight;

      root.style.setProperty("--app-height", h + "px");
    }

    function fitGameToViewport() {
      const safeWidth = safeStage.clientWidth || DESIGN_WIDTH;
      const safeHeight = safeStage.clientHeight || DESIGN_HEIGHT;

      const scale = Math.min(
        safeWidth / DESIGN_WIDTH,
        safeHeight / DESIGN_HEIGHT
      );

      root.style.setProperty("--app-scale", String(scale));
    }

    function updateLayout() {
      setAppHeight();
      requestAnimationFrame(fitGameToViewport);
    }

    const GAME_DATA = {
      question: "اذكر شيئًا يستخدمه الناس يوميًا",
      answers: [
        { text: "الجوال", points: 32 },
        { text: "المفاتيح", points: 18 },
        { text: "الماء", points: 14 },
        { text: "السيارة", points: 10 },
        { text: "المحفظة", points: 8 },
        { text: "النظارة", points: 6 }
      ]
    };

    const state = {
      revealed: [false, false, false, false, false, false],
      revealStack: [],
      strikes: [0, 0]
    };

    const questionText = document.getElementById("questionText");
    const roundScoreEl = document.getElementById("roundScore");
    const answersGrid = document.getElementById("answersGrid");
    const strikeOverlay = document.getElementById("strikeOverlay");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const strikeRows = [
      document.querySelectorAll("#teamOneStrikes .strike"),
      document.querySelectorAll("#teamTwoStrikes .strike")
    ];

    let overlayTimer = null;

    questionText.textContent = GAME_DATA.question;

    function updateRoundScore() {
      const total = GAME_DATA.answers.reduce((sum, answer, index) => {
        return state.revealed[index] ? sum + answer.points : sum;
      }, 0);

      roundScoreEl.textContent = total;
    }

    function updateStrikeRows() {
      strikeRows.forEach((row, teamIndex) => {
        row.forEach((strikeEl, index) => {
          strikeEl.classList.toggle("active", index < state.strikes[teamIndex]);
        });
      });
    }

    function updateNavButtons() {
      const hiddenCount = state.revealed.filter(v => !v).length;
      prevBtn.disabled = state.revealStack.length === 0;
      nextBtn.disabled = hiddenCount === 0;
    }

    function renderAnswers() {
      answersGrid.innerHTML = "";

      GAME_DATA.answers.forEach((answer, index) => {
        const slot = document.createElement("button");
        slot.type = "button";
        slot.className = "answer-slot" + (state.revealed[index] ? " revealed" : "");
        slot.dataset.index = index;

        slot.innerHTML = `
          <div class="answer-flip">
            <div class="answer-face answer-back">
              <div class="rank-circle">${index + 1}</div>
            </div>

            <div class="answer-face answer-front">
              <div class="answer-points">${answer.points}</div>
              <div class="answer-label">${answer.text}</div>
            </div>
          </div>
        `;

        slot.addEventListener("click", () => {
          revealSpecific(index);
        });

        answersGrid.appendChild(slot);
      });

      updateRoundScore();
      updateNavButtons();
    }

    function revealSpecific(index) {
      if (state.revealed[index]) return;
      state.revealed[index] = true;
      state.revealStack.push(index);
      renderAnswers();
    }

    function revealNext() {
      const nextIndex = state.revealed.findIndex(v => !v);
      if (nextIndex === -1) return;
      state.revealed[nextIndex] = true;
      state.revealStack.push(nextIndex);
      renderAnswers();
    }

    function hidePrevious() {
      if (!state.revealStack.length) return;
      const lastIndex = state.revealStack.pop();
      state.revealed[lastIndex] = false;
      renderAnswers();
    }

    function showStrikeOverlay(isThirdStrike) {
      clearTimeout(overlayTimer);

      strikeOverlay.classList.remove("show", "transfer");
      void strikeOverlay.offsetWidth;

      strikeOverlay.classList.add("show");
      if (isThirdStrike) {
        strikeOverlay.classList.add("transfer");
      }

      overlayTimer = setTimeout(() => {
        strikeOverlay.classList.remove("show", "transfer");
      }, isThirdStrike ? 1500 : 900);
    }

    function addStrike(teamIndex) {
      if (state.strikes[teamIndex] >= 3) return;
      state.strikes[teamIndex] += 1;
      updateStrikeRows();

      const isThirdStrike = state.strikes[teamIndex] === 3;
      showStrikeOverlay(isThirdStrike);
    }

    document.getElementById("teamOnePanel").addEventListener("click", () => {
      addStrike(0);
    });

    document.getElementById("teamTwoPanel").addEventListener("click", () => {
      addStrike(1);
    });

    prevBtn.addEventListener("click", hidePrevious);
    nextBtn.addEventListener("click", revealNext);

    updateLayout();
    updateStrikeRows();
    renderAnswers();

    window.addEventListener("resize", updateLayout, { passive: true });
    window.addEventListener("orientationchange", () => {
      setTimeout(updateLayout, 80);
      setTimeout(updateLayout, 250);
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateLayout, { passive: true });
      window.visualViewport.addEventListener("scroll", updateLayout, { passive: true });
    }
  </script>
</body>
</html>
