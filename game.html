<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Feud - Game Display</title>

  <style>
    :root{
      --app-height:100vh;
      --app-scale:1;
      --safari-nudge:34px;

      --bg-1:#2347a5;
      --bg-2:#2d43a2;
      --dot:#96aae7;

      --gold:#f1d14f;
      --board-gold:#e5c13f;
      --panel-border:#111111;
      --white:#f6f2e8;
      --dark:#07173e;
      --score-black:#000000;

      --answer-a:#2633DB;
      --answer-b:#217DFF;

      --strike-off:#8d8d8d;
      --strike-on:#ff2c3f;

      --green-1:#12a63e;
      --green-2:#0d862f;
      --red-1:#d71822;
      --red-2:#a90f17;

      --buzz-glow:#f7df6a;
      --buzz-glow-soft:rgba(247,223,106,.28);
      --buzz-name-bg-1:rgba(247,223,106,.30);
      --buzz-name-bg-2:rgba(247,223,106,.14);
    }

    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }

    html{ min-height:100%; background:var(--bg-2); }

    body{
      min-height:100%; background:var(--bg-2);
      font-family:Arial, "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust:100%; text-size-adjust:100%;
      overflow-x:hidden; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:auto;
    }

    .page{
      width:100%; min-height:calc(var(--app-height) + var(--safari-nudge));
      background:
        radial-gradient(circle, rgba(150,170,231,.95) 0 4px, transparent 4.6px) 0 0 / 48px 48px,
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .fit-root{ position:relative; width:100%; height:var(--app-height); overflow:hidden; }
    .page-spacer{ height:var(--safari-nudge); pointer-events:none; }

    .game-shell{
      position:absolute; left:50%; top:50%; width:1600px; height:768px;
      transform:translate(-50%, -50%) scale(var(--app-scale)); transform-origin:center center;
      overflow:hidden; direction:rtl;
    }

    .store-logo{ position:absolute; top:12px; left:16px; width:145px; height:92px; object-fit:contain; z-index:5; }
    .game-logo{ position:absolute; top:10px; right:16px; width:150px; height:88px; object-fit:contain; z-index:5; }

    .question-box{
      position:absolute; top:34px; left:50%; transform:translateX(-50%); width:888px; height:150px;
      border-radius:34px; border:6px solid var(--gold); background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex; align-items:center; justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 10px 20px rgba(0,0,0,.08);
      overflow:hidden;
    }

    .question-text{
      width:100%; height:100%; padding:0 32px; display:flex; align-items:center; justify-content:center; text-align:center;
      color:var(--white); font-size:58px; line-height:1.1; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      opacity:1; visibility:visible;
    }

    .question-text.is-hidden{ opacity:0 !important; visibility:hidden !important; color:transparent !important; text-shadow:none !important; }

    .round-box{
      position:absolute; top:194px; left:50%; transform:translateX(-50%); width:250px; height:112px;
      border-radius:30px; border:6px solid var(--gold); background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:4; box-shadow:0 8px 16px rgba(0,0,0,.08);
    }

    .round-label{ color:var(--white); font-size:24px; line-height:1; font-weight:900; margin-bottom:8px; }
    .round-score{ color:var(--gold); font-size:60px; line-height:1; font-weight:900; }

    .board{
      position:absolute; top:288px; left:50%; transform:translateX(-50%); width:888px; height:372px;
      border-radius:36px; border:7px solid var(--board-gold); background:#2b47ad; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .answers-grid{ position:absolute; inset:24px 22px 24px 22px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:repeat(3, 1fr); gap:16px 24px; direction:ltr; }
    .answer-slot{ position:relative; width:100%; height:100%; perspective:1200px; border-radius:32px; }
    .answer-flip{ position:relative; width:100%; height:100%; transform-style:preserve-3d; border-radius:32px; }
    .answer-slot.is-revealed .answer-flip{ transform:rotateX(180deg); }
    .answer-slot.just-revealed .answer-flip{ animation:answerFlipReveal .72s cubic-bezier(.22,.9,.2,1) forwards; }

    .answer-face{
      position:absolute; inset:0; width:100%; height:100%; border-radius:32px; border:4px solid rgba(246,242,232,.96);
      background:linear-gradient(180deg, var(--answer-b) 0%, var(--answer-a) 100%); overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); backface-visibility:hidden; -webkit-backface-visibility:hidden;
    }

    .answer-front{ display:flex; align-items:center; justify-content:center; transform:rotateX(0deg); }
    .answer-back{ display:flex; align-items:center; justify-content:center; padding:0 84px 0 78px; transform:rotateX(180deg); }

    .rank-circle{
      width:60px; height:60px; border-radius:50%; border:4px solid #d9d9d9; display:flex; align-items:center; justify-content:center;
      color:var(--white); font-size:30px; font-weight:900; background:rgba(7,23,62,.14); box-shadow: inset 0 0 0 1px rgba(255,255,255,.03); line-height:1;
    }

    .answer-points{
      position:absolute; left:14px; top:50%; transform:translateY(-50%); width:58px; height:58px; border-radius:50%; border:4px solid #171717;
      background:var(--gold); color:#000; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; line-height:1; z-index:2;
    }

    .answer-label{
      width:100%; height:100%; display:flex; align-items:center; justify-content:center; text-align:center; color:var(--white);
      font-size:38px; line-height:1.15; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 10px;
    }

    .team-panel{
      position:absolute; top:126px; width:252px; height:494px; border-radius:36px; border:8px solid var(--panel-border);
      background:linear-gradient(180deg, #0b2270 0%, #091f64 100%);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 10px 22px rgba(0,0,0,.10);
      display:flex; flex-direction:column; align-items:center; transition:border-color .22s ease, box-shadow .22s ease, transform .22s ease;
    }
    .team-panel.left{ left:26px; }
    .team-panel.right{ right:26px; }

    .team-panel.first-buzz-active{
      border-color:var(--buzz-glow);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), 0 0 0 4px var(--buzz-glow-soft), 0 0 28px rgba(247,223,106,.34), 0 10px 22px rgba(0,0,0,.12);
      transform:translateY(-2px);
    }

    .team-panel.turn-active{
      border-color:var(--buzz-glow);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), 0 0 0 4px var(--buzz-glow-soft), 0 0 28px rgba(247,223,106,.34), 0 10px 22px rgba(0,0,0,.12);
    }

    .team-name{
      margin-top:34px; width:calc(100% - 22px); height:74px; padding:0 14px;
      display:flex; align-items:center; justify-content:center; text-align:center; color:var(--white); font-size:48px; line-height:1.1; font-weight:900;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-radius:22px; transition:background .22s ease, box-shadow .22s ease, border-color .22s ease;
    }

    .team-name.first-buzz-active{
      background:linear-gradient(180deg, var(--buzz-name-bg-1) 0%, var(--buzz-name-bg-2) 100%);
      box-shadow:inset 0 0 0 3px rgba(247,223,106,.24), 0 0 18px rgba(247,223,106,.16);
    }

    .team-score-box{ margin-top:28px; width:184px; height:112px; border-radius:32px; border:5px solid var(--gold); background:var(--score-black); display:flex; align-items:center; justify-content:center; box-shadow: inset 0 0 0 1px rgba(255,255,255,.03); }
    .team-score{ color:var(--gold); font-size:86px; line-height:1; font-weight:900; transform:translateY(-2px); }
    .strikes-label{ margin-top:58px; color:var(--white); font-size:22px; line-height:1.1; font-weight:900; opacity:.95; }
    .strikes-row{ margin-top:20px; display:flex; gap:16px; align-items:center; justify-content:center; direction:ltr; }
    .strike{ font-size:84px; line-height:1; font-weight:900; color:var(--strike-off); transform:scale(.95); text-shadow:0 2px 0 rgba(0,0,0,.10); }
    .strike.active{ color:var(--strike-on); text-shadow:0 0 10px rgba(255,44,63,.35), 0 3px 0 rgba(0,0,0,.15); }

    .strike-effect-layer{ position:absolute; inset:0; z-index:60; pointer-events:none; display:flex; align-items:center; justify-content:center; opacity:0; }
    .strike-effect-layer.show{ opacity:1; }

    .big-strike-x{
      position:absolute; left:50%; top:50%; transform:translate(-50%, -50%) scale(.65); color:#ff2638; font-size:310px; font-weight:900; line-height:1; opacity:0;
      text-shadow:0 0 18px rgba(255,255,255,.55), 0 0 42px rgba(255,38,56,.65), 0 12px 0 rgba(0,0,0,.25);
    }
    .strike-effect-layer.show-x .big-strike-x{ animation:bigStrikePop 2s ease forwards; }

    .transfer-message-box{
      position:absolute; left:50%; top:50%; width:760px; min-height:154px; transform:translate(-50%, -50%) scale(.9);
      border-radius:34px; border:7px solid var(--gold); background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      color:var(--white); display:flex; align-items:center; justify-content:center; text-align:center; padding:20px 32px; font-size:52px; line-height:1.25; font-weight:900; opacity:0;
      box-shadow:0 18px 40px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .strike-effect-layer.show-transfer .transfer-message-box{ animation:transferMessagePop 1.85s ease forwards; }

    .audio-choice-box{
      position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); width:640px; min-height:250px;
      border-radius:34px; border:7px solid var(--gold); background:linear-gradient(180deg, #0a1d56 0%, #08173d 100%);
      z-index:120; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px 28px 24px;
      box-shadow:0 18px 40px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .audio-choice-box.show{ display:flex; }
    .audio-choice-title{ color:var(--gold); font-size:54px; font-weight:900; line-height:1.1; margin-bottom:18px; }
    .audio-choice-text{ color:var(--white); font-size:34px; font-weight:900; line-height:1.25; margin-bottom:28px; }
    .audio-choice-actions{ display:flex; align-items:center; justify-content:center; gap:22px; direction:rtl; }
    .audio-choice-btn{ min-width:190px; height:78px; border:none; border-radius:26px; color:var(--white); font-size:34px; font-weight:900; cursor:pointer; border:4px solid rgba(255,255,255,.92); }
    .audio-choice-btn.yes{ background:linear-gradient(180deg, var(--green-1) 0%, var(--green-2) 100%); }
    .audio-choice-btn.no{ background:linear-gradient(180deg, var(--red-1) 0%, var(--red-2) 100%); }

    @keyframes answerFlipReveal{ 0%{ transform:rotateX(0deg); } 100%{ transform:rotateX(180deg); } }
    @keyframes bigStrikePop{
      0%{ opacity:0; transform:translate(-50%, -50%) scale(.45) rotate(-6deg); }
      12%{ opacity:1; transform:translate(-50%, -50%) scale(1.08) rotate(0deg); }
      78%{ opacity:1; transform:translate(-50%, -50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%, -50%) scale(.92); }
    }
    @keyframes transferMessagePop{
      0%{ opacity:0; transform:translate(-50%, -50%) scale(.84); }
      14%{ opacity:1; transform:translate(-50%, -50%) scale(1.03); }
      78%{ opacity:1; transform:translate(-50%, -50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%, -50%) scale(.94); }
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="fit-root">
      <div class="game-shell">

        <img id="storeLogo" class="store-logo" src="logo.PNG" alt="صندوق المسابقات">
        <img id="gameLogo" class="game-logo" src="logo-family-feud.PNG" alt="فاميلي فيود">

        <div class="question-box"><div id="questionText" class="question-text"></div></div>

        <div class="round-box"><div class="round-label">نقاط الجولة</div><div id="roundScore" class="round-score">0</div></div>

        <aside id="teamTwoPanel" class="team-panel left">
          <div id="teamTwoName" class="team-name">الفريق الثاني</div>
          <div class="team-score-box"><div id="teamTwoScore" class="team-score">0</div></div>
          <div class="strikes-label">الأخطاء</div>
          <div id="teamTwoStrikes" class="strikes-row"><div class="strike">X</div><div class="strike">X</div><div class="strike">X</div></div>
        </aside>

        <div class="board"><div id="answersGrid" class="answers-grid"></div></div>

        <aside id="teamOnePanel" class="team-panel right">
          <div id="teamOneName" class="team-name">الفريق الأول</div>
          <div class="team-score-box"><div id="teamOneScore" class="team-score">0</div></div>
          <div class="strikes-label">الأخطاء</div>
          <div id="teamOneStrikes" class="strikes-row"><div class="strike">X</div><div class="strike">X</div><div class="strike">X</div></div>
        </aside>

        <div id="strikeEffectLayer" class="strike-effect-layer" aria-hidden="true">
          <div id="bigStrikeX" class="big-strike-x">X</div>
          <div id="transferMessageBox" class="transfer-message-box">ينتقل السؤال إلى الفريق الآخر</div>
        </div>

        <div id="audioChoiceBox" class="audio-choice-box">
          <div class="audio-choice-title">تفعيل الأصوات</div>
          <div class="audio-choice-text">هل تريد تشغيل أصوات اللعبة؟</div>
          <div class="audio-choice-actions">
            <button id="audioYesBtn" class="audio-choice-btn yes" type="button">نعم</button>
            <button id="audioNoBtn" class="audio-choice-btn no" type="button">لا</button>
          </div>
        </div>

        <audio id="answerSound" preload="auto" playsinline webkit-playsinline><source src="answer.MP4" type="audio/mp4"></audio>
        <audio id="wrongSound" preload="auto" playsinline webkit-playsinline><source src="rong.mp3" type="audio/mpeg"></audio>

      </div>
    </div>
    <div class="page-spacer" aria-hidden="true"></div>
  </main>

    window.addEventListener("focus", async () => { await fetchRemoteGameState(true); renderDisplay(); updateLayout(); });
    window.addEventListener("load", () => { renderDisplay(); setTimeout(updateLayout, 60); setTimeout(updateLayout, 220); }, { passive: true });
    window.addEventListener("resize", updateLayout, { passive: true });
    window.addEventListener("orientationchange", () => { setTimeout(updateLayout, 80); setTimeout(updateLayout, 250); setTimeout(updateLayout, 500); }, { passive: true });

    document.addEventListener("touchstart", nudgeSafariBar, { passive: true });

    function initAudioChoice() {
      showAudioChoice();
      audioYesBtn.addEventListener("click", async () => { audioEnabled = true; audioChoiceResolved = true; await unlockAllSounds(); hideAudioChoice(); });
      audioNoBtn.addEventListener("click", () => { audioEnabled = false; audioChoiceResolved = true; stopAllGameSounds(); hideAudioChoice(); });
    }

    function showAudioChoice() { audioChoiceBox.classList.add("show"); }
    function hideAudioChoice() { audioChoiceBox.classList.remove("show"); }

    async function unlockAudioElement(audioEl) {
      if (!audioEl) return;
      const oldMuted = audioEl.muted;
      const oldVolume = audioEl.volume;
      try { audioEl.pause(); audioEl.currentTime = 0; } catch (e) {}
      try { audioEl.muted = true; audioEl.volume = 0; await audioEl.play(); } catch (e) {}
      try { audioEl.pause(); audioEl.currentTime = 0; } catch (e) {}
      audioEl.muted = oldMuted;
      audioEl.volume = oldVolume;
    }

    async function unlockAllSounds() { await unlockAudioElement(answerSoundEl); await unlockAudioElement(wrongSoundEl); }

    function stopAllGameSounds() {
      [answerSoundEl, wrongSoundEl].forEach((audioEl) => {
        if (!audioEl) return;
        try { audioEl.pause(); audioEl.currentTime = 0; } catch (e) {}
      });
    }

    async function playExclusiveSound(audioEl) {
      if (!audioEnabled || !audioChoiceResolved || !audioEl) return;
      stopAllGameSounds();
      try { audioEl.currentTime = 0; } catch (e) {}
      try { await audioEl.play(); } catch (e) {}
    }

    function playAnswerSound() { playExclusiveSound(answerSoundEl); }
    function playWrongSound() { playExclusiveSound(wrongSoundEl); }

    function readStored(key) {
      try { const localValue = localStorage.getItem(key); if (localValue) return localValue; } catch (e) {}
      try { const sessionValue = sessionStorage.getItem(key); if (sessionValue) return sessionValue; } catch (e) {}
      return "";
    }

    function writeStored(key, value) {
      const stringValue = typeof value === "string" ? value : JSON.stringify(value);
      try { localStorage.setItem(key, stringValue); } catch (e) {}
      try { sessionStorage.setItem(key, stringValue); } catch (e) {}
      if (channel) { try { channel.postMessage({ key }); } catch (e) {} }
    }

    function safeParse(json) { try { return JSON.parse(json); } catch (e) { return null; } }
    function normalizeBase(base) { return String(base || "").trim().replace(/\/+$/, ""); }
    function normalizeRoom(value) { const v = String(value || "").trim().toLowerCase(); if (!v) return ""; return v.replace(/[^a-z0-9_-]/g, "").slice(0, 64); }
    function normalizeEffectReason(value) { return String(value || "").trim().toLowerCase().slice(0, 40); }
    function normalizeTeam(value) { const v = String(value || "").trim().toLowerCase(); if (v === "team1" || v === "team2") return v; return ""; }

    function resolveRoomId() {
      const url = new URL(window.location.href);
      const fromUrl = normalizeRoom(url.searchParams.get("room"));
      const fromStorage = normalizeRoom(readStored(ROOM_KEY) || readStored(BUZZ_ROOM_KEY));
      return fromUrl || fromStorage || DEFAULT_ROOM;
    }

    function persistRoomId(nextRoom) { writeStored(ROOM_KEY, nextRoom); writeStored(BUZZ_ROOM_KEY, nextRoom); }

    function getApiBases() {
      const seen = new Set();
      const result = [];
      const candidates = [window.location.origin, apiBase, readStored(API_BASE_KEY), readStored(BUZZ_API_BASE_KEY), window.location.origin.includes("workers.dev") ? window.location.origin : "", "https://family-feud-buzz.sandooq-m.workers.dev", "https://z.sandooq-m.workers.dev"];
      candidates.forEach((base) => { const normalized = normalizeBase(base); if (!normalized || seen.has(normalized)) return; seen.add(normalized); result.push(normalized); });
      return result;
    }

    function normalizeNumber(value, fallback = 0) { const n = Number(value); return Number.isFinite(n) ? n : fallback; }

    function getDisplayQuestionBank() {
      const raw = window.FAMILY_FEUD_QUESTIONS || [];
      if (!Array.isArray(raw)) return [];
      return raw.map((item) => {
        const question = String(item?.question || "").trim();
        const answers = Array.isArray(item?.answers) ? item.answers.slice(0, 6).map((answer) => ({ text: String(answer?.text || "").trim(), points: Math.max(0, normalizeNumber(answer?.points, 0)) })).filter((answer) => answer.text && answer.points > 0) : [];
        if (!question || !answers.length) return null;
        return { question, answers };
      }).filter(Boolean);
    }

    function getBankQuestionByIndex(index) {
      const bank = getDisplayQuestionBank();
      if (!bank.length) return null;
      const safeIndex = Number.isFinite(Number(index)) ? Math.floor(Number(index)) : 0;
      const normalizedIndex = ((safeIndex % bank.length) + bank.length) % bank.length;
      return bank[normalizedIndex] || bank[0];
    }

    function isQuestionFromBank(question) {
      const text = String(question || "").trim();
      if (!text) return false;
      return getDisplayQuestionBank().some((item) => item.question === text);
    }

    function mergeWithBankQuestion(state, questionIndex) {
      const bankQuestion = getBankQuestionByIndex(questionIndex);
      if (!bankQuestion) return state;
      const oldAnswers = Array.isArray(state.answers) ? state.answers : [];
      return {
        ...state,
        question: bankQuestion.question,
        answers: bankQuestion.answers.slice(0, 6).map((answer, index) => ({ text: answer.text, points: answer.points, revealed: !!oldAnswers[index]?.revealed }))
      };
    }

    function getDefaultState() {
      const firstQuestion = getBankQuestionByIndex(0);
      return {
        showQuestion: false,
        question: firstQuestion ? firstQuestion.question : "",
        team1Name: readStored("familyfeud_team1") || "الفريق الأول",
        team2Name: readStored("familyfeud_team2") || "الفريق الثاني",
        team1Score: 0,
        team2Score: 0,
        team1Strikes: 0,
        team2Strikes: 0,
        roundPoints: 0,
        displayErrorSeq: 0,
        displayErrorReason: "",
        firstBuzzTeam: "",
        firstBuzzAt: 0,
        phase: "idle",
        currentTurnTeam: "",
        stealingTeam: "",
        answers: firstQuestion ? firstQuestion.answers.slice(0, 6).map((answer) => ({ text: answer.text, points: answer.points, revealed: false })) : []
      };
    }

    function normalizeStrikeCount(value) { return Math.max(0, Math.min(3, normalizeNumber(value, 0))); }
    function normalizeAnswer(answer, fallback) { return { text: String(answer?.text ?? fallback?.text ?? "").trim(), points: Math.max(0, normalizeNumber(answer?.points, fallback?.points ?? 0)), revealed: !!answer?.revealed }; }
    function normalizePhase(value) { return String(value || "").trim().toLowerCase(); }

    function normalizeState(raw) {
      const defaults = getDefaultState();
      const source = raw || defaults;
      const answersSource = Array.isArray(source.answers) ? source.answers : defaults.answers;
      const answerCount = Math.max(0, Math.min(6, answersSource.length));
      const normalizedAnswers = [];
      for (let i = 0; i < answerCount; i++) normalizedAnswers.push(normalizeAnswer(answersSource[i], defaults.answers[i]));
      return {
        showQuestion: typeof source.showQuestion === "boolean" ? source.showQuestion : defaults.showQuestion,
        question: String(source.question || defaults.question).trim(),
        team1Name: String(source.team1Name || defaults.team1Name).trim() || defaults.team1Name,
        team2Name: String(source.team2Name || defaults.team2Name).trim() || defaults.team2Name,
        team1Score: Math.max(0, normalizeNumber(source.team1Score, defaults.team1Score)),
        team2Score: Math.max(0, normalizeNumber(source.team2Score, defaults.team2Score)),
        team1Strikes: normalizeStrikeCount(source.team1Strikes),
        team2Strikes: normalizeStrikeCount(source.team2Strikes),
        roundPoints: Math.max(0, normalizeNumber(source.roundPoints, 0)),
        displayErrorSeq: Math.max(0, normalizeNumber(source.displayErrorSeq, 0)),
        displayErrorReason: normalizeEffectReason(source.displayErrorReason),
        firstBuzzTeam: normalizeTeam(source.firstBuzzTeam),
        firstBuzzAt: Math.max(0, normalizeNumber(source.firstBuzzAt, 0)),
        phase: normalizePhase(source.phase),
        currentTurnTeam: normalizeTeam(source.currentTurnTeam),
        stealingTeam: normalizeTeam(source.stealingTeam),
        answers: normalizedAnswers
      };
    }

    function readControlQuestionIndex() {
      const parsed = safeParse(readStored(CONTROL_KEY));
      return Math.max(0, normalizeNumber(parsed?.currentQuestionIndex, 0));
    }

    function readDisplayState() {
      const raw = readStored(DISPLAY_KEY);
      if (!raw) return mergeWithBankQuestion(normalizeState(getDefaultState()), readControlQuestionIndex());
      const parsed = safeParse(raw);
      if (!parsed) return mergeWithBankQuestion(normalizeState(getDefaultState()), readControlQuestionIndex());
      const normalized = normalizeState(parsed);
      if (!isQuestionFromBank(normalized.question)) return mergeWithBankQuestion(normalized, readControlQuestionIndex());
      return normalized;
    }

    async function startRemoteSync() {
      if (syncStarted) return;
      syncStarted = true;
      const ok = await detectApiBase();
      if (ok) { await syncTeamNamesToRemote(); await fetchRemoteGameState(true); await initPusher(); }
      startFallbackPoll();
    }

    function startFallbackPoll() { if (fallbackPoll) clearInterval(fallbackPoll); fallbackPoll = setInterval(() => { fetchRemoteGameState(false); }, FALLBACK_POLL_MS); }

    function destroyLiveSync() {
      if (fallbackPoll) { clearInterval(fallbackPoll); fallbackPoll = null; }
      if (gameChannel && pusher) { try { gameChannel.unbind_all(); } catch (e) {} try { pusher.unsubscribe(gameChannel.name); } catch (e) {} }
      gameChannel = null;
      if (pusher) { try { pusher.disconnect(); } catch (e) {} }
      pusher = null; syncStarted = false; stateFetchInFlight = null; clearFirstBuzzHighlightTimer();
    }

    async function detectApiBase() {
      const bases = getApiBases();
      for (const base of bases) {
        try {
          const res = await fetch(`${base}/api/game/state?room=${encodeURIComponent(roomId)}`, { method: "GET", cache: "no-store", headers: { "Cache-Control": "no-cache", "Pragma": "no-cache" } });
          const data = await res.json().catch(() => null);
          if (!res.ok || !data || !data.ok || !data.state || !data.state.display) continue;
          apiBase = base; writeStored(API_BASE_KEY, base); writeStored(BUZZ_API_BASE_KEY, base); applyRemoteGameState(data.state); renderDisplay(); return true;
        } catch (error) {}
      }
      return false;
    }

    async function initPusher() {
      if (!window.Pusher) return; if (!apiBase) return; if (pusher || gameChannel) return;
      try {
        const res = await fetch(`${apiBase}/api/game/pusher-config?room=${encodeURIComponent(roomId)}`, { method: "GET", cache: "no-store", headers: { "Cache-Control": "no-cache", "Pragma": "no-cache" } });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data || !data.ok || !data.key || !data.cluster || !data.channel) return;
        const authEndpoint = String(data.authEndpoint || "").startsWith("http") ? data.authEndpoint : `${apiBase}${data.authEndpoint}`;
        window.Pusher.logToConsole = false;
        pusher = new window.Pusher(data.key, { cluster: data.cluster, authEndpoint, authTransport: "ajax", channelAuthorization: { endpoint: authEndpoint, transport: "ajax" } });

        gameChannel.bind("pusher:subscription_succeeded", async () => { await fetchRemoteGameState(true); });
        gameChannel.bind("game-updated", (payload) => { applyRemoteGameState(payload); renderDisplay(); });
      } catch (error) {}
    }

    async function fetchRemoteGameState(force = false) {
      if (stateFetchInFlight && !force) return stateFetchInFlight;
      stateFetchInFlight = (async () => {
        const bases = getApiBases();
        for (const base of bases) {
          try {
            const res = await fetch(`${base}/api/game/state?room=${encodeURIComponent(roomId)}`, { method: "GET", cache: "no-store", headers: { "Cache-Control": "no-cache", "Pragma": "no-cache" } });
            if (!res.ok) continue;
            const data = await res.json().catch(() => null);
            if (!data || !data.ok || !data.state || !data.state.display) continue;
            apiBase = base; writeStored(API_BASE_KEY, base); writeStored(BUZZ_API_BASE_KEY, base); applyRemoteGameState(data.state); renderDisplay(); return true;
          } catch (error) {}
        }
        return false;
      })();
      try { return await stateFetchInFlight; } finally { stateFetchInFlight = null; }
    }

    async function sendGameAction(action, extra = {}) {
      const bases = getApiBases();
      for (const base of bases) {
        try {
          const res = await fetch(`${base}/api/game/action?room=${encodeURIComponent(roomId)}`, { method: "POST", headers: { "Content-Type": "application/json", "Cache-Control": "no-cache", "Pragma": "no-cache" }, body: JSON.stringify({ action, ...extra }) });
          const data = await res.json().catch(() => null);
          if (!res.ok || !data || !data.ok || !data.state) continue;
          apiBase = base; writeStored(API_BASE_KEY, base); writeStored(BUZZ_API_BASE_KEY, base); applyRemoteGameState(data.state); renderDisplay(); return true;
        } catch (error) {}
      }
      return false;
    }

    async function syncTeamNamesToRemote() {
      if (teamNamesSynced) return;
      teamNamesSynced = true;
      const team1Name = String(readStored("familyfeud_team1") || "").trim();
      const team2Name = String(readStored("familyfeud_team2") || "").trim();
      if (!team1Name && !team2Name) return;
      await sendGameAction("set_team_names", { team1Name: team1Name || undefined, team2Name: team2Name || undefined });
    }

    function applyRemoteGameState(remoteState) {
      if (!remoteState || !remoteState.display) return false;
      const controlIndex = Math.max(0, normalizeNumber(remoteState.control?.currentQuestionIndex, readControlQuestionIndex()));
      let nextState = normalizeState({
        ...remoteState.display,
        displayErrorSeq: remoteState.effects?.displayErrorSeq,
        displayErrorReason: remoteState.effects?.displayErrorReason,
        firstBuzzTeam: remoteState.buzz?.firstBuzz?.team,
        firstBuzzAt: remoteState.buzz?.firstBuzz?.at,
        phase: remoteState.control?.phase,
        currentTurnTeam: remoteState.control?.currentTurnTeam,
        stealingTeam: remoteState.control?.stealingTeam
      });
      nextState = mergeWithBankQuestion(nextState, controlIndex);
      const nextSignature = JSON.stringify(nextState);
      currentDisplayState = nextState;
      if (nextSignature === lastPersistedSignature) return false;
      lastPersistedSignature = nextSignature;
      writeStored(DISPLAY_KEY, nextState);
      return true;
    }

    function getCurrentViewport() { const vv = window.visualViewport; return { width: vv ? vv.width : window.innerWidth, height: vv ? vv.height : window.innerHeight }; }
    function setAppHeight() { stableViewport = getCurrentViewport(); root.style.setProperty("--app-height", stableViewport.height + "px"); }
    function fitGameToViewport() { stableViewport = getCurrentViewport(); const scale = Math.min((stableViewport.width - 8) / DESIGN_WIDTH, (stableViewport.height - 8) / DESIGN_HEIGHT); root.style.setProperty("--app-scale", String(scale)); }
    function nudgeSafariBar() { const visibleHeight = stableViewport.height; const fullHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight); if (fullHeight <= visibleHeight + 8) return; window.scrollTo(0, 1); setTimeout(() => window.scrollTo(0, 1), 120); setTimeout(() => window.scrollTo(0, 1), 280); }
    function updateLayout() { setAppHeight(); requestAnimationFrame(() => { fitGameToViewport(); applyAutoTextFitting(); nudgeSafariBar(); }); }

    function applyStrikeRow(elements, activeCount) { elements.forEach((el, index) => { el.classList.toggle("active", index < activeCount); }); }
    function clearFirstBuzzHighlightTimer() { if (firstBuzzHighlightTimer) { clearTimeout(firstBuzzHighlightTimer); firstBuzzHighlightTimer = null; } }
    function applyFirstBuzzHighlightVisuals() { ["team1", "team2"].forEach((team) => { const isActive = activeFirstBuzzTeam === team; teamPanelEls[team]?.classList.toggle("first-buzz-active", isActive); teamNameEls[team]?.classList.toggle("first-buzz-active", isActive); }); }
    function applyTurnHighlightVisuals() { ["team1", "team2"].forEach((team) => { const isActive = activeTurnTeam === team; teamPanelEls[team]?.classList.toggle("turn-active", isActive); }); }
    function startFirstBuzzHighlight(team, durationMs) { clearFirstBuzzHighlightTimer(); activeFirstBuzzTeam = team; applyFirstBuzzHighlightVisuals(); firstBuzzHighlightTimer = setTimeout(() => { activeFirstBuzzTeam = ""; applyFirstBuzzHighlightVisuals(); }, durationMs); }

    function detectFirstBuzzHighlight(state) {
      const team = normalizeTeam(state.firstBuzzTeam);
      const at = Math.max(0, normalizeNumber(state.firstBuzzAt, 0));
      const token = team && at ? `${team}:${at}` : "";
      if (!token || token === lastFirstBuzzToken) return;
      lastFirstBuzzToken = token;
      const remainingMs = FIRST_BUZZ_HIGHLIGHT_MS - (Date.now() - at);
      if (remainingMs <= 0) return;
      startFirstBuzzHighlight(team, remainingMs);
    }

    function resolveTurnHighlightTeam(state) {
      const phase = normalizePhase(state.phase);
      if (phase === "main") return normalizeTeam(state.currentTurnTeam);
      if (phase === "steal_result" || phase === "steal_pick") return normalizeTeam(state.stealingTeam);
      return "";
    }

    function detectStrikeEffect(state) {
      const nextSnapshot = { team1: normalizeStrikeCount(state.team1Strikes), team2: normalizeStrikeCount(state.team2Strikes) };
      if (!previousStrikeSnapshot) { previousStrikeSnapshot = nextSnapshot; return; }
      if (nextSnapshot.team1 > previousStrikeSnapshot.team1) playStrikeEffect({ showTransfer: nextSnapshot.team1 >= 3, xDurationMs: 2000 });
      else if (nextSnapshot.team2 > previousStrikeSnapshot.team2) playStrikeEffect({ showTransfer: nextSnapshot.team2 >= 3, xDurationMs: 2000 });
      previousStrikeSnapshot = nextSnapshot;
    }

    function detectDisplayErrorEffect(state) {
      const nextSeq = Math.max(0, normalizeNumber(state.displayErrorSeq, 0));
      if (previousDisplayErrorSeq === null) { previousDisplayErrorSeq = nextSeq; return; }
      if (nextSeq > previousDisplayErrorSeq) playStrikeEffect({ showTransfer: false, xDurationMs: 2000 });
      previousDisplayErrorSeq = nextSeq;
    }

    function detectAnswerRevealEffect(state) {
      const nextSnapshot = state.answers.map((answer) => !!answer.revealed);
      if (!previousRevealedSnapshot) { previousRevealedSnapshot = nextSnapshot; pendingRevealIndexes.clear(); return; }
      const newIndexes = [];
      nextSnapshot.forEach((revealed, index) => { if (revealed && !previousRevealedSnapshot[index]) newIndexes.push(index); });
      previousRevealedSnapshot = nextSnapshot;
      pendingRevealIndexes = new Set(newIndexes);
      if (newIndexes.length > 0) playAnswerSound();
    }

    function clearStrikeEffectTimers() { strikeEffectTimers.forEach((timer) => clearTimeout(timer)); strikeEffectTimers = []; }
    function resetStrikeEffectLayer() { strikeEffectLayer.classList.remove("show", "show-x", "show-transfer"); void strikeEffectLayer.offsetWidth; }

    function playStrikeEffect(options = {}) {
      const showTransfer = options.showTransfer === true;
      const xDurationMs = Math.max(0, normalizeNumber(options.xDurationMs, 2000));
      playWrongSound(); clearStrikeEffectTimers(); resetStrikeEffectLayer(); strikeEffectLayer.classList.add("show", "show-x");
      if (showTransfer) {
        strikeEffectTimers.push(setTimeout(() => { strikeEffectLayer.classList.remove("show-x"); void strikeEffectLayer.offsetWidth; strikeEffectLayer.classList.add("show", "show-transfer"); }, xDurationMs));
        strikeEffectTimers.push(setTimeout(() => { strikeEffectLayer.classList.remove("show", "show-x", "show-transfer"); }, xDurationMs + 1900));
      } else {
        strikeEffectTimers.push(setTimeout(() => { strikeEffectLayer.classList.remove("show", "show-x", "show-transfer"); }, xDurationMs));
      }
    }

    function escapeHtml(value) { return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    function renderAnswers(state) {
      const positions = [{ row: 1, col: 2 }, { row: 1, col: 1 }, { row: 2, col: 2 }, { row: 2, col: 1 }, { row: 3, col: 2 }, { row: 3, col: 1 }];
      const revealIndexes = new Set(pendingRevealIndexes); pendingRevealIndexes.clear(); answersGrid.innerHTML = "";
      state.answers.forEach((answer, index) => {
        const position = positions[index]; if (!position) return;
        const slot = document.createElement("div");
        const revealed = !!answer.revealed;
        const justRevealed = revealIndexes.has(index);
        slot.className = "answer-slot";
        if (revealed) slot.classList.add("is-revealed");
        if (justRevealed) slot.classList.add("just-revealed");
        slot.style.gridRow = position.row;
        slot.style.gridColumn = position.col;
        slot.innerHTML = `<div class="answer-flip"><div class="answer-face answer-front"><div class="rank-circle">${index + 1}</div></div><div class="answer-face answer-back"><div class="answer-points">${answer.points}</div><div class="answer-label auto-fit-answer">${escapeHtml(answer.text || "")}</div></div></div>`;
        answersGrid.appendChild(slot);
      });
    }

    function renderDisplay() {
      const state = currentDisplayState || readDisplayState();
      activeTurnTeam = resolveTurnHighlightTeam(state);
      detectFirstBuzzHighlight(state);
      applyTurnHighlightVisuals();
      applyFirstBuzzHighlightVisuals();
      const signature = JSON.stringify(state);
      if (signature === lastRenderedSignature) return;
      lastRenderedSignature = signature;
      detectStrikeEffect(state);
      detectDisplayErrorEffect(state);
      detectAnswerRevealEffect(state);
      teamOneNameEl.textContent = state.team1Name;
      teamTwoNameEl.textContent = state.team2Name;
      teamOneScoreEl.textContent = state.team1Score;
      teamTwoScoreEl.textContent = state.team2Score;
      questionTextEl.textContent = state.showQuestion ? state.question : " ";
      questionTextEl.classList.toggle("is-hidden", !state.showQuestion);
      roundScoreEl.textContent = state.roundPoints;
      applyStrikeRow(strikeRows.team1, state.team1Strikes);
      applyStrikeRow(strikeRows.team2, state.team2Strikes);
      renderAnswers(state);
      requestAnimationFrame(applyAutoTextFitting);
    }

    function fitTextToBox(element, maxSize, minSize) {
      if (!element) return;
      element.style.fontSize = maxSize + "px";
      let current = maxSize;
      while (current > minSize) {
        const tooWide = element.scrollWidth > element.clientWidth + 1;
        const tooTall = element.scrollHeight > element.clientHeight + 1;
        if (!tooWide && !tooTall) break;
        current -= 1;
        element.style.fontSize = current + "px";
      }
    }

    function applyAutoTextFitting() {
      if (!questionTextEl.classList.contains("is-hidden")) fitTextToBox(questionTextEl, 58, 26);
      else questionTextEl.style.fontSize = "58px";
      fitTextToBox(teamOneNameEl, 48, 22);
      fitTextToBox(teamTwoNameEl, 48, 22);
      document.querySelectorAll(".auto-fit-answer").forEach(el => { fitTextToBox(el, 38, 18); });
    }

    const storeLogo = document.getElementById("storeLogo");
    storeLogo.addEventListener("error", () => { storeLogo.style.display = "none"; });
    const gameLogo = document.getElementById("gameLogo");
    gameLogo.addEventListener("error", () => { gameLogo.style.display = "none"; });
  </script>
</body>
</html>
